<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>ポケカ一人回し</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f0f7f0;--s1:#ffffff;--s2:#e8f5e9;--s3:#c8e6c9;
  --bd:#a5d6a7;--bd2:#66bb6a;--bd3:#388e3c;
  --acc:#1b5e20;--acc2:#2e7d32;--acc3:#43a047;
  --tx:#1b2e1b;--tx2:#3d5a3d;--tx3:#6a8f6a;
  --rd:#c62828;--pu:#6a1b9a;--bl:#1565c0;--gr:#2e7d32;--am:#e65100;
  --cw:56px;--ch:78px;
  --shadow:0 1px 4px rgba(0,0,0,0.10);
}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Hiragino Kaku Gothic Pro','Noto Sans JP',sans-serif;font-size:13px;overflow:hidden;touch-action:manipulation}
#app{display:flex;flex-direction:column;height:100dvh}

/* HEADER */
#hdr{background:var(--acc);color:#fff;padding:6px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap;min-height:46px;box-shadow:0 2px 6px rgba(0,0,0,0.18)}
#hdr h1{font-size:13px;font-weight:700;color:#fff;white-space:nowrap;letter-spacing:.05em}
.hbtn{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:12px;white-space:nowrap;transition:background .15s}
.hbtn:active{background:rgba(255,255,255,0.3)}
.hbtn:disabled{opacity:.4;cursor:not-allowed}
.hbtn.go{background:#fff;color:var(--acc);font-weight:700;border-color:#fff}
.hbtn.go:active{background:#e8f5e9}
.badge{background:rgba(255,255,255,0.18);border:1px solid rgba(255,255,255,0.25);padding:3px 8px;border-radius:5px;font-size:11px;color:rgba(255,255,255,0.9);white-space:nowrap}
.badge b{color:#fff;font-weight:700}

/* MAIN */
#main{display:flex;flex:1;overflow:hidden}
#field{flex:1;display:flex;flex-direction:column;gap:5px;padding:6px;overflow-y:auto;min-width:0}
#sb{width:148px;flex-shrink:0;background:var(--s1);border-left:2px solid var(--bd);display:flex;flex-direction:column;gap:5px;padding:6px;overflow-y:auto}

/* ZONES */
.zone{background:var(--s1);border:1.5px solid var(--bd);border-radius:10px;padding:6px;box-shadow:var(--shadow)}
.zh{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;gap:4px;flex-wrap:wrap}
.zt{font-size:10px;color:var(--acc2);text-transform:uppercase;letter-spacing:.08em;font-weight:700}
.zc{color:var(--acc3);font-weight:700;font-size:11px;background:var(--s2);padding:1px 7px;border-radius:10px}
.zbtns{display:flex;gap:3px;flex-wrap:wrap}
.zb{background:var(--s2);border:1px solid var(--bd);color:var(--tx2);padding:2px 7px;border-radius:4px;cursor:pointer;font-size:11px;transition:all .1s}
.zb:active{background:var(--s3);color:var(--acc)}
.zcards{display:flex;flex-wrap:wrap;gap:4px;min-height:82px;align-content:flex-start;padding:2px}

/* BATTLE/BENCH */
#bb-row{display:flex;gap:5px;align-items:flex-start}

/* バトル場 */
.bslot{flex-shrink:0;width:130px;background:var(--s1);border:2px solid var(--rd);border-radius:10px;padding:6px;display:flex;flex-direction:column;align-items:center;gap:4px;box-shadow:var(--shadow)}
.bslot.occ{border-color:var(--rd);background:#fff8f8}
.slbl{font-size:9px;color:var(--rd);text-transform:uppercase;font-weight:700;letter-spacing:.06em;margin-bottom:2px}

/* ポケモンエリア */
.pokemon-area{display:flex;justify-content:center}

/* エネルギーエリア（ポケモンと分離した別枠） */
.energy-area{width:100%;background:var(--s2);border:1px dashed var(--bd2);border-radius:6px;padding:4px;min-height:32px;display:flex;flex-wrap:wrap;gap:3px;align-items:center}
.energy-area-label{font-size:8px;color:var(--tx3);width:100%;margin-bottom:2px;font-weight:600}
.energy-area .card{width:34px;height:48px}

/* その他ついているカードエリア */
.tool-area{width:100%;background:#f3f8ff;border:1px dashed #90caf9;border-radius:6px;padding:4px;min-height:28px;display:flex;flex-wrap:wrap;gap:3px;align-items:center}
.tool-area-label{font-size:8px;color:#1565c0;width:100%;margin-bottom:2px;font-weight:600}
.tool-area .card{width:34px;height:48px}

/* ベンチ */
#bench-area{flex:1;min-width:0;display:flex;flex-direction:column;gap:4px}
.slbl2{font-size:10px;color:var(--acc2);text-transform:uppercase;letter-spacing:.08em;font-weight:700}
#bench-slots{display:flex;gap:4px;flex-wrap:wrap}
.bnslot{width:84px;background:var(--s1);border:1.5px dashed var(--bd2);border-radius:8px;padding:5px;display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0;box-shadow:var(--shadow)}
.bnslot.occ{border-style:solid;border-color:var(--acc3);background:#f1f8f1}
.snum{font-size:9px;color:var(--tx3);font-weight:600}
.bnslot .energy-area{min-height:24px}
.bnslot .energy-area .card{width:26px;height:36px}
.bnslot .tool-area{min-height:20px}
.bnslot .tool-area .card{width:26px;height:36px}
.swpbtn{background:var(--acc2);color:#fff;border:none;padding:3px 6px;border-radius:4px;cursor:pointer;font-size:9px;margin-top:2px;font-weight:600}
.swpbtn:active{background:var(--acc)}
#stadium-zone{border-color:var(--pu);background:#fdf4ff}
#stadium-zone .zt{color:var(--pu)}

/* CARDS */
.card{
  width:var(--cw);height:var(--ch);border-radius:6px;border:1.5px solid var(--bd);
  cursor:pointer;position:relative;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  user-select:none;overflow:hidden;background:var(--s2);flex-shrink:0;
  transition:transform .1s, box-shadow .1s;box-shadow:var(--shadow)
}
.card:active{transform:scale(.93)}
.card.dragging{opacity:.5;transform:scale(.95)}
.cimg{width:100%;height:100%;object-fit:cover;display:block;border-radius:4px}
.cph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:22px}
.card.pokemon{border-color:#ef9a9a}
.card.energy{border-color:#a5d6a7}
.card.trainer{border-color:#ce93d8}
.card.fd{background:linear-gradient(145deg,var(--acc2),var(--acc))}
.card.fd::after{content:'';position:absolute;inset:4px;border:1px solid rgba(255,255,255,.25);border-radius:4px;background:radial-gradient(circle,rgba(255,255,255,.15),transparent 70%)}

/* DECK PILE */
.dpile{width:var(--cw);height:var(--ch);border-radius:6px;background:linear-gradient(145deg,var(--acc2),var(--acc));border:1.5px solid var(--acc3);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;flex-shrink:0;box-shadow:var(--shadow)}
.dpile:active{transform:scale(.97)}
.dpile .pcnt{font-size:18px;font-weight:700;color:#fff}
.dpile .plbl{font-size:9px;color:rgba(255,255,255,.8)}

/* SIDEBAR */
.sbx{background:var(--s1);border:1.5px solid var(--bd);border-radius:8px;padding:7px;box-shadow:var(--shadow)}
.sbh{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.sbt{font-size:10px;color:var(--acc2);text-transform:uppercase;letter-spacing:.07em;font-weight:700}
.sbc{color:var(--acc3);font-weight:700;font-size:11px;background:var(--s2);padding:1px 6px;border-radius:10px}
.sbcards{display:flex;flex-wrap:wrap;gap:3px}
.sbcards .card{width:40px;height:56px}
.sbbtn{width:100%;background:var(--s2);border:1px solid var(--bd);color:var(--tx2);padding:5px;border-radius:5px;cursor:pointer;font-size:11px;margin-top:4px;font-weight:500}
.sbbtn:active{background:var(--s3);color:var(--acc)}

/* 状態異常マーカー */
.status-markers{display:flex;flex-wrap:wrap;gap:2px;justify-content:center;width:100%}
.smark{padding:2px 4px;border-radius:3px;font-size:9px;font-weight:700;cursor:pointer;border:none;transition:opacity .15s}
.smark.off{background:var(--s3);color:var(--tx3)}
.smark.やけど{background:#c62828;color:#fff}
.smark.どく{background:#6a1b9a;color:#fff}
.smark.ねむり{background:#1565c0;color:#fff}
.smark.まひ{background:#e65100;color:#fff}
.smark.こんらん{background:#880e4f;color:#fff}

/* コイン */
#coin-area{text-align:center}
.coin-result{font-size:28px;margin:4px 0;min-height:36px}
.coin-btn{background:var(--acc2);color:#fff;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:700;width:100%}
.coin-btn:active{background:var(--acc)}
.coin-hist{font-size:10px;color:var(--tx3);margin-top:3px;min-height:14px}
@keyframes flip{0%{transform:rotateY(0)}50%{transform:rotateY(90deg)}100%{transform:rotateY(0)}}
.flipping{animation:flip .3s ease}

/* SWIPE HINT */
.swipe-hint{font-size:9px;color:var(--tx3);text-align:center;margin-top:2px}

/* MODAL - bottom sheet */
#mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:flex-end;justify-content:center}
#mbg.open{display:flex}
#mbox{background:var(--s1);border-radius:18px 18px 0 0;padding:16px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto;box-shadow:0 -4px 20px rgba(0,0,0,.15)}
#mbox h3{font-size:14px;color:var(--acc);margin-bottom:4px;font-weight:700}
.modal-handle{width:36px;height:4px;background:var(--bd2);border-radius:2px;margin:0 auto 14px}
.mb{display:block;width:100%;background:var(--s2);border:1px solid var(--bd);color:var(--tx);padding:12px 14px;border-radius:8px;cursor:pointer;text-align:left;font-size:13px;margin-bottom:6px;font-weight:500}
.mb:active{background:var(--s3);color:var(--acc)}
.mb.cancel{color:var(--tx3);background:var(--bg)}
.mb.red{color:#c62828;background:#fff5f5}
.mb.go{background:var(--acc2);color:#fff;font-weight:700;border-color:var(--acc2)}

/* デッキ一覧（画像グリッド） */
#deck-grid{display:flex;flex-wrap:wrap;gap:4px;max-height:320px;overflow-y:auto;margin-bottom:10px;padding:4px;background:var(--bg);border-radius:8px}

/* DECK INPUT */
#deck-input-area{display:flex;flex-direction:column;gap:8px}
#deck-input-area input{background:var(--s2);border:1.5px solid var(--bd2);color:var(--tx);padding:10px;border-radius:8px;font-size:14px;width:100%}
.input-hint{font-size:11px;color:var(--tx3);line-height:1.7;padding:8px;background:var(--s2);border-radius:6px}
.input-hint b{color:var(--tx2)}

/* TOAST */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--acc);color:#fff;padding:8px 18px;border-radius:20px;font-size:12px;opacity:0;pointer-events:none;transition:opacity .25s;z-index:2000;white-space:nowrap;max-width:88vw;overflow:hidden;text-overflow:ellipsis;box-shadow:0 3px 12px rgba(0,0,0,.2);font-weight:600}
#toast.show{opacity:1}

/* LOADING */
#loading{display:none;position:fixed;inset:0;background:rgba(255,255,255,.9);z-index:3000;flex-direction:column;align-items:center;justify-content:center;gap:16px}
#loading.open{display:flex}
.spin{width:36px;height:36px;border:3px solid var(--bd);border-top-color:var(--acc2);border-radius:50%;animation:sp .75s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#lmsg{font-size:13px;color:var(--tx2);text-align:center;padding:0 20px;font-weight:500}

/* SWIPE OVERLAY */
#swipe-overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(27,94,32,.08);pointer-events:none}
#swipe-overlay.show{display:block}
.swipe-target{position:absolute;background:rgba(27,94,32,.18);border:2px dashed var(--acc2);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--acc);opacity:0;transition:opacity .2s}
.swipe-target.active{opacity:1;background:rgba(27,94,32,.32)}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <h1>🃏 POKÉCA SOLO</h1>
    <button class="hbtn" onclick="showDeckInput()">📋 デッキ読み込み</button>
    <button class="hbtn go" id="btn-start" disabled>ゲーム開始</button>
    <button class="hbtn" onclick="doReset()">↺ リセット</button>
    <div style="flex:1"></div>
    <div class="badge">サイド <b id="hpr">6</b></div>
    <div class="badge">T<b id="htr">0</b></div>
    <button class="hbtn" onclick="nextTurn()">+</button>
  </div>
  <div id="main">
    <div id="field">
      <!-- スタジアム -->
      <div class="zone" id="stadium-zone">
        <div class="zh">
          <span class="zt">スタジアム</span>
          <span class="zc" id="cnt-stadium">0</span>
        </div>
        <div class="zcards" id="cards-stadium"></div>
      </div>
      <!-- バトル場 + ベンチ -->
      <div id="bb-row">
        <!-- バトル場 -->
        <div class="bslot" id="bslot">
          <div class="slbl">バトル場</div>
          <div class="pokemon-area" id="bp"></div>
          <div class="energy-area" id="ba-energy">
            <div class="energy-area-label">エネルギー</div>
          </div>
          <div class="tool-area" id="ba-tool">
            <div class="tool-area-label">どうぐ・その他</div>
          </div>
          <div class="status-markers" id="battle-markers">
            <button class="smark off" data-status="やけど" onclick="toggleStatus('battle','やけど')">🔥</button>
            <button class="smark off" data-status="どく" onclick="toggleStatus('battle','どく')">☠</button>
            <button class="smark off" data-status="ねむり" onclick="toggleStatus('battle','ねむり')">💤</button>
            <button class="smark off" data-status="まひ" onclick="toggleStatus('battle','まひ')">⚡</button>
            <button class="smark off" data-status="こんらん" onclick="toggleStatus('battle','こんらん')">😵</button>
          </div>
        </div>
        <!-- ベンチ -->
        <div id="bench-area">
          <div class="slbl2">ベンチ</div>
          <div id="bench-slots"></div>
        </div>
      </div>
      <!-- 手札 -->
      <div class="zone">
        <div class="zh">
          <span class="zt">手札</span>
          <span class="zc" id="cnt-hand">0</span>
          <div class="zbtns">
            <button class="zb" onclick="sortZone('hand')">並替</button>
            <button class="zb" onclick="returnHandToDeck()">デッキに戻す</button>
          </div>
        </div>
        <div class="zcards" id="cards-hand"></div>
        <div class="swipe-hint">← スワイプで場に出す</div>
      </div>
    </div>
    <!-- SIDEBAR -->
    <div id="sb">
      <div class="sbx">
        <div class="sbh"><span class="sbt">デッキ</span><span class="sbc" id="cnt-deck">0</span></div>
        <div style="display:flex;justify-content:center">
          <div class="dpile" onclick="showDeckMenu()">
            <div class="pcnt" id="pile-cnt">0</div>
            <div class="plbl">枚</div>
          </div>
        </div>
        <button class="sbbtn" onclick="drawOne()">1枚ドロー</button>
        <button class="sbbtn" onclick="shuffleDeck()">シャッフル</button>
        <button class="sbbtn" onclick="viewDeck()">デッキを見る</button>
      </div>
      <div class="sbx">
        <div class="sbh"><span class="sbt">コイン</span></div>
        <div id="coin-area">
          <div class="coin-result" id="coin-result">🪙</div>
          <button class="coin-btn" onclick="flipCoin()">投げる</button>
          <div class="coin-hist" id="coin-hist"></div>
        </div>
      </div>
      <div class="sbx">
        <div class="sbh"><span class="sbt">サイド</span><span class="sbc" id="cnt-side">0</span></div>
        <div class="sbcards" id="cards-side"></div>
        <button class="sbbtn" onclick="takePrize()">1枚取る</button>
      </div>
      <div class="sbx">
        <div class="sbh"><span class="sbt">トラッシュ</span><span class="sbc" id="cnt-trash">0</span></div>
        <div class="sbcards" id="cards-trash"></div>
        <button class="sbbtn" onclick="sortZone('trash')">並び替え</button>
      </div>
    </div>
  </div>
</div>

<div id="mbg" onclick="closeModal()">
  <div id="mbox" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <h3 id="mtitle">メニュー</h3>
    <div id="mbody"></div>
  </div>
</div>
<div id="loading"><div class="spin"></div><div id="lmsg">読み込み中...</div></div>
<div id="toast"></div>

<script>
const WORKER='https://shiny-mud-d562.84shingen.workers.dev';
let _uid=0; const uid=()=>++_uid;

const S={
  deck:[],hand:[],side:[],trash:[],stadium:[],
  battle:{pokemon:null,energy:[],tools:[],statuses:new Set()},
  bench:Array(5).fill(0).map(()=>({pokemon:null,energy:[],tools:[],statuses:new Set()})),
  turn:0
};

// ============================================================
// UTILS
// ============================================================
function toast(msg,d=2200){
  const e=document.getElementById('toast');
  e.textContent=msg;e.classList.add('show');
  clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('show'),d);
}
function loading(msg){document.getElementById('lmsg').textContent=msg||'読み込み中...';document.getElementById('loading').classList.add('open');}
function unload(){document.getElementById('loading').classList.remove('open');}
function openModal(title,body){
  document.getElementById('mtitle').textContent=title;
  document.getElementById('mbody').innerHTML=body;
  document.getElementById('mbg').classList.add('open');
}
function closeModal(){document.getElementById('mbg').classList.remove('open');}

function typeClass(st){
  if(!st)return'';const s=st.toLowerCase();
  if(s[0]==='p')return'pokemon';
  if(s[0]==='e')return'energy';
  if(s[0]==='t')return'trainer';
  return'';
}
function typeEmoji(st){const c=typeClass(st);return c==='pokemon'?'⚡':c==='energy'?'⬡':c==='trainer'?'♟':'🃏';}
function isEnergy(c){return typeClass(c.supertype)==='energy';}
function isPokemon(c){return typeClass(c.supertype)==='pokemon';}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

// ============================================================
// COIN
// ============================================================
let coinHist=[];
function flipCoin(){
  const r=document.getElementById('coin-result');
  r.classList.remove('flipping');void r.offsetWidth;r.classList.add('flipping');
  setTimeout(()=>{
    const h=Math.random()<.5;
    r.textContent=h?'⭕':'❌';
    coinHist.unshift(h?'⭕':'❌');
    if(coinHist.length>5)coinHist.pop();
    document.getElementById('coin-hist').textContent=coinHist.join(' ');
    toast(h?'おもて！':'うら！');
  },150);
}

// ============================================================
// STATUS
// ============================================================
function toggleStatus(zone,status){
  const slot=zone==='battle'?S.battle:null;
  if(!slot)return;
  if(slot.statuses.has(status))slot.statuses.delete(status);
  else slot.statuses.add(status);
  renderStatusMarkers();
  toast(slot.statuses.has(status)?`${status}になった`:`${status}が回復した`);
}
function renderStatusMarkers(){
  document.getElementById('battle-markers')?.querySelectorAll('.smark').forEach(btn=>{
    const st=btn.dataset.status;
    btn.className='smark '+(S.battle.statuses.has(st)?st:'off');
  });
}

// ============================================================
// DECK INPUT
// ============================================================
function showDeckInput(){
  openModal('デッキを読み込む',`
    <div id="deck-input-area">
      <div class="input-hint">
        <b>公式デッキコード（XXXX-XXXX-XXXX）を入力してください</b><br>
        pokemon-card.comで保存したデッキコードをそのまま入力できます
      </div>
      <input id="deck-code-field" type="text" placeholder="例: NHLngn-GoqcNM-n9gNgn" autocomplete="off">
      <button class="mb go" onclick="loadByDeckCode()">デッキコードで読み込む</button>
      <button class="mb" onclick="closeModal();loadSample()">サンプルデッキで試す</button>
      <button class="mb cancel" onclick="closeModal()">閉じる</button>
    </div>
  `);
  setTimeout(()=>document.getElementById('deck-code-field')?.focus(),100);
}

async function loadByDeckCode(){
  const code=document.getElementById('deck-code-field').value.trim();
  if(!code){toast('デッキコードを入力してください');return;}
  if(!/^[a-zA-Z0-9]+-[a-zA-Z0-9]+-[a-zA-Z0-9]+$/.test(code)){toast('形式が違います (例: XXXXXX-XXXXXX-XXXXXX)');return;}
  closeModal();loading('デッキコードを解析中...');
  try{
    document.getElementById('lmsg').textContent='公式サイトからカードデータを取得中...';
    const res=await fetch(`${WORKER}?code=${encodeURIComponent(code)}`);
    const data=await res.json();
    if(data.error){unload();toast('エラー: '+data.error);return;}
    if(!data.cards?.length){unload();toast('カードデータが取得できませんでした');return;}
    const cards=[];
    data.cards.forEach(c=>{
      const n=Math.max(1,Math.min(c.count||1,4));
      for(let i=0;i<n;i++)cards.push({uid:uid(),name:c.name||'不明',supertype:c.supertype||'Pokémon',imageUrl:c.imageUrl||null,_zone:'deck'});
    });
    S.deck=shuffle(cards);resetField();
    document.getElementById('btn-start').disabled=false;
    unload();render();toast(`${cards.length}枚のデッキを読み込みました！`);
  }catch(e){unload();toast('通信エラー: '+e.message);}
}

function loadFromURL(){
  const params=new URLSearchParams(location.search);
  const data=params.get('d');
  if(!data)return false;
  try{
    const decoded=JSON.parse(decodeURIComponent(atob(data)));
    if(!decoded?.cards?.length)return false;
    loading('デッキデータを読み込み中...');
    setTimeout(()=>{
      S.deck=decoded.cards.map(c=>({uid:uid(),name:c.n||c.name||'不明',supertype:c.t==='P'?'Pokémon':c.t==='E'?'Energy':c.t==='T'?'Trainer':(c.supertype||'Pokémon'),imageUrl:c.i||c.imageUrl||null,_zone:'deck'}));
      S.deck=shuffle(S.deck);resetField();
      document.getElementById('btn-start').disabled=false;
      unload();render();toast(`${S.deck.length}枚のデッキを読み込みました`);
    },300);
    return true;
  }catch(e){return false;}
}

// ============================================================
// GAME ACTIONS
// ============================================================
function startGame(){
  if(S.deck.length<13){toast('デッキが不足しています');return;}
  S.deck=shuffle(S.deck);resetField();
  S.hand=S.deck.splice(0,7);S.hand.forEach(c=>c._zone='hand');
  S.side=S.deck.splice(0,6);S.side.forEach(c=>c._zone='side');
  render();toast('ゲーム開始！手札7枚・サイド6枚');
}
function resetField(){
  S.hand=[];S.side=[];S.trash=[];S.stadium=[];
  S.battle={pokemon:null,energy:[],tools:[],statuses:new Set()};
  S.bench=Array(5).fill(0).map(()=>({pokemon:null,energy:[],tools:[],statuses:new Set()}));
  S.turn=0;renderStatusMarkers();
}
function doReset(){
  const all=[...S.deck,...S.hand,...S.side,...S.trash,...S.stadium,
    ...(S.battle.pokemon?[S.battle.pokemon]:[]),...S.battle.energy,...S.battle.tools,
    ...S.bench.flatMap(b=>[...(b.pokemon?[b.pokemon]:[]),...b.energy,...b.tools])];
  all.forEach(c=>c._zone='deck');S.deck=shuffle(all);resetField();
  document.getElementById('btn-start').disabled=false;render();toast('リセットしました');
}
function drawOne(){if(!S.deck.length){toast('デッキが空です');return;}const c=S.deck.shift();c._zone='hand';S.hand.push(c);render();toast('ドロー: '+c.name);}
function shuffleDeck(){S.deck=shuffle(S.deck);render();toast('シャッフルしました');}

function viewDeck(){
  let h='<div id="deck-grid">';
  if(!S.deck.length){h+='<div style="color:var(--tx3);padding:20px;font-size:12px;width:100%;text-align:center">デッキが空です</div>';}
  else{
    // 画像グリッド表示
    S.deck.forEach(c=>{
      if(c.imageUrl){
        h+=`<img src="${c.imageUrl}" alt="${c.name}" title="${c.name}" style="width:52px;height:73px;border-radius:5px;object-fit:cover;border:1.5px solid var(--bd);cursor:pointer" onerror="this.style.display='none'">`;
      } else {
        h+=`<div style="width:52px;height:73px;border-radius:5px;background:var(--s2);border:1.5px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:18px">${typeEmoji(c.supertype)}</div>`;
      }
    });
  }
  h+='</div>';
  h+=`<button class="mb cancel" onclick="closeModal()">閉じる</button>`;
  openModal(`デッキ (${S.deck.length}枚)`,h);
}

function showDeckMenu(){
  openModal('デッキ操作',`
    <button class="mb" onclick="closeModal();drawOne()">1枚ドロー</button>
    <button class="mb" onclick="closeModal();shuffleDeck()">シャッフル</button>
    <button class="mb" onclick="closeModal();viewDeck()">デッキを見る（画像）</button>
    <button class="mb cancel" onclick="closeModal()">閉じる</button>
  `);
}
function takePrize(){if(!S.side.length){toast('サイドが空です');return;}const c=S.side.shift();c._zone='hand';S.hand.push(c);render();toast('サイドを取りました: '+c.name);}
function returnHandToDeck(){S.hand.forEach(c=>c._zone='deck');S.deck.push(...S.hand);S.hand=[];S.deck=shuffle(S.deck);render();toast('手札をデッキに戻してシャッフルしました');}
function sortZone(zone){
  const o=st=>{const c=typeClass(st);return c==='pokemon'?0:c==='trainer'?1:c==='energy'?2:3;};
  const fn=(a,b)=>o(a.supertype)-o(b.supertype)||a.name.localeCompare(b.name,'ja');
  if(zone==='hand')S.hand.sort(fn);else if(zone==='trash')S.trash.sort(fn);
  render();toast('並び替えました');
}
function swapBenchBattle(i){
  const b=S.bench[i],bt=S.battle;
  const tmp={pokemon:bt.pokemon,energy:[...bt.energy],tools:[...bt.tools],statuses:new Set(bt.statuses)};
  bt.pokemon=b.pokemon;bt.energy=[...b.energy];bt.tools=[...b.tools];bt.statuses=new Set(b.statuses);
  b.pokemon=tmp.pokemon;b.energy=tmp.energy;b.tools=tmp.tools;b.statuses=tmp.statuses;
  if(bt.pokemon)bt.pokemon._zone='battle';bt.energy.forEach(c=>c._zone='battle');bt.tools.forEach(c=>c._zone='battle');
  if(b.pokemon)b.pokemon._zone=`bench-${i}`;b.energy.forEach(c=>c._zone=`bench-${i}`);b.tools.forEach(c=>c._zone=`bench-${i}`);
  render();renderStatusMarkers();toast('バトル場とベンチを入れ替えました');
}
function nextTurn(){S.turn++;render();toast(`ターン ${S.turn}`);}

// ============================================================
// MOVE CARD
// ============================================================
window.moveCard=function(cardUid,from,to,si){
  let card=null;

  function rem(zone){
    if(zone==='hand'){const i=S.hand.findIndex(c=>c.uid===cardUid);if(i>=0)card=S.hand.splice(i,1)[0];}
    else if(zone==='deck'){const i=S.deck.findIndex(c=>c.uid===cardUid);if(i>=0)card=S.deck.splice(i,1)[0];}
    else if(zone==='trash'){const i=S.trash.findIndex(c=>c.uid===cardUid);if(i>=0)card=S.trash.splice(i,1)[0];}
    else if(zone==='side'){const i=S.side.findIndex(c=>c.uid===cardUid);if(i>=0)card=S.side.splice(i,1)[0];}
    else if(zone==='stadium'){const i=S.stadium.findIndex(c=>c.uid===cardUid);if(i>=0)card=S.stadium.splice(i,1)[0];}
    else if(zone==='battle'){
      if(S.battle.pokemon?.uid===cardUid){card=S.battle.pokemon;S.battle.pokemon=null;}
      else{
        let i=S.battle.energy.findIndex(c=>c.uid===cardUid);
        if(i>=0){card=S.battle.energy.splice(i,1)[0];return;}
        i=S.battle.tools.findIndex(c=>c.uid===cardUid);
        if(i>=0)card=S.battle.tools.splice(i,1)[0];
      }
    } else if(zone?.startsWith('bench-')){
      const idx=parseInt(zone.split('-')[1]);
      if(S.bench[idx].pokemon?.uid===cardUid){card=S.bench[idx].pokemon;S.bench[idx].pokemon=null;}
      else{
        let i=S.bench[idx].energy.findIndex(c=>c.uid===cardUid);
        if(i>=0){card=S.bench[idx].energy.splice(i,1)[0];return;}
        i=S.bench[idx].tools.findIndex(c=>c.uid===cardUid);
        if(i>=0)card=S.bench[idx].tools.splice(i,1)[0];
      }
    }
  }

  rem(from);if(!card)return;

  const placeOnSlot=(slot,zone)=>{
    card._zone=zone;
    if(isPokemon(card)&&!slot.pokemon){slot.pokemon=card;}
    else if(isEnergy(card)){slot.energy.push(card);}
    else{slot.tools.push(card);}
  };

  if(to==='hand'){card._zone='hand';S.hand.push(card);}
  else if(to==='deck'){card._zone='deck';S.deck.push(card);S.deck=shuffle(S.deck);}
  else if(to==='trash'){card._zone='trash';S.trash.push(card);}
  else if(to==='side'){card._zone='side';S.side.push(card);}
  else if(to==='stadium'){card._zone='stadium';S.stadium.push(card);}
  else if(to==='battle'){placeOnSlot(S.battle,'battle');}
  else if(to==='bench'){const idx=si??0;placeOnSlot(S.bench[idx],`bench-${idx}`);}
  render();
};

// ============================================================
// SWIPE GESTURE（手札からスワイプで移動）
// ============================================================
let swipeCard=null,swipeStartX=0,swipeStartY=0,swipeMoved=false;

function attachSwipe(el,card){
  el.addEventListener('touchstart',e=>{
    swipeCard=card;
    swipeStartX=e.touches[0].clientX;
    swipeStartY=e.touches[0].clientY;
    swipeMoved=false;
  },{passive:true});

  el.addEventListener('touchmove',e=>{
    if(!swipeCard)return;
    const dx=e.touches[0].clientX-swipeStartX;
    const dy=e.touches[0].clientY-swipeStartY;
    if(Math.abs(dx)>12||Math.abs(dy)>12) swipeMoved=true;
  },{passive:true});

  el.addEventListener('touchend',e=>{
    if(!swipeCard||!swipeMoved){swipeCard=null;return;}
    const dx=e.changedTouches[0].clientX-swipeStartX;
    const dy=e.changedTouches[0].clientY-swipeStartY;
    const absDx=Math.abs(dx),absDy=Math.abs(dy);

    if(absDx>60&&absDx>absDy*1.2){
      // 左右スワイプ → バトル場/ベンチ
      if(dx>0){
        // 右スワイプ → バトル場
        moveCard(swipeCard.uid,swipeCard._zone,'battle');
        toast('バトル場に出しました');
      } else {
        // 左スワイプ → ベンチ1
        const emptyBench=S.bench.findIndex(b=>!b.pokemon);
        const idx=emptyBench>=0?emptyBench:0;
        moveCard(swipeCard.uid,swipeCard._zone,'bench',idx);
        toast(`ベンチ${idx+1}に出しました`);
      }
    } else if(absDy>60&&absDy>absDx*1.2){
      if(dy<0){
        // 上スワイプ → スタジアム
        moveCard(swipeCard.uid,swipeCard._zone,'stadium');
        toast('スタジアムに置きました');
      } else {
        // 下スワイプ → トラッシュ
        moveCard(swipeCard.uid,swipeCard._zone,'trash');
        toast('トラッシュに置きました');
      }
    }
    swipeCard=null;swipeMoved=false;
  });
}

// ============================================================
// CARD ELEMENT
// ============================================================
function mkCard(card,facedown=false,small=false){
  const el=document.createElement('div');
  el.className='card '+typeClass(card.supertype)+(facedown?' fd':'');
  el.dataset.uid=card.uid;
  if(small){el.style.width='34px';el.style.height='48px';}

  if(!facedown){
    if(card.imageUrl){
      const img=document.createElement('img');
      img.className='cimg';img.src=card.imageUrl;img.alt=card.name;img.loading='lazy';
      img.onerror=()=>{img.remove();el.appendChild(mkPh(card));};
      el.appendChild(img);
    } else el.appendChild(mkPh(card));
  }

  // タップでメニュー、スワイプで移動（手札のみ）
  if(card._zone==='hand') attachSwipe(el,card);
  el.addEventListener('click',()=>showMenu(card,facedown));
  return el;
}
function mkPh(card){const ph=document.createElement('div');ph.className='cph';ph.textContent=typeEmoji(card.supertype);return ph;}

// ============================================================
// CARD MENU
// ============================================================
function showMenu(card,facedown){
  if(facedown&&card._zone==='side'){
    openModal(card.name,`<button class="mb" onclick="closeModal();moveCard(${card.uid},'side','hand')">手札に取る</button><button class="mb cancel" onclick="closeModal()">閉じる</button>`);
    return;
  }
  const from=card._zone;
  const btns=[];
  const a=(lbl,action,cls='')=>btns.push(`<button class="mb ${cls}" onclick="closeModal();${action}">${lbl}</button>`);

  if(from==='hand'){
    a('バトル場に出す',`moveCard(${card.uid},'hand','battle')`);
    for(let i=0;i<5;i++)a(`ベンチ${i+1}に出す`,`moveCard(${card.uid},'hand','bench',${i})`);
    a('スタジアムに置く',`moveCard(${card.uid},'hand','stadium')`);
    a('トラッシュ',`moveCard(${card.uid},'hand','trash')`,'red');
    a('デッキに戻す',`moveCard(${card.uid},'hand','deck')`);
  } else if(from==='battle'){
    a('手札に戻す',`moveCard(${card.uid},'battle','hand')`);
    a('トラッシュ',`moveCard(${card.uid},'battle','trash')`,'red');
    a('デッキに戻す',`moveCard(${card.uid},'battle','deck')`);
  } else if(from?.startsWith('bench-')){
    a('バトル場に出す',`moveCard(${card.uid},'${from}','battle')`);
    a('手札に戻す',`moveCard(${card.uid},'${from}','hand')`);
    a('トラッシュ',`moveCard(${card.uid},'${from}','trash')`,'red');
  } else if(from==='trash'){
    a('手札に戻す',`moveCard(${card.uid},'trash','hand')`);
    a('デッキに戻す',`moveCard(${card.uid},'trash','deck')`);
  } else if(from==='side'){
    a('手札に取る',`moveCard(${card.uid},'side','hand')`);
  } else if(from==='stadium'){
    a('トラッシュ',`moveCard(${card.uid},'stadium','trash')`,'red');
    a('手札に戻す',`moveCard(${card.uid},'stadium','hand')`);
  }
  a('閉じる','','cancel');
  openModal(card.name,btns.join(''));
}

// ============================================================
// RENDER
// ============================================================
function rList(id,cards,fd=false){
  const el=document.getElementById(id);if(!el)return;
  el.innerHTML='';cards.forEach(c=>el.appendChild(mkCard(c,fd)));
}

function renderSlot(slot,pId,eId,tId,slotClass){
  const pp=document.getElementById(pId);
  const ep=document.getElementById(eId);
  const tp=document.getElementById(tId);
  const slotEl=document.getElementById(slotClass)||document.querySelector(`[id="${slotClass}"]`);
  if(!pp||!ep||!tp)return;

  pp.innerHTML='';
  // エネルギーラベルを保持
  ep.innerHTML='<div class="energy-area-label">エネルギー</div>';
  tp.innerHTML='<div class="tool-area-label">どうぐ・その他</div>';

  if(slot.pokemon){
    pp.appendChild(mkCard(slot.pokemon));
  }
  slot.energy.forEach(c=>ep.appendChild(mkCard(c,false,true)));
  slot.tools.forEach(c=>tp.appendChild(mkCard(c,false,true)));
}

function render(){
  document.getElementById('cnt-deck').textContent=S.deck.length;
  document.getElementById('pile-cnt').textContent=S.deck.length;
  document.getElementById('cnt-hand').textContent=S.hand.length;
  document.getElementById('cnt-side').textContent=S.side.length;
  document.getElementById('cnt-trash').textContent=S.trash.length;
  document.getElementById('cnt-stadium').textContent=S.stadium.length;
  document.getElementById('hpr').textContent=S.side.length;
  document.getElementById('htr').textContent=S.turn;

  rList('cards-hand',S.hand);
  rList('cards-trash',S.trash);
  rList('cards-stadium',S.stadium);
  rList('cards-side',S.side,true);

  // バトル場
  renderSlot(S.battle,'bp','ba-energy','ba-tool','bslot');
  document.getElementById('bslot').classList.toggle('occ',!!S.battle.pokemon);

  // ベンチ
  S.bench.forEach((b,i)=>{
    renderSlot(b,`bp-${i}`,`be-${i}`,`bt-${i}`,`bnslot-${i}`);
    document.querySelector(`.bnslot[data-si="${i}"]`)?.classList.toggle('occ',!!b.pokemon);
  });

  renderStatusMarkers();
}

// ============================================================
// BENCH SETUP
// ============================================================
function setupBench(){
  const con=document.getElementById('bench-slots');con.innerHTML='';
  for(let i=0;i<5;i++){
    const s=document.createElement('div');
    s.className='bnslot';s.dataset.si=i;
    s.innerHTML=`
      <div class="snum">${i+1}</div>
      <div class="pokemon-area" id="bp-${i}"></div>
      <div class="energy-area" id="be-${i}"><div class="energy-area-label">エネルギー</div></div>
      <div class="tool-area" id="bt-${i}"><div class="tool-area-label">どうぐ</div></div>
      <button class="swpbtn" onclick="swapBenchBattle(${i})">⇄ バトル</button>
    `;
    con.appendChild(s);
  }
}
