<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>ポケカ一人回し</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--acc:#1b5e20;--acc2:#2e7d32;--acc3:#43a047;--s1:rgba(255,255,255,0.93);--s2:rgba(232,245,233,0.93);--s3:rgba(200,230,201,0.9);--bd:rgba(165,214,167,0.8);--bd2:#66bb6a;--tx:#1b2e1b;--tx2:#3d5a3d;--tx3:#6a8f6a;--rd:#c62828;--pu:#6a1b9a;--shadow:0 2px 8px rgba(0,0,0,0.22);--cw:56px;--ch:78px;}
html,body{height:100%;color:var(--tx);font-family:"Hiragino Kaku Gothic Pro","Noto Sans JP",sans-serif;font-size:13px;overflow:hidden;touch-action:manipulation}
#app{display:flex;flex-direction:column;height:100dvh;position:relative}
#playmat-bg{position:fixed;inset:0;z-index:0;background:#2d6a2d}
#playmat-bg img{width:100%;height:100%;object-fit:cover;display:none}
#hdr{position:relative;z-index:10;background:rgba(27,94,32,0.94);color:#fff;padding:5px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;min-height:44px;backdrop-filter:blur(4px)}
#hdr h1{font-size:13px;font-weight:700;color:#fff;white-space:nowrap}
.hbtn{background:rgba(255,255,255,0.18);border:1px solid rgba(255,255,255,0.35);color:#fff;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:12px;white-space:nowrap}
.hbtn:hover{background:rgba(255,255,255,0.28)}
.hbtn:disabled{opacity:.4;cursor:not-allowed}
.hbtn.go{background:#fff;color:var(--acc);font-weight:700}
#main{position:relative;z-index:5;display:flex;flex-direction:column;flex:1;overflow:hidden;padding:8px;gap:6px}
#field{display:grid;grid-template-columns:100px 1fr 90px;grid-template-rows:auto auto;gap:8px;flex-shrink:0}
#col-side{grid-column:1;grid-row:1/3;display:flex;flex-direction:column;gap:4px}
#zone-side{background:var(--s1);border:1.5px solid rgba(255,255,255,0.65);border-radius:10px;padding:6px;box-shadow:var(--shadow);flex:1}
#zone-side .zone-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.zone-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--acc2)}
.zone-cnt{background:var(--s2);color:var(--acc3);font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px}
#cards-side{display:grid;grid-template-columns:1fr 1fr;gap:3px}
#cards-side .card{width:100%;height:60px}
#col-center-top{grid-column:2;grid-row:1;display:flex;align-items:flex-start;gap:8px;justify-content:center}
#zone-coin{background:var(--s1);border:1.5px solid rgba(255,255,255,0.65);border-radius:10px;padding:6px;box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0;width:78px}
.coin-face{width:54px;height:54px;border-radius:50%;object-fit:cover;cursor:pointer;border:3px solid #c8a000;box-shadow:0 2px 8px rgba(0,0,0,.35)}
.coin-face.flip-anim{animation:coinflip .4s ease}
@keyframes coinflip{0%{transform:scaleX(1)}50%{transform:scaleX(0)}100%{transform:scaleX(1)}}
.coin-result{font-size:10px;font-weight:700;color:var(--acc);text-align:center;min-height:15px}
.coin-hist{font-size:9px;color:var(--tx3);text-align:center;min-height:12px}
.coin-btn{background:var(--acc2);color:#fff;border:none;padding:4px;border-radius:5px;cursor:pointer;font-size:10px;font-weight:700;width:100%}
#zone-battle{background:rgba(255,255,255,0.9);border:2px solid rgba(255,255,255,0.7);border-radius:12px;padding:8px;box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;min-width:200px}
.pokemon-area{display:flex;justify-content:center;align-items:center;min-height:80px}
.sub-zone{background:rgba(255,255,255,0.7);border:1px dashed var(--bd2);border-radius:5px;padding:3px;min-height:26px;display:flex;flex-wrap:wrap;gap:2px;width:100%}
.sub-label{font-size:8px;color:var(--tx3);width:100%;margin-bottom:1px;font-weight:600}
.sub-zone .card{width:30px;height:42px}
.status-markers{display:flex;flex-wrap:wrap;gap:2px;justify-content:center;width:100%}
.smark{padding:2px 4px;border-radius:3px;font-size:9px;font-weight:700;cursor:pointer;border:none}
.smark.off{background:var(--s3);color:var(--tx3)}
.smark.やけど{background:#c62828;color:#fff}
.smark.どく{background:#6a1b9a;color:#fff}
.smark.ねむり{background:#1565c0;color:#fff}
.smark.まひ{background:#e65100;color:#fff}
.smark.こんらん{background:#880e4f;color:#fff}
#zone-stadium{background:rgba(253,244,255,0.93);border:1.5px solid rgba(106,27,154,0.4);border-radius:10px;padding:6px;box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;width:74px}
#zone-stadium .zone-title{color:var(--pu);font-size:9px}
#cards-stadium{display:flex;align-items:center;justify-content:center;min-height:78px}
#zone-free{background:rgba(255,255,255,0.75);border:1.5px dashed rgba(255,255,255,0.6);border-radius:10px;padding:6px;box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;width:74px}
#zone-free .zone-title{color:var(--tx3);font-size:9px}
#cards-free{display:flex;flex-wrap:wrap;gap:2px;align-items:flex-start;justify-content:center;min-height:78px}
#cards-free .card{width:30px;height:42px}
#col-center-bottom{grid-column:2;grid-row:2}
#zone-bench{background:rgba(255,255,255,0.85);border:1.5px solid rgba(255,255,255,0.65);border-radius:10px;padding:6px 8px;box-shadow:var(--shadow)}
#bench-slots{display:flex;gap:6px;justify-content:center}
.bnslot{background:rgba(255,255,255,0.6);border:1.5px dashed var(--bd2);border-radius:8px;padding:4px;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:72px}
.bnslot.occ{border-style:solid;border-color:var(--acc3);background:rgba(241,248,241,0.9)}
.snum{font-size:9px;color:var(--tx3);font-weight:600}
.bnslot .sub-zone{min-height:20px}
.bnslot .sub-zone .card{width:24px;height:34px}
.swpbtn{background:var(--acc2);color:#fff;border:none;padding:2px 5px;border-radius:4px;cursor:pointer;font-size:9px;margin-top:2px;font-weight:600}
#col-right{grid-column:3;grid-row:1/3;display:flex;flex-direction:column;gap:5px}
.r-zone{background:var(--s1);border:1.5px solid rgba(255,255,255,0.65);border-radius:10px;padding:6px;box-shadow:var(--shadow)}
.r-zone-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.dpile{width:56px;height:78px;border-radius:6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;position:relative;box-shadow:var(--shadow);margin:0 auto 4px}
.dpile-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:brightness(.65)}
.dpile-info{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center}
.dpile-cnt{font-size:18px;font-weight:700;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.9)}
.dpile-lbl{font-size:9px;color:rgba(255,255,255,.9)}
#zone-trash .zcards{display:flex;flex-wrap:wrap;gap:3px;min-height:180px;align-content:flex-start}
#zone-trash .zcards .card{width:38px;height:53px}
#hand-area{background:rgba(255,255,255,0.9);border:1.5px solid rgba(255,255,255,0.7);border-radius:10px;padding:6px 8px;box-shadow:var(--shadow);flex-shrink:0}
#hand-head{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.zcards{display:flex;flex-wrap:wrap;gap:3px;align-content:flex-start}
#cards-hand{flex-wrap:nowrap;overflow-x:auto;min-height:82px}
#cards-hand::-webkit-scrollbar{height:3px}
.card{width:var(--cw);height:var(--ch);border-radius:6px;border:1.5px solid rgba(255,255,255,.5);cursor:grab;position:relative;display:flex;align-items:center;justify-content:center;user-select:none;overflow:hidden;flex-shrink:0;transition:transform .1s,box-shadow .1s;box-shadow:var(--shadow)}
.card:hover{transform:translateY(-2px);box-shadow:0 5px 14px rgba(0,0,0,.3)}
.card.dragging{opacity:.35;pointer-events:none}
.drag-ghost{position:fixed;pointer-events:none;z-index:9999;opacity:.9;transform:scale(1.12);box-shadow:0 8px 24px rgba(0,0,0,.35);border-radius:6px;overflow:hidden}
.cimg{width:100%;height:100%;object-fit:cover;border-radius:4px;display:block}
.cph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:22px;background:var(--s2)}
.drop-target{outline:3px solid #ffee58!important;outline-offset:2px;background:rgba(255,238,88,0.12)!important}
.sbtn{width:100%;background:var(--s2);border:1px solid var(--bd);color:var(--tx2);padding:4px;border-radius:5px;cursor:pointer;font-size:11px;margin-top:3px;display:block;font-weight:500}
.sbtn:hover{background:var(--s3)}
.setting-item{margin-bottom:14px}
.setting-label{font-size:12px;font-weight:700;color:var(--acc2);margin-bottom:5px;display:block}
.setting-file{display:none}
.sup-btn{background:var(--s2);border:1px solid var(--bd2);color:var(--acc2);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600}
.del-btn{background:none;border:none;color:#c62828;font-size:11px;cursor:pointer;margin-left:8px;text-decoration:underline}
#mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;align-items:flex-end;justify-content:center}
#mbg.open{display:flex}
#mbox{background:var(--s1);border-radius:18px 18px 0 0;padding:16px;width:100%;max-width:500px;max-height:88vh;overflow-y:auto;box-shadow:0 -4px 20px rgba(0,0,0,.2)}
.modal-handle{width:36px;height:4px;background:var(--bd2);border-radius:2px;margin:0 auto 12px}
#mbox h3{font-size:14px;color:var(--acc);margin-bottom:12px;font-weight:700}
.mb{display:block;width:100%;background:var(--s2);border:1px solid var(--bd);color:var(--tx);padding:11px 14px;border-radius:8px;cursor:pointer;text-align:left;font-size:13px;margin-bottom:6px;font-weight:500}
.mb:hover{background:var(--s3)}
.mb.cancel{color:var(--tx3);background:rgba(255,255,255,.7)}
.mb.red{color:#c62828;background:#fff5f5}
.mb.go{background:var(--acc2);color:#fff;font-weight:700}
#deck-grid{display:flex;flex-wrap:wrap;gap:4px;max-height:300px;overflow-y:auto;padding:4px;background:var(--s2);border-radius:8px;margin-bottom:10px}
#deck-input-area{display:flex;flex-direction:column;gap:8px}
#deck-input-area input{background:var(--s2);border:1.5px solid var(--bd2);color:var(--tx);padding:10px;border-radius:8px;font-size:14px;width:100%}
.input-hint{font-size:11px;color:var(--tx3);line-height:1.7;padding:8px;background:var(--s2);border-radius:6px}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--acc);color:#fff;padding:8px 18px;border-radius:20px;font-size:12px;opacity:0;pointer-events:none;transition:opacity .25s;z-index:2000;white-space:nowrap;max-width:88vw;box-shadow:0 3px 12px rgba(0,0,0,.25);font-weight:600}
#toast.show{opacity:1}
#loading{display:none;position:fixed;inset:0;background:rgba(255,255,255,.92);z-index:3000;flex-direction:column;align-items:center;justify-content:center;gap:16px}
#loading.open{display:flex}
.spin{width:36px;height:36px;border:3px solid var(--bd);border-top-color:var(--acc2);border-radius:50%;animation:sp .75s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#lmsg{font-size:13px;color:var(--tx2);text-align:center;padding:0 20px}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
</style>
</head>
<body>
<div id="playmat-bg"><img id="playmat-img" src="" alt=""></div>
<div id="app">
  <div id="hdr">
    <h1>🃏 POKÉCA SOLO</h1>
    <button class="hbtn" onclick="showDeckInput()">📋 デッキ読み込み</button>
    <button class="hbtn go" id="btn-start" disabled>ゲーム開始</button>
    <button class="hbtn" onclick="doReset()">↺ リセット</button>
    <div style="flex:1"></div>
    <button class="hbtn" onclick="showSettings()">⚙️</button>
  </div>
  <div id="main">
    <div id="field">
      <div id="col-side">
        <div id="zone-side" class="r-zone">
          <div class="zone-head"><span class="zone-title">サイド</span><span class="zone-cnt" id="cnt-side">0</span></div>
          <div id="cards-side"></div>
          <button class="sbtn" onclick="takePrize()">1枚取る</button>
        </div>
      </div>
      <div id="col-center-top">
        <div id="zone-coin">
          <div class="zone-title" style="margin-bottom:4px">コイン</div>
          <img id="coin-display" class="coin-face" src="" alt="coin" onclick="flipCoin()">
          <div class="coin-result" id="coin-result"></div>
          <div class="coin-hist" id="coin-hist"></div>
          <button class="coin-btn" onclick="flipCoin()">投げる</button>
        </div>
        <div id="zone-battle" data-dropzone="battle">
          <div style="font-size:10px;font-weight:700;color:var(--rd);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px">バトル場</div>
          <div class="pokemon-area" id="bp"></div>
          <div class="sub-zone" id="ba-energy"><div class="sub-label">エネルギー</div></div>
          <div class="sub-zone" id="ba-tool"><div class="sub-label">どうぐ</div></div>
          <div class="status-markers" id="battle-markers" style="margin-top:4px">
            <button class="smark off" data-status="やけど" onclick="toggleStatus('やけど')">🔥</button>
            <button class="smark off" data-status="どく" onclick="toggleStatus('どく')">☠</button>
            <button class="smark off" data-status="ねむり" onclick="toggleStatus('ねむり')">💤</button>
            <button class="smark off" data-status="まひ" onclick="toggleStatus('まひ')">⚡</button>
            <button class="smark off" data-status="こんらん" onclick="toggleStatus('こんらん')">😵</button>
          </div>
        </div>
        <div id="zone-stadium" data-dropzone="stadium">
          <div class="zone-title" style="color:var(--pu);margin-bottom:4px">スタジアム</div>
          <div id="cards-stadium"></div>
        </div>
        <div id="zone-free" data-dropzone="free">
          <div class="zone-title" style="margin-bottom:4px">フリー</div>
          <div id="cards-free"></div>
        </div>
      </div>
      <div id="col-center-bottom">
        <div id="zone-bench">
          <div style="font-size:10px;font-weight:700;color:var(--acc2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px">ベンチ</div>
          <div id="bench-slots"></div>
        </div>
      </div>
      <div id="col-right">
        <div class="r-zone">
          <div class="r-zone-head"><span class="zone-title">デッキ</span><span class="zone-cnt" id="cnt-deck">0</span></div>
          <div class="dpile" onclick="showDeckMenu()">
            <img class="dpile-bg" id="dpile-img" src="" alt="">
            <div class="dpile-info"><div class="dpile-cnt" id="pile-cnt">0</div><div class="dpile-lbl">枚</div></div>
          </div>
          <button class="sbtn" onclick="drawOne()">1枚ドロー</button>
          <button class="sbtn" onclick="shuffleDeck()">シャッフル</button>
          <button class="sbtn" onclick="viewDeck()">デッキを見る</button>
        </div>
        <div class="r-zone" id="zone-trash" data-dropzone="trash">
          <div class="r-zone-head"><span class="zone-title">トラッシュ</span><span class="zone-cnt" id="cnt-trash">0</span></div>
          <div class="zcards" id="cards-trash"></div>
          <button class="sbtn" onclick="sortZone('trash')">並び替え</button>
        </div>
      </div>
    </div>
    <div id="hand-area" data-dropzone="hand">
      <div id="hand-head">
        <span class="zone-title">手札</span>
        <span class="zone-cnt" id="cnt-hand">0</span>
        <button class="sbtn" style="width:auto;padding:2px 8px;margin-top:0" onclick="sortZone('hand')">並替</button>
        <button class="sbtn" style="width:auto;padding:2px 8px;margin-top:0" onclick="returnHandToDeck()">デッキに戻す</button>
      </div>
      <div class="zcards" id="cards-hand"></div>
    </div>
  </div>
</div>
<div id="mbg" onclick="closeModal()">
  <div id="mbox" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <h3 id="mtitle">メニュー</h3>
    <div id="mbody"></div>
  </div>
</div>
<div id="loading"><div class="spin"></div><div id="lmsg">読み込み中...</div></div>
<div id="toast"></div>
<script>

let _uid=0;const uid=()=>++_uid;
const SK='pokeca_sim_cfg3';
let CFG={playmat:null,coinFront:null};
function loadSettings(){try{const s=localStorage.getItem(SK);if(s)CFG=JSON.parse(s);}catch(e){}applySettings();}
function saveSettings(){try{localStorage.setItem(SK,JSON.stringify(CFG));}catch(e){};}
function applySettings(){
  const pm=document.getElementById('playmat-img');
  if(CFG.playmat){pm.src=CFG.playmat;pm.style.display='';}else pm.style.display='none';
  document.getElementById('dpile-img').src=CARD_BACK;
  updateCoinDisplay(false);
}
function updateCoinDisplay(isBack){
  document.getElementById('coin-display').src=isBack?COIN_BACK_FIXED:(CFG.coinFront||COIN_FRONT_DEFAULT);
}
function showSettings(){
  const prevEl=(key,w,h,round)=>{
    const src=CFG[key];
    const cls=round?'border-radius:50%':'border-radius:6px';
    if(src)return `<img style="width:${w}px;height:${h}px;object-fit:cover;${cls};border:1.5px solid var(--bd);display:block;margin-bottom:5px" src="${src}">`;
    return `<div style="width:${w}px;height:${h}px;${cls};border:1.5px dashed var(--bd);display:flex;align-items:center;justify-content:center;color:var(--tx3);font-size:11px;margin-bottom:5px">未設定</div>`;
  };
  openModal('設定',`
    <div class="setting-item">
      <span class="setting-label">プレイマット画像</span>
      ${prevEl('playmat',120,70,false)}
      <button class="sup-btn" onclick="document.getElementById('f-mat').click()">画像を選ぶ</button>
      <button class="del-btn" onclick="delSetting('playmat')">削除</button>
      <input class="setting-file" type="file" id="f-mat" accept="image/*" onchange="upSetting('playmat',this)">
    </div>
    <div class="setting-item">
      <span class="setting-label">コイン表面（カスタム）</span>
      ${prevEl('coinFront',54,54,true)}
      <button class="sup-btn" onclick="document.getElementById('f-front').click()">画像を選ぶ</button>
      <button class="del-btn" onclick="delSetting('coinFront')">デフォルトに戻す</button>
      <input class="setting-file" type="file" id="f-front" accept="image/*" onchange="upSetting('coinFront',this)">
    </div>
    <button class="mb cancel" onclick="closeModal()">閉じる</button>
  `);
}
window.upSetting=function(key,input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{CFG[key]=e.target.result;saveSettings();applySettings();showSettings();toast('保存しました');};
  reader.readAsDataURL(file);
};
window.delSetting=function(key){CFG[key]=null;saveSettings();applySettings();showSettings();toast('削除しました');};
let dragCard=null,dragFrom=null,ghostEl=null;
function startDrag(card,el,cx,cy){
  dragCard=card;dragFrom=card._zone;el.classList.add('dragging');
  ghostEl=document.createElement('div');ghostEl.className='drag-ghost';
  ghostEl.style.width=el.offsetWidth+'px';ghostEl.style.height=el.offsetHeight+'px';
  if(card.imageUrl){const img=document.createElement('img');img.src=card.imageUrl;img.style.cssText='width:100%;height:100%;object-fit:cover';ghostEl.appendChild(img);}
  else{ghostEl.style.cssText+=';background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:22px';ghostEl.textContent=typeEmoji(card.supertype);}
  document.body.appendChild(ghostEl);moveGhost(cx,cy);
}
function moveGhost(x,y){if(!ghostEl)return;ghostEl.style.left=(x-28)+'px';ghostEl.style.top=(y-39)+'px';}
function endDrag(cx,cy){
  if(!dragCard)return;
  document.querySelectorAll('.dragging').forEach(e=>e.classList.remove('dragging'));
  document.querySelectorAll('.drop-target').forEach(e=>e.classList.remove('drop-target'));
  if(ghostEl){ghostEl.remove();ghostEl=null;}
  const zone=document.elementFromPoint(cx,cy)?.closest('[data-dropzone]');
  if(zone){const to=zone.dataset.dropzone,si=zone.dataset.si!==undefined?parseInt(zone.dataset.si):undefined;moveCard(dragCard.uid,dragFrom,to,si);}
  dragCard=null;dragFrom=null;
}
document.addEventListener('mousemove',e=>{
  if(!dragCard)return;moveGhost(e.clientX,e.clientY);
  document.querySelectorAll('.drop-target').forEach(el=>el.classList.remove('drop-target'));
  document.elementFromPoint(e.clientX,e.clientY)?.closest('[data-dropzone]')?.classList.add('drop-target');
});
document.addEventListener('mouseup',e=>{if(dragCard)endDrag(e.clientX,e.clientY);});
document.addEventListener('touchmove',e=>{
  if(!dragCard)return;const t=e.touches[0];moveGhost(t.clientX,t.clientY);
  document.querySelectorAll('.drop-target').forEach(el=>el.classList.remove('drop-target'));
  document.elementFromPoint(t.clientX,t.clientY)?.closest('[data-dropzone]')?.classList.add('drop-target');
},{passive:true});
document.addEventListener('touchend',e=>{if(dragCard){const t=e.changedTouches[0];endDrag(t.clientX,t.clientY);}});
function toast(msg,d=2200){const e=document.getElementById('toast');e.textContent=msg;e.classList.add('show');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('show'),d);}
function loading(msg){document.getElementById('lmsg').textContent=msg||'読み込み中...';document.getElementById('loading').classList.add('open');}
function unload(){document.getElementById('loading').classList.remove('open');}
function openModal(title,body){document.getElementById('mtitle').textContent=title;document.getElementById('mbody').innerHTML=body;document.getElementById('mbg').classList.add('open');}
function closeModal(){document.getElementById('mbg').classList.remove('open');}
function typeClass(st){if(!st)return'';const s=st.toLowerCase();if(s[0]==='p')return'pokemon';if(s[0]==='e')return'energy';if(s[0]==='t')return'trainer';return'';}
function typeEmoji(st){const c=typeClass(st);return c==='pokemon'?'⚡':c==='energy'?'⬡':c==='trainer'?'♟':'🃏';}
function isEnergy(c){return typeClass(c.supertype)==='energy';}
function isPokemon(c){return typeClass(c.supertype)==='pokemon';}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
const S={deck:[],hand:[],side:[],trash:[],stadium:[],free:[],battle:{pokemon:null,energy:[],tools:[],statuses:new Set()},bench:Array(5).fill(0).map(()=>({pokemon:null,energy:[],tools:[],statuses:new Set()})),turn:0,gameStarted:false};
let coinHist=[];
function flipCoin(){
  const el=document.getElementById('coin-display');
  el.classList.remove('flip-anim');void el.offsetWidth;el.classList.add('flip-anim');
  setTimeout(()=>{
    const heads=Math.random()<.5;updateCoinDisplay(!heads);
    document.getElementById('coin-result').textContent=heads?'⭕ 表':'❌ 裏';
    coinHist.unshift(heads?'⭕':'❌');if(coinHist.length>5)coinHist.pop();
    document.getElementById('coin-hist').textContent=coinHist.join(' ');
    toast(heads?'おもて！':'うら！');el.classList.remove('flip-anim');
  },200);
}
function toggleStatus(status){
  if(S.battle.statuses.has(status))S.battle.statuses.delete(status);else S.battle.statuses.add(status);
  renderStatusMarkers();toast(S.battle.statuses.has(status)?status+'になった':status+'が回復した');
}
function renderStatusMarkers(){
  document.getElementById('battle-markers')?.querySelectorAll('.smark').forEach(btn=>{
    const st=btn.dataset.status;btn.className='smark '+(S.battle.statuses.has(st)?st:'off');
  });
}
function showDeckInput(){
  openModal('デッキを読み込む',`
    <div id="deck-input-area">
      <div class="input-hint"><b>公式デッキコード（XXXX-XXXX-XXXX）</b>を入力してください</div>
      <input id="deck-code-field" type="text" placeholder="例: NHLngn-GoqcNM-n9gNgn" autocomplete="off">
      <button class="mb go" onclick="loadByDeckCode()">デッキコードで読み込む</button>
      <button class="mb cancel" onclick="closeModal()">閉じる</button>
    </div>
  `);
  setTimeout(()=>document.getElementById('deck-code-field')?.focus(),100);
}
async function loadByDeckCode(){
  const code=document.getElementById('deck-code-field').value.trim();
  if(!code){toast('デッキコードを入力してください');return;}
  if(!/^[a-zA-Z0-9]+-[a-zA-Z0-9]+-[a-zA-Z0-9]+$/.test(code)){toast('形式が違います');return;}
  closeModal();loading('デッキコードを解析中...');
  try{
    document.getElementById('lmsg').textContent='カードデータを取得中...';
    const res=await fetch(WORKER+'?code='+encodeURIComponent(code));
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();
    if(data.error){unload();toast('エラー: '+data.error);return;}
    if(!data.cards||!data.cards.length){unload();toast('カードが取得できませんでした');return;}
    const cards=[];
    data.cards.forEach(c=>{for(let i=0;i<c.count;i++)cards.push({uid:uid(),name:c.name||'不明',supertype:c.supertype||'Pokémon',imageUrl:c.imageUrl||null,_zone:'deck'});});
    S.deck=shuffle(cards);S.gameStarted=false;resetField();
    document.getElementById('btn-start').disabled=false;
    unload();render();toast(cards.length+'枚のデッキを読み込みました！');
  }catch(e){unload();toast('エラー: '+e.message);}
}
function startGame(){
  if(!S.gameStarted&&S.deck.length<13){toast('デッキが不足しています');return;}
  if(S.gameStarted){
    const all=[...S.deck,...S.hand,...S.side,...S.trash,...S.stadium,...S.free,...(S.battle.pokemon?[S.battle.pokemon]:[]),...S.battle.energy,...S.battle.tools,...S.bench.flatMap(b=>[...(b.pokemon?[b.pokemon]:[]),...b.energy,...b.tools])];
    all.forEach(c=>c._zone='deck');S.deck=shuffle(all);
  }
  resetField();S.deck=shuffle(S.deck);
  S.hand=S.deck.splice(0,7);S.hand.forEach(c=>c._zone='hand');
  S.side=S.deck.splice(0,6);S.side.forEach(c=>c._zone='side');
  S.gameStarted=true;render();toast('ゲーム開始！手札7枚・サイド6枚');
}
function resetField(){
  S.hand=[];S.side=[];S.trash=[];S.stadium=[];S.free=[];
  S.battle={pokemon:null,energy:[],tools:[],statuses:new Set()};
  S.bench=Array(5).fill(0).map(()=>({pokemon:null,energy:[],tools:[],statuses:new Set()}));
  S.turn=0;renderStatusMarkers();
}
function doReset(){
  const all=[...S.deck,...S.hand,...S.side,...S.trash,...S.stadium,...S.free,...(S.battle.pokemon?[S.battle.pokemon]:[]),...S.battle.energy,...S.battle.tools,...S.bench.flatMap(b=>[...(b.pokemon?[b.pokemon]:[]),...b.energy,...b.tools])];
  all.forEach(c=>c._zone='deck');S.deck=shuffle(all);resetField();
  S.gameStarted=false;document.getElementById('btn-start').disabled=false;render();toast('リセットしました');
}
function drawOne(){if(!S.deck.length){toast('デッキが空です');return;}const c=S.deck.shift();c._zone='hand';S.hand.push(c);render();toast('ドロー: '+c.name);}
function shuffleDeck(){S.deck=shuffle(S.deck);render();toast('シャッフルしました');}
function viewDeck(){
  let h='<div id="deck-grid">';
  if(!S.deck.length)h+='<div style="color:var(--tx3);padding:20px;font-size:12px;width:100%;text-align:center">デッキが空です</div>';
  else S.deck.forEach(c=>{
    h+=`<div style="display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer" onclick="pickFromDeck(${c.uid})">`;
    h+=`<img src="${c.imageUrl||CARD_BACK}" title="${c.name}" style="width:50px;height:70px;border-radius:5px;object-fit:cover;border:1.5px solid var(--bd)">`;
    h+=`<div style="font-size:8px;color:var(--tx3);text-align:center;max-width:50px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${c.name}</div></div>`;
  });
  h+='</div><p style="font-size:11px;color:var(--tx3);margin-bottom:8px">タップで手札に加えます</p><button class="mb cancel" onclick="closeModal()">閉じる</button>';
  openModal(`デッキ (${S.deck.length}枚)`,h);
}
window.pickFromDeck=function(cardUid){
  const i=S.deck.findIndex(c=>c.uid===cardUid);if(i<0)return;
  const card=S.deck.splice(i,1)[0];card._zone='hand';S.hand.push(card);render();viewDeck();toast('手札に加えました: '+card.name);
};
function showDeckMenu(){
  openModal('デッキ操作',`
    <button class="mb" onclick="closeModal();drawOne()">1枚ドロー</button>
    <button class="mb" onclick="closeModal();shuffleDeck()">シャッフル</button>
    <button class="mb" onclick="closeModal();viewDeck()">デッキを見る（画像）</button>
    <button class="mb cancel" onclick="closeModal()">閉じる</button>
  `);
}
function takePrize(){if(!S.side.length){toast('サイドが空です');return;}const c=S.side.shift();c._zone='hand';S.hand.push(c);render();toast('サイドを取りました');}
function returnHandToDeck(){S.hand.forEach(c=>c._zone='deck');S.deck.push(...S.hand);S.hand=[];S.deck=shuffle(S.deck);render();toast('手札をデッキに戻してシャッフルしました');}
function sortZone(zone){
  const o=st=>{const c=typeClass(st);return c==='pokemon'?0:c==='trainer'?1:c==='energy'?2:3;};
  const fn=(a,b)=>o(a.supertype)-o(b.supertype)||a.name.localeCompare(b.name,'ja');
  if(zone==='hand')S.hand.sort(fn);else if(zone==='trash')S.trash.sort(fn);render();toast('並び替えました');
}
function swapBenchBattle(i){
  const b=S.bench[i],bt=S.battle;
  const tmp={pokemon:bt.pokemon,energy:[...bt.energy],tools:[...bt.tools],statuses:new Set(bt.statuses)};
  bt.pokemon=b.pokemon;bt.energy=[...b.energy];bt.tools=[...b.tools];bt.statuses=new Set(b.statuses);
  b.pokemon=tmp.pokemon;b.energy=tmp.energy;b.tools=tmp.tools;b.statuses=tmp.statuses;
  const sz=(slot,z)=>{if(slot.pokemon)slot.pokemon._zone=z;slot.energy.forEach(c=>c._zone=z);slot.tools.forEach(c=>c._zone=z);};
  sz(bt,'battle');sz(b,'bench-'+i);render();renderStatusMarkers();toast('バトル場とベンチを入れ替えました');
}
window.moveCard=function(cardUid,from,to,si){
  let card=null;
  function rem(zone){
    const flat={hand:S.hand,deck:S.deck,trash:S.trash,side:S.side,stadium:S.stadium,free:S.free};
    if(flat[zone]){const i=flat[zone].findIndex(c=>c.uid===cardUid);if(i>=0)card=flat[zone].splice(i,1)[0];return;}
    if(zone==='battle'){
      if(S.battle.pokemon?.uid===cardUid){card=S.battle.pokemon;S.battle.pokemon=null;return;}
      let i=S.battle.energy.findIndex(c=>c.uid===cardUid);if(i>=0){card=S.battle.energy.splice(i,1)[0];return;}
      i=S.battle.tools.findIndex(c=>c.uid===cardUid);if(i>=0){card=S.battle.tools.splice(i,1)[0];return;}
    }
    if(zone&&zone.startsWith('bench-')){
      const idx=parseInt(zone.split('-')[1]),bx=S.bench[idx];
      if(bx.pokemon&&bx.pokemon.uid===cardUid){card=bx.pokemon;bx.pokemon=null;return;}
      let i=bx.energy.findIndex(c=>c.uid===cardUid);if(i>=0){card=bx.energy.splice(i,1)[0];return;}
      i=bx.tools.findIndex(c=>c.uid===cardUid);if(i>=0){card=bx.tools.splice(i,1)[0];return;}
    }
  }
  rem(from);if(!card)return;
  const place=(slot,zone)=>{card._zone=zone;if(isPokemon(card)&&!slot.pokemon)slot.pokemon=card;else if(isEnergy(card))slot.energy.push(card);else slot.tools.push(card);};
  if(to==='hand'){card._zone='hand';S.hand.push(card);}
  else if(to==='deck'){card._zone='deck';S.deck.push(card);S.deck=shuffle(S.deck);}
  else if(to==='trash'){card._zone='trash';S.trash.push(card);}
  else if(to==='side'){card._zone='side';S.side.push(card);}
  else if(to==='stadium'){card._zone='stadium';S.stadium.push(card);}
  else if(to==='free'){card._zone='free';S.free.push(card);}
  else if(to==='battle'){place(S.battle,'battle');}
  else if(to==='bench'){const idx=si!=null?si:0;place(S.bench[idx],'bench-'+idx);}
  render();
};
function mkCard(card,facedown){
  const el=document.createElement('div');
  el.className='card '+typeClass(card.supertype)+(facedown?' fd':'');
  el.dataset.uid=card.uid;
  if(!facedown){
    if(card.imageUrl){const img=document.createElement('img');img.className='cimg';img.src=card.imageUrl;img.alt=card.name;img.loading='lazy';img.draggable=false;img.onerror=()=>{img.remove();el.appendChild(mkPh(card));};el.appendChild(img);}
    else el.appendChild(mkPh(card));
    el.addEventListener('mousedown',e=>{if(e.button!==0)return;e.preventDefault();startDrag(card,el,e.clientX,e.clientY);});
    el.addEventListener('touchstart',e=>{startDrag(card,el,e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  }else{
    const img=document.createElement('img');img.className='cimg';img.src=CARD_BACK;img.alt='back';img.draggable=false;el.appendChild(img);
  }
  el.addEventListener('click',()=>{if(dragCard)return;showMenu(card,facedown);});
  return el;
}
function mkPh(card){const ph=document.createElement('div');ph.className='cph';ph.textContent=typeEmoji(card.supertype);return ph;}
function showMenu(card,facedown){
  if(facedown&&card._zone==='side'){
    openModal('サイド',`<button class="mb" onclick="closeModal();moveCard(${card.uid},'side','hand')">手札に取る</button><button class="mb cancel" onclick="closeModal()">閉じる</button>`);
    return;
  }
  const from=card._zone;const btns=[];
  const a=(lbl,action,cls='')=>btns.push(`<button class="mb ${cls}" onclick="closeModal();${action}">${lbl}</button>`);
  a('トラッシュに置く',`moveCard(${card.uid},'${from}','trash')`,'red');
  a('デッキに戻す',`moveCard(${card.uid},'${from}','deck')`);
  if(from==='trash')a('手札に戻す',`moveCard(${card.uid},'trash','hand')`);
  a('閉じる','','cancel');
  openModal(card.name,btns.join(''));
}
function rList(id,cards,fd){const el=document.getElementById(id);if(!el)return;el.innerHTML='';cards.forEach(c=>el.appendChild(mkCard(c,fd)));}
function renderSlot(slot,pId,eId,tId){
  const pp=document.getElementById(pId),ep=document.getElementById(eId),tp=document.getElementById(tId);
  if(!pp||!ep||!tp)return;
  pp.innerHTML='';ep.innerHTML='<div class="sub-label">エネルギー</div>';tp.innerHTML='<div class="sub-label">どうぐ</div>';
  if(slot.pokemon)pp.appendChild(mkCard(slot.pokemon));
  slot.energy.forEach(c=>{const el=mkCard(c);el.style.width='30px';el.style.height='42px';ep.appendChild(el);});
  slot.tools.forEach(c=>{const el=mkCard(c);el.style.width='30px';el.style.height='42px';tp.appendChild(el);});
}
function render(){
  document.getElementById('cnt-deck').textContent=S.deck.length;
  document.getElementById('pile-cnt').textContent=S.deck.length;
  document.getElementById('cnt-hand').textContent=S.hand.length;
  document.getElementById('cnt-side').textContent=S.side.length;
  document.getElementById('cnt-trash').textContent=S.trash.length;
  document.getElementById('cnt-stadium').textContent=S.stadium.length;
  rList('cards-hand',S.hand,false);
  rList('cards-trash',S.trash,false);
  rList('cards-free',S.free,false);
  const se=document.getElementById('cards-side');se.innerHTML='';S.side.forEach(c=>se.appendChild(mkCard(c,true)));
  const st=document.getElementById('cards-stadium');st.innerHTML='';
  if(S.stadium.length>0){
    st.appendChild(mkCard(S.stadium[S.stadium.length-1]));
    if(S.stadium.length>1){const b=document.createElement('div');b.style.cssText='font-size:9px;color:var(--pu);font-weight:700;text-align:center;margin-top:2px';b.textContent='+'+(S.stadium.length-1);st.appendChild(b);}
  }
  renderSlot(S.battle,'bp','ba-energy','ba-tool');
  S.bench.forEach((b,i)=>{renderSlot(b,'bp-'+i,'be-'+i,'bt-'+i);document.querySelector('.bnslot[data-si="'+i+'"]')?.classList.toggle('occ',!!b.pokemon);});
  renderStatusMarkers();
}
function setupBench(){
  const con=document.getElementById('bench-slots');con.innerHTML='';
  for(let i=0;i<5;i++){
    const s=document.createElement('div');s.className='bnslot';s.dataset.si=i;s.dataset.dropzone='bench';
    s.innerHTML=`<div class="snum">${i+1}</div><div class="pokemon-area" id="bp-${i}"></div><div class="sub-zone" id="be-${i}"><div class="sub-label">エネルギー</div></div><div class="sub-zone" id="bt-${i}"><div class="sub-label">どうぐ</div></div><button class="swpbtn" onclick="swapBenchBattle(${i})">⇄ バトル</button>`;
    con.appendChild(s);
  }
}
document.getElementById('btn-start').addEventListener('click',startGame);
setupBench();loadSettings();render();

</script>
</body>
</html>
