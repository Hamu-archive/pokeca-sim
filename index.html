<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ポケカ一人回し</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d1117;--s1:#161b22;--s2:#1f2937;--s3:#2d3748;
  --bd:#30363d;--bd2:#4a5568;
  --acc:#f59e0b;--bl:#3b82f6;--rd:#ef4444;--gr:#10b981;--pu:#8b5cf6;
  --tx:#e6edf3;--tx2:#8b949e;--tx3:#6e7681;
  --cw:52px;--ch:72px;
}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Hiragino Kaku Gothic Pro','Noto Sans JP',sans-serif;font-size:13px;overflow:hidden;touch-action:manipulation}
#app{display:flex;flex-direction:column;height:100dvh}

/* HEADER */
#hdr{background:var(--s1);border-bottom:1px solid var(--bd);padding:5px 10px;display:flex;align-items:center;gap:6px;flex-shrink:0;flex-wrap:wrap;min-height:42px}
#hdr h1{font-size:12px;font-weight:700;color:var(--acc);white-space:nowrap}
.hbtn{background:var(--s2);border:1px solid var(--bd);color:var(--tx);padding:5px 9px;border-radius:6px;cursor:pointer;font-size:12px;white-space:nowrap;transition:background .15s;touch-action:manipulation}
.hbtn:hover,.hbtn:active{background:var(--s3)}
.hbtn:disabled{opacity:.4;cursor:not-allowed}
.hbtn.go{background:var(--acc);color:#000;font-weight:700;border-color:var(--acc)}
.hbtn.go:active{background:#d97706}
.badge{background:var(--s2);border:1px solid var(--bd);padding:3px 7px;border-radius:5px;font-size:11px;color:var(--tx2);white-space:nowrap}
.badge b{color:var(--acc)}

/* MAIN */
#main{display:flex;flex:1;overflow:hidden}
#field{flex:1;display:flex;flex-direction:column;gap:4px;padding:5px;overflow-y:auto;min-width:0}
#sb{width:140px;flex-shrink:0;background:var(--s1);border-left:1px solid var(--bd);display:flex;flex-direction:column;gap:4px;padding:5px;overflow-y:auto}

/* ZONES */
.zone{background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:5px}
.zh{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;gap:4px;flex-wrap:wrap}
.zt{font-size:10px;color:var(--tx2);text-transform:uppercase;letter-spacing:.07em;font-weight:600}
.zc{color:var(--bl);font-weight:700;font-size:11px}
.zbtns{display:flex;gap:3px;flex-wrap:wrap}
.zb{background:transparent;border:1px solid var(--bd2);color:var(--tx3);padding:2px 6px;border-radius:4px;cursor:pointer;font-size:11px}
.zb:active{background:var(--s2);color:var(--tx)}
.zcards{display:flex;flex-wrap:wrap;gap:3px;min-height:78px;align-content:flex-start;padding:2px}
.zcards.hov{outline:2px dashed var(--bl);border-radius:6px}

/* BATTLE/BENCH */
#bb-row{display:flex;gap:4px;align-items:flex-start}
.bslot{flex-shrink:0;width:84px;min-height:96px;background:rgba(239,68,68,.05);border:1px dashed var(--rd);border-radius:8px;padding:5px;display:flex;flex-direction:column;align-items:center;gap:3px}
.bslot.occ{border-style:solid}
.slbl{font-size:9px;color:var(--tx3);text-transform:uppercase;margin-bottom:2px}
.attrow{display:flex;flex-wrap:wrap;gap:2px;justify-content:center}
.attrow .card{width:26px;height:36px}
#bench-area{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
.slbl2{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em}
#bench-slots{display:flex;gap:3px;flex-wrap:wrap}
.bnslot{width:70px;min-height:86px;background:rgba(59,130,246,.04);border:1px dashed var(--bd2);border-radius:8px;padding:4px;display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0}
.bnslot.occ{border-style:solid;border-color:var(--bl)}
.snum{font-size:9px;color:var(--tx3)}
.bnslot .attrow .card{width:22px;height:30px}
.swpbtn{background:transparent;border:1px solid var(--acc);color:var(--acc);padding:2px 4px;border-radius:3px;cursor:pointer;font-size:9px;margin-top:1px}
.swpbtn:active{background:var(--acc);color:#000}
#stadium-zone{border-color:#4a3f6b;background:rgba(139,92,246,.05)}

/* CARDS */
.card{
  width:var(--cw);height:var(--ch);border-radius:5px;border:1px solid var(--bd);
  cursor:pointer;position:relative;display:flex;flex-direction:column;
  align-items:center;justify-content:flex-end;padding-bottom:2px;
  user-select:none;overflow:hidden;background:var(--s2);flex-shrink:0;
  transition:transform .1s
}
.card:active{transform:scale(.95)}
.cdot{position:absolute;top:3px;left:3px;width:7px;height:7px;border-radius:50%}
.cimg{width:100%;flex:1;object-fit:cover;display:block}
.cph{width:100%;flex:1;display:flex;align-items:center;justify-content:center;font-size:20px}
.cnm{font-size:8px;color:var(--tx);background:rgba(0,0,0,.72);width:100%;text-align:center;padding:1px 2px;line-height:1.2;word-break:break-all}
.card.pokemon .cdot{background:var(--rd)}
.card.energy .cdot{background:var(--gr)}
.card.trainer .cdot{background:var(--pu)}
.card.fd{background:linear-gradient(145deg,#1e3a5f,#0a1f3d)}
.card.fd::after{content:'';position:absolute;inset:4px;border:1px solid rgba(255,255,255,.1);border-radius:3px;background:radial-gradient(circle,rgba(245,158,11,.2),transparent 70%)}
.card.fd .cnm,.card.fd .cdot,.card.fd .cph,.card.fd .cimg{display:none}

/* DECK PILE */
.dpile{width:var(--cw);height:var(--ch);border-radius:5px;background:linear-gradient(145deg,#1e3a5f,#0a1f3d);border:1px solid #2a4a7f;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;flex-shrink:0}
.dpile:active{transform:scale(.97)}
.dpile .pcnt{font-size:16px;font-weight:700;color:var(--acc)}
.dpile .plbl{font-size:9px;color:var(--tx2)}

/* SIDEBAR */
.sbx{background:var(--s2);border:1px solid var(--bd);border-radius:7px;padding:6px}
.sbh{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.sbt{font-size:10px;color:var(--tx2);text-transform:uppercase;letter-spacing:.07em;font-weight:600}
.sbc{color:var(--bl);font-weight:700;font-size:11px}
.sbcards{display:flex;flex-wrap:wrap;gap:2px}
.sbcards .card{width:38px;height:52px}
.sbcards .card .cnm{font-size:7px}
.sbbtn{width:100%;background:transparent;border:1px solid var(--bd2);color:var(--tx3);padding:4px;border-radius:4px;cursor:pointer;font-size:11px;margin-top:4px}
.sbbtn:active{background:var(--s1);color:var(--tx)}

/* MODAL */
#mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:1000;align-items:flex-end;justify-content:center;padding:0}
#mbg.open{display:flex}
#mbox{background:var(--s1);border:1px solid var(--bd2);border-radius:16px 16px 0 0;padding:16px;width:100%;max-width:480px;max-height:75vh;overflow-y:auto}
#mbox h3{font-size:14px;color:var(--acc);margin-bottom:12px}
.mb{display:block;width:100%;background:var(--s2);border:1px solid var(--bd);color:var(--tx);padding:11px 14px;border-radius:8px;cursor:pointer;text-align:left;font-size:13px;margin-bottom:6px}
.mb:active{background:var(--s3);color:var(--bl)}
.mb.cancel{color:var(--tx2)}
.mb.red{color:#fca5a5}
#dlist{max-height:260px;overflow-y:auto;margin-bottom:8px}
.di{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:5px}
.di:active{background:var(--s2)}
.ddot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dnm{flex:1;font-size:12px}
.dty{font-size:10px;color:var(--tx3)}

/* QR MODAL */
#qr-area{text-align:center;padding:12px 0}
#qr-area img{width:180px;height:180px;border-radius:8px}
#qr-area p{font-size:11px;color:var(--tx2);margin-top:8px;line-height:1.6;word-break:break-all}

/* TOAST */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--s1);border:1px solid var(--acc);color:var(--tx);padding:8px 16px;border-radius:8px;font-size:12px;opacity:0;pointer-events:none;transition:opacity .25s;z-index:2000;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis}
#toast.show{opacity:1}

/* LOADING */
#loading{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:3000;flex-direction:column;align-items:center;justify-content:center;gap:14px}
#loading.open{display:flex}
.spin{width:34px;height:34px;border:3px solid var(--bd);border-top-color:var(--acc);border-radius:50%;animation:sp .75s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#lmsg{font-size:13px;color:var(--tx2);text-align:center;padding:0 20px}

/* WELCOME */
#welcome{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:500;align-items:center;justify-content:center;padding:16px}
#welcome.open{display:flex}
#wbox{background:var(--s1);border:1px solid var(--bd2);border-radius:14px;padding:20px;max-width:400px;width:100%;max-height:90vh;overflow-y:auto}
#wbox h2{font-size:15px;color:var(--acc);margin-bottom:10px}
#wbox p{font-size:12px;color:var(--tx2);line-height:1.7;margin-bottom:10px}
.wb{display:block;width:100%;background:var(--acc);color:#000;border:none;padding:11px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:8px;text-align:center}
.wb.sec{background:var(--s2);color:var(--tx);border:1px solid var(--bd)}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <h1>▶ POKÉCA SOLO</h1>
    <button class="hbtn go" id="btn-start" disabled>ゲーム開始</button>
    <button class="hbtn" onclick="doReset()">リセット</button>
    <div style="flex:1"></div>
    <div class="badge">サイド <b id="hpr">6</b></div>
    <div class="badge">T<b id="htr">0</b></div>
    <button class="hbtn" onclick="nextTurn()">+</button>
    <button class="hbtn" id="btn-qr" style="display:none" onclick="showQR()">📱QR</button>
  </div>
  <div id="main">
    <div id="field">
      <div class="zone" id="stadium-zone">
        <div class="zh">
          <span class="zt" style="color:var(--pu)">スタジアム</span>
          <span class="zc" id="cnt-stadium">0</span>
        </div>
        <div class="zcards" id="cards-stadium"></div>
      </div>
      <div id="bb-row">
        <div class="bslot" id="bslot">
          <div class="slbl">バトル場</div>
          <div id="bp"></div>
          <div class="attrow" id="ba"></div>
        </div>
        <div id="bench-area">
          <div class="slbl2">ベンチ</div>
          <div id="bench-slots"></div>
        </div>
      </div>
      <div class="zone">
        <div class="zh">
          <span class="zt">手札</span>
          <span class="zc" id="cnt-hand">0</span>
          <div class="zbtns">
            <button class="zb" onclick="sortZone('hand')">並替</button>
            <button class="zb" onclick="returnHandToDeck()">デッキに戻す</button>
          </div>
        </div>
        <div class="zcards" id="cards-hand"></div>
      </div>
    </div>
    <div id="sb">
      <div class="sbx">
        <div class="sbh"><span class="sbt">デッキ</span><span class="sbc" id="cnt-deck">0</span></div>
        <div style="display:flex;justify-content:center">
          <div class="dpile" onclick="showDeckMenu()">
            <div class="pcnt" id="pile-cnt">0</div>
            <div class="plbl">枚</div>
          </div>
        </div>
        <button class="sbbtn" onclick="drawOne()">1枚ドロー</button>
        <button class="sbbtn" onclick="shuffleDeck()">シャッフル</button>
        <button class="sbbtn" onclick="viewDeck()">デッキを見る</button>
      </div>
      <div class="sbx">
        <div class="sbh"><span class="sbt">サイド</span><span class="sbc" id="cnt-side">0</span></div>
        <div class="sbcards" id="cards-side"></div>
        <button class="sbbtn" onclick="takePrize()">1枚取る</button>
      </div>
      <div class="sbx">
        <div class="sbh"><span class="sbt">トラッシュ</span><span class="sbc" id="cnt-trash">0</span></div>
        <div class="sbcards" id="cards-trash"></div>
        <button class="sbbtn" onclick="sortZone('trash')">並び替え</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL (bottom sheet) -->
<div id="mbg" onclick="closeModal()">
  <div id="mbox" onclick="event.stopPropagation()">
    <h3 id="mtitle">メニュー</h3>
    <div id="mbody"></div>
  </div>
</div>

<!-- LOADING -->
<div id="loading"><div class="spin"></div><div id="lmsg">読み込み中...</div></div>

<!-- TOAST -->
<div id="toast"></div>

<!-- WELCOME -->
<div id="welcome" class="open">
  <div id="wbox">
    <h2>▶ ポケカ一人回し</h2>
    <p id="w-msg">PCのChrome拡張機能でデッキを読み込んでください。<br>または下のボタンでサンプルデッキを試せます。</p>
    <button class="wb" onclick="loadSample()">サンプルデッキで試す</button>
    <button class="wb sec" onclick="closeWelcome()">デッキ読み込み済みの場合はここ</button>
  </div>
</div>

<script>
// ============================================================
// STATE
// ============================================================
let _uid=0; const uid=()=>++_uid;
const S={
  deck:[],hand:[],side:[],trash:[],stadium:[],
  battle:{pokemon:null,attached:[]},
  bench:Array(5).fill(0).map(()=>({pokemon:null,attached:[]})),
  turn:0, deckUrl:null
};

// ============================================================
// URL PARAMS — デッキデータをURLから読み込む
// ============================================================
function loadFromURL(){
  const params=new URLSearchParams(location.search);
  const data=params.get('d');
  if(!data) return false;
  try{
    const decoded=JSON.parse(decodeURIComponent(atob(data)));
    if(!decoded?.cards?.length) return false;
    loading('デッキデータを読み込み中...');
    setTimeout(()=>{
      S.deck=decoded.cards.map(c=>({
        uid:uid(),name:c.n,supertype:c.t||'Pokémon',imageUrl:c.i||null,_zone:'deck'
      }));
      S.deck=shuffle(S.deck);
      resetField();
      document.getElementById('btn-start').disabled=false;
      document.getElementById('btn-qr').style.display='';
      S.deckUrl=location.href;
      unload(); closeWelcome(); render();
      toast(`${S.deck.length}枚のデッキを読み込みました`);
    },300);
    return true;
  } catch(e){ return false; }
}

// ============================================================
// UTILS
// ============================================================
function toast(msg,d=2500){
  const e=document.getElementById('toast');
  e.textContent=msg;e.classList.add('show');
  clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('show'),d);
}
function loading(msg){document.getElementById('lmsg').textContent=msg||'読み込み中...';document.getElementById('loading').classList.add('open');}
function unload(){document.getElementById('loading').classList.remove('open');}
function openModal(title,body){
  document.getElementById('mtitle').textContent=title;
  document.getElementById('mbody').innerHTML=body;
  document.getElementById('mbg').classList.add('open');
}
function closeModal(){document.getElementById('mbg').classList.remove('open');}
function closeWelcome(){document.getElementById('welcome').classList.remove('open');}

function typeClass(st){
  if(!st)return'';const s=st.toLowerCase();
  if(s.includes('pokemon')||s.includes('ポケモン'))return'pokemon';
  if(s.includes('energy')||s.includes('エネルギー'))return'energy';
  if(s.includes('trainer')||s.includes('トレーナー'))return'trainer';
  return'';
}
function typeEmoji(st){const c=typeClass(st);return c==='pokemon'?'⚡':c==='energy'?'◈':c==='trainer'?'♟':'🃏';}
function typeColor(st){const c=typeClass(st);return c==='pokemon'?'var(--rd)':c==='energy'?'var(--gr)':c==='trainer'?'var(--pu)':'var(--tx3)';}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function isPokemon(c){return typeClass(c.supertype)==='pokemon';}

// ============================================================
// CARD ELEMENT
// ============================================================
function mkCard(card,facedown=false){
  const el=document.createElement('div');
  el.className='card '+typeClass(card.supertype)+(facedown?' fd':'');
  el.dataset.uid=card.uid;

  if(!facedown){
    const dot=document.createElement('div');dot.className='cdot';el.appendChild(dot);
    if(card.imageUrl){
      const img=document.createElement('img');
      img.className='cimg';img.src=card.imageUrl;img.alt=card.name;img.loading='lazy';
      img.onerror=()=>{img.remove();el.insertBefore(mkPh(card),el.querySelector('.cnm'));};
      el.appendChild(img);
    } else {
      el.appendChild(mkPh(card));
    }
    const nm=document.createElement('div');nm.className='cnm';
    nm.textContent=card.name.length>11?card.name.slice(0,10)+'…':card.name;
    el.appendChild(nm);
  }

  el.addEventListener('click',()=>showMenu(card,facedown));
  return el;
}
function mkPh(card){const ph=document.createElement('div');ph.className='cph';ph.textContent=typeEmoji(card.supertype);return ph;}

// ============================================================
// GAME ACTIONS
// ============================================================
function startGame(){
  if(S.deck.length<13){toast('デッキが不足しています');return;}
  S.deck=shuffle(S.deck);resetField();
  S.hand=S.deck.splice(0,7);S.hand.forEach(c=>c._zone='hand');
  S.side=S.deck.splice(0,6);S.side.forEach(c=>c._zone='side');
  render();toast('ゲーム開始！手札7枚・サイド6枚');
}
function resetField(){
  S.hand=[];S.side=[];S.trash=[];S.stadium=[];
  S.battle={pokemon:null,attached:[]};
  S.bench=Array(5).fill(0).map(()=>({pokemon:null,attached:[]}));
  S.turn=0;
}
function doReset(){
  const all=[...S.deck,...S.hand,...S.side,...S.trash,...S.stadium,
    ...(S.battle.pokemon?[S.battle.pokemon]:[]),...S.battle.attached,
    ...S.bench.flatMap(b=>[...(b.pokemon?[b.pokemon]:[]),...b.attached])];
  all.forEach(c=>c._zone='deck');S.deck=shuffle(all);resetField();
  document.getElementById('btn-start').disabled=false;
  render();toast('リセットしました');
}
function drawOne(){if(!S.deck.length){toast('デッキが空です');return;}const c=S.deck.shift();c._zone='hand';S.hand.push(c);render();toast('ドロー: '+c.name);}
function shuffleDeck(){S.deck=shuffle(S.deck);render();toast('シャッフルしました');}
function viewDeck(){
  let h='<div id="dlist">';
  if(!S.deck.length)h+='<div style="color:var(--tx3);text-align:center;padding:20px;font-size:12px">デッキが空です</div>';
  else S.deck.forEach(c=>{h+=`<div class="di"><div class="ddot" style="background:${typeColor(c.supertype)}"></div><div class="dnm">${c.name}</div><div class="dty">${c.supertype||''}</div></div>`;});
  h+=`</div><button class="mb cancel" onclick="closeModal()">閉じる</button>`;
  openModal(`デッキ (${S.deck.length}枚)`,h);
}
function showDeckMenu(){
  openModal('デッキ操作',`
    <button class="mb" onclick="closeModal();drawOne()">1枚ドロー</button>
    <button class="mb" onclick="closeModal();shuffleDeck()">シャッフル</button>
    <button class="mb" onclick="closeModal();viewDeck()">デッキを見る</button>
    <button class="mb cancel" onclick="closeModal()">閉じる</button>
  `);
}
function takePrize(){if(!S.side.length){toast('サイドが空です');return;}const c=S.side.shift();c._zone='hand';S.hand.push(c);render();toast('サイドを取りました: '+c.name);}
function returnHandToDeck(){S.hand.forEach(c=>c._zone='deck');S.deck.push(...S.hand);S.hand=[];S.deck=shuffle(S.deck);render();toast('手札をデッキに戻してシャッフルしました');}
function sortZone(zone){
  const o=st=>{const c=typeClass(st);return c==='pokemon'?0:c==='trainer'?1:c==='energy'?2:3;};
  const fn=(a,b)=>o(a.supertype)-o(b.supertype)||a.name.localeCompare(b.name,'ja');
  if(zone==='hand')S.hand.sort(fn);else if(zone==='trash')S.trash.sort(fn);
  render();toast('並び替えました');
}
function swapBenchBattle(i){
  const b=S.bench[i],bt=S.battle;
  const tmp={pokemon:bt.pokemon,attached:[...bt.attached]};
  bt.pokemon=b.pokemon;bt.attached=[...b.attached];
  b.pokemon=tmp.pokemon;b.attached=tmp.attached;
  if(bt.pokemon)bt.pokemon._zone='battle';bt.attached.forEach(c=>c._zone='battle');
  if(b.pokemon)b.pokemon._zone=`bench-${i}`;b.attached.forEach(c=>c._zone=`bench-${i}`);
  render();toast('バトル場とベンチを入れ替えました');
}
function nextTurn(){S.turn++;render();toast(`ターン ${S.turn}`);}

// ============================================================
// MOVE CARD
// ============================================================
window.moveCard=function(cardUid,from,to,si){
  let card=null;
  function rem(zone){
    if(zone==='hand'){const i=S.hand.findIndex(c=>c.uid===cardUid);if(i>=0)card=S.hand.splice(i,1)[0];}
    else if(zone==='deck'){const i=S.deck.findIndex(c=>c.uid===cardUid);if(i>=0)card=S.deck.splice(i,1)[0];}
    else if(zone==='trash'){const i=S.trash.findIndex(c=>c.uid===cardUid);if(i>=0)card=S.trash.splice(i,1)[0];}
    else if(zone==='side'){const i=S.side.findIndex(c=>c.uid===cardUid);if(i>=0)card=S.side.splice(i,1)[0];}
    else if(zone==='stadium'){const i=S.stadium.findIndex(c=>c.uid===cardUid);if(i>=0)card=S.stadium.splice(i,1)[0];}
    else if(zone==='battle'){
      if(S.battle.pokemon?.uid===cardUid){card=S.battle.pokemon;S.battle.pokemon=null;}
      else{const i=S.battle.attached.findIndex(c=>c.uid===cardUid);if(i>=0)card=S.battle.attached.splice(i,1)[0];}
    } else if(zone?.startsWith('bench-')){
      const idx=parseInt(zone.split('-')[1]);
      if(S.bench[idx].pokemon?.uid===cardUid){card=S.bench[idx].pokemon;S.bench[idx].pokemon=null;}
      else{const i=S.bench[idx].attached.findIndex(c=>c.uid===cardUid);if(i>=0)card=S.bench[idx].attached.splice(i,1)[0];}
    }
  }
  rem(from);if(!card)return;
  if(to==='hand'){card._zone='hand';S.hand.push(card);}
  else if(to==='deck'){card._zone='deck';S.deck.push(card);S.deck=shuffle(S.deck);}
  else if(to==='trash'){card._zone='trash';S.trash.push(card);}
  else if(to==='side'){card._zone='side';S.side.push(card);}
  else if(to==='stadium'){card._zone='stadium';S.stadium.push(card);}
  else if(to==='battle'){card._zone='battle';if(!S.battle.pokemon&&isPokemon(card))S.battle.pokemon=card;else S.battle.attached.push(card);}
  else if(to==='bench'){const idx=si??0;card._zone=`bench-${idx}`;if(!S.bench[idx].pokemon&&isPokemon(card))S.bench[idx].pokemon=card;else S.bench[idx].attached.push(card);}
  render();
};

// ============================================================
// CARD MENU
// ============================================================
function showMenu(card,facedown){
  if(facedown&&card._zone==='side'){
    openModal(card.name,`<button class="mb" onclick="closeModal();moveCard(${card.uid},'side','hand')">手札に取る</button><button class="mb cancel" onclick="closeModal()">閉じる</button>`);
    return;
  }
  const from=card._zone;
  const btns=[];
  const a=(lbl,action,cls='')=>btns.push(`<button class="mb ${cls}" onclick="closeModal();${action}">${lbl}</button>`);
  if(from==='hand'){
    a('バトル場に出す',`moveCard(${card.uid},'hand','battle')`);
    for(let i=0;i<5;i++)a(`ベンチ${i+1}に出す`,`moveCard(${card.uid},'hand','bench',${i})`);
    a('スタジアムに置く',`moveCard(${card.uid},'hand','stadium')`);
    a('トラッシュ',`moveCard(${card.uid},'hand','trash')`,'red');
    a('デッキに戻す',`moveCard(${card.uid},'hand','deck')`);
  } else if(from==='battle'){
    a('手札に戻す',`moveCard(${card.uid},'battle','hand')`);
    a('トラッシュ',`moveCard(${card.uid},'battle','trash')`,'red');
  } else if(from?.startsWith('bench-')){
    a('バトル場に出す',`moveCard(${card.uid},'${from}','battle')`);
    a('手札に戻す',`moveCard(${card.uid},'${from}','hand')`);
    a('トラッシュ',`moveCard(${card.uid},'${from}','trash')`,'red');
  } else if(from==='trash'){
    a('手札に戻す',`moveCard(${card.uid},'trash','hand')`);
    a('デッキに戻す',`moveCard(${card.uid},'trash','deck')`);
  } else if(from==='side'){
    a('手札に取る',`moveCard(${card.uid},'side','hand')`);
  } else if(from==='stadium'){
    a('トラッシュ',`moveCard(${card.uid},'stadium','trash')`,'red');
    a('手札に戻す',`moveCard(${card.uid},'stadium','hand')`);
  }
  a('閉じる','','cancel');
  openModal(card.name,btns.join(''));
}

// ============================================================
// RENDER
// ============================================================
function rList(id,cards,fd=false){
  const el=document.getElementById(id);if(!el)return;
  el.innerHTML='';cards.forEach(c=>el.appendChild(mkCard(c,fd)));
}
function render(){
  document.getElementById('cnt-deck').textContent=S.deck.length;
  document.getElementById('pile-cnt').textContent=S.deck.length;
  document.getElementById('cnt-hand').textContent=S.hand.length;
  document.getElementById('cnt-side').textContent=S.side.length;
  document.getElementById('cnt-trash').textContent=S.trash.length;
  document.getElementById('cnt-stadium').textContent=S.stadium.length;
  document.getElementById('hpr').textContent=S.side.length;
  document.getElementById('htr').textContent=S.turn;
  rList('cards-hand',S.hand);
  rList('cards-trash',S.trash);
  rList('cards-stadium',S.stadium);
  rList('cards-side',S.side,true);
  const bp=document.getElementById('bp'),ba=document.getElementById('ba'),bslot=document.getElementById('bslot');
  bp.innerHTML='';ba.innerHTML='';
  if(S.battle.pokemon){bslot.classList.add('occ');bp.appendChild(mkCard(S.battle.pokemon));S.battle.attached.forEach(c=>ba.appendChild(mkCard(c)));}
  else bslot.classList.remove('occ');
  S.bench.forEach((b,i)=>{
    const pp=document.getElementById(`bp-${i}`),ap=document.getElementById(`ba-${i}`);
    const slot=document.querySelector(`.bnslot[data-si="${i}"]`);
    if(!pp||!ap)return;pp.innerHTML='';ap.innerHTML='';
    if(b.pokemon){slot?.classList.add('occ');pp.appendChild(mkCard(b.pokemon));b.attached.forEach(c=>ap.appendChild(mkCard(c)));}
    else slot?.classList.remove('occ');
  });
}

// ============================================================
// BENCH SETUP
// ============================================================
function setupBench(){
  const con=document.getElementById('bench-slots');con.innerHTML='';
  for(let i=0;i<5;i++){
    const s=document.createElement('div');
    s.className='bnslot';s.dataset.si=i;
    s.innerHTML=`<div class="snum">${i+1}</div><div id="bp-${i}"></div><div class="attrow" id="ba-${i}"></div><button class="swpbtn" onclick="swapBenchBattle(${i})">⇄ バトル</button>`;
    con.appendChild(s);
  }
}

// ============================================================
// QR CODE (スマホ共有)
// ============================================================
function showQR(){
  const url=S.deckUrl||location.href;
  const qrUrl=`https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(url)}`;
  openModal('スマホで開く',`
    <div id="qr-area">
      <img src="${qrUrl}" alt="QR Code">
      <p>スマホのカメラでQRコードを読み込むと<br>同じデッキでシミュレーターが開きます</p>
    </div>
    <button class="mb" onclick="navigator.clipboard.writeText('${url}').then(()=>toast('URLをコピーしました'))">URLをコピー</button>
    <button class="mb cancel" onclick="closeModal()">閉じる</button>
  `);
}

// ============================================================
// INIT
// ============================================================
document.getElementById('btn-start').addEventListener('click',startGame);
setupBench();
render();

// URLパラメータからデッキ読み込み
if(!loadFromURL()){
  // Chrome拡張からも試みる（chrome-extension://で開かれた場合）
  if(typeof chrome!=='undefined'&&chrome.storage){
    chrome.storage.local.get('pokeca_deck_data',result=>{
      const data=result?.pokeca_deck_data;
      if(data?.cards?.length){
        S.deck=data.cards.map(c=>({uid:uid(),name:c.n||c.name,supertype:c.t||c.supertype||'Pokémon',imageUrl:c.i||c.imageUrl||null,_zone:'deck'}));
        S.deck=shuffle(S.deck);resetField();
        document.getElementById('btn-start').disabled=false;
        document.getElementById('btn-qr').style.display='';
        closeWelcome();render();toast(`${S.deck.length}枚のデッキを読み込みました`);
      }
    });
  }
}
