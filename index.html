<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ポケカ一人回し</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f0f7f0;--s1:#fff;--s2:#e8f5e9;--s3:#c8e6c9;
  --bd:#a5d6a7;--bd2:#66bb6a;
  --acc:#1b5e20;--acc2:#2e7d32;--acc3:#43a047;
  --tx:#1b2e1b;--tx2:#3d5a3d;--tx3:#6a8f6a;
  --rd:#c62828;--pu:#6a1b9a;
  --cw:62px;--ch:86px;
  --shadow:0 2px 6px rgba(0,0,0,0.15);
  --line:rgba(255,255,255,0.65);
  --mat:#3a7d3a;
}
html,body{height:100%;color:var(--tx);font-family:'Hiragino Kaku Gothic Pro','Noto Sans JP',sans-serif;font-size:14px;overflow-x:hidden;overflow-y:auto;background:#1a1a1a}
#app{display:flex;flex-direction:column;min-height:100vh;min-height:100dvh;max-width:480px;margin:0 auto;background:#1a1a1a}

/* ===== HEADER ===== */
#hdr{
  background:var(--acc);color:#fff;
  padding:0 10px;
  display:flex;align-items:center;gap:6px;
  height:44px;flex-shrink:0;
  box-shadow:0 2px 8px rgba(0,0,0,0.4);
  position:sticky;top:0;z-index:100;
}
#hdr h1{font-size:13px;font-weight:700;white-space:nowrap;letter-spacing:.03em}
.hbtn{
  background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);
  color:#fff;padding:5px 9px;border-radius:6px;cursor:pointer;font-size:11px;white-space:nowrap;
  font-weight:600;flex-shrink:0;
}
.hbtn:hover,.hbtn:active{background:rgba(255,255,255,0.28)}
.hbtn.go{background:#fff;color:var(--acc);font-weight:700}
.hbtn:disabled{opacity:.35;cursor:not-allowed}
.badge{
  background:rgba(255,255,255,0.14);border:1px solid rgba(255,255,255,0.2);
  padding:3px 7px;border-radius:5px;font-size:11px;color:rgba(255,255,255,0.85);
  white-space:nowrap;flex-shrink:0;
}
.badge b{color:#fff;font-weight:700}
#hdr-spacer{flex:1}

/* ===== PLAYMAT ===== */
#playmat{
  flex:1;display:flex;flex-direction:column;
  background:radial-gradient(ellipse at 50% 35%,#4a9e4a 0%,#2d6b2d 55%,#1a4a1a 100%);
  position:relative;
}

/* ===== FIELD GRID ===== */
#field{
  flex:1;display:flex;flex-direction:column;
  padding:6px 6px 4px;gap:4px;
}

/* === 上段: サイド | バトル場 | デッキ === */
#row-top{
  display:grid;grid-template-columns:72px 1fr 72px;
  gap:4px;flex-shrink:0;
}

/* サイドゾーン */
#side-zone{
  background:rgba(0,0,0,0.2);border:1.5px solid var(--line);border-radius:8px;
  padding:4px;display:flex;flex-direction:column;gap:3px;
}
#cards-side{display:grid;grid-template-columns:1fr 1fr;gap:2px;}
#cards-side .card{width:100%;height:52px;}
.zone-lbl{font-size:9px;font-weight:700;color:var(--line);text-transform:uppercase;letter-spacing:.06em;text-align:center;flex-shrink:0}
.z-btn{
  background:rgba(0,0,0,0.22);border:1px solid var(--line);
  color:rgba(255,255,255,.88);padding:3px;border-radius:5px;
  cursor:pointer;font-size:10px;width:100%;font-weight:600;flex-shrink:0;
  margin-top:1px;
}
.z-btn:active{background:rgba(0,0,0,.45)}
.z-btn.red{background:rgba(150,0,0,0.3);border-color:rgba(255,120,120,.4);color:rgba(255,200,200,.95)}
.z-btn.red:active{background:rgba(150,0,0,.55)}

/* バトル場 */
#battle-wrap{display:flex;flex-direction:column;align-items:center;gap:3px}
#bslot{
  width:100%;border:2px solid var(--line);border-radius:10px;
  background:rgba(255,255,255,0.09);padding:6px;
  display:flex;flex-direction:column;align-items:center;gap:3px;
}
#bslot.occ{background:rgba(255,255,255,0.16);border-color:rgba(255,255,255,.9)}
.poke-stack-wrap{position:relative;width:100%;display:flex;justify-content:center}
.energy-area{
  width:100%;background:rgba(0,0,0,0.13);
  border:1px dashed rgba(255,255,255,.35);border-radius:5px;
  padding:3px;min-height:28px;display:flex;flex-wrap:wrap;gap:2px;
}
.tool-area{
  width:100%;background:rgba(0,0,0,0.09);
  border:1px dashed rgba(180,220,255,.35);border-radius:5px;
  padding:3px;min-height:22px;display:flex;flex-wrap:wrap;gap:2px;
}
.area-label{font-size:7px;color:rgba(255,255,255,.55);width:100%;font-weight:600}
.energy-area .card,.tool-area .card{width:30px;height:42px}
.status-markers{display:flex;flex-wrap:wrap;gap:2px;justify-content:center;width:100%}
.smark{padding:3px 5px;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;border:none;min-width:28px}
.smark.off{background:rgba(255,255,255,.12);color:rgba(255,255,255,.4)}
.smark.やけど{background:#c62828;color:#fff}
.smark.どく{background:#6a1b9a;color:#fff}
.smark.ねむり{background:#1565c0;color:#fff}
.smark.まひ{background:#e65100;color:#fff}
.smark.こんらん{background:#880e4f;color:#fff}

.dpile:active{transform:translateY(1px)}
.dpile .pcnt{font-size:18px;font-weight:700;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.8)}
.dpile .plbl{font-size:8px;color:rgba(255,255,255,.7)}
.rdb{
  background:rgba(0,0,0,.22);border:1px solid var(--line);
  color:rgba(255,255,255,.88);padding:4px 3px;border-radius:5px;
  cursor:pointer;font-size:9px;font-weight:500;text-align:center;width:100%;
}
.rdb:active{background:rgba(0,0,0,.45)}

/* === 中段: スタジアム | コイン | フリー === */
#row-mid{
  display:grid;grid-template-columns:1fr 70px 1fr;
  gap:4px;flex-shrink:0;
}
#stad-zone{
  background:rgba(106,27,154,.18);border:1.5px dashed rgba(206,147,216,.55);
  border-radius:8px;padding:4px;display:flex;flex-direction:column;align-items:center;gap:2px;
}
#stad-zone .zone-lbl{color:rgba(206,147,216,.9)}
#cards-stadium{display:flex;align-items:center;justify-content:center;min-height:50px;width:100%}
#cards-stadium .card{width:44px;height:60px}
#coin-zone{
  background:rgba(0,0,0,.2);border:1.5px solid var(--line);border-radius:8px;
  padding:4px;display:flex;flex-direction:column;align-items:center;gap:2px;
}
.coin-result{min-height:56px;text-align:center;display:flex;align-items:center;justify-content:center}
.coin-btn{
  background:rgba(0,0,0,.22);border:1px solid var(--line);
  color:rgba(255,255,255,.9);padding:4px;border-radius:5px;
  cursor:pointer;font-size:10px;font-weight:700;width:100%;
}
.coin-btn:active{background:rgba(0,0,0,.45)}
.coin-hist{font-size:9px;color:rgba(255,255,255,.5);text-align:center;min-height:12px;word-break:break-all}
#free-zone{
  background:rgba(255,255,255,0.07);border:1.5px dashed rgba(255,255,255,.4);
  border-radius:8px;padding:4px;display:flex;flex-direction:column;gap:2px;
}
#cards-free{display:flex;flex-wrap:wrap;gap:2px;align-content:start;min-height:50px;overflow-y:auto}
#cards-free .card{width:36px;height:50px}

/* === トラッシュ === */
#trash-area{
  background:rgba(0,0,0,.22);border-top:2px solid rgba(255,120,120,.25);
  padding:5px 8px;flex-shrink:0;
}
#trash-head{display:flex;align-items:center;gap:5px;margin-bottom:4px;flex-wrap:wrap}
.th{font-size:11px;color:#ff8a80;text-transform:uppercase;letter-spacing:.07em;font-weight:700}
.tc{color:#ffaaaa;font-weight:700;font-size:12px;background:rgba(150,0,0,.3);padding:1px 7px;border-radius:10px}
.tb{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.25);color:rgba(255,255,255,.85);padding:4px 8px;border-radius:5px;cursor:pointer;font-size:11px}
.tb:active{background:rgba(255,255,255,.2)}
#cards-trash{display:flex;flex-wrap:nowrap;gap:4px;overflow-x:auto;min-height:90px;align-items:flex-start;padding:2px}
#cards-trash::-webkit-scrollbar{display:none}

/* === 手札 === */
#hand-area{
  background:rgba(255,255,255,.96);border-top:2.5px solid rgba(0,0,0,.18);
  padding:5px 8px;flex-shrink:0;
}
#hand-head{display:flex;align-items:center;gap:5px;margin-bottom:4px;flex-wrap:wrap}
.ht{font-size:11px;color:var(--acc2);text-transform:uppercase;letter-spacing:.07em;font-weight:700}
.hc{color:var(--acc3);font-weight:700;font-size:12px;background:var(--s2);padding:1px 7px;border-radius:10px}
.hb{background:var(--s2);border:1px solid var(--bd);color:var(--tx2);padding:4px 8px;border-radius:5px;cursor:pointer;font-size:11px}
.hb:active{background:var(--s3)}
.hb.red{background:#fff0f0;border-color:#ffcdd2;color:#c62828}
#cards-hand{display:flex;flex-wrap:nowrap;gap:4px;overflow-x:auto;min-height:90px;align-items:flex-start;padding:2px}
#cards-hand::-webkit-scrollbar{display:none}

/* === ベンチ === */
#bench-area{
  background:rgba(0,0,0,.22);border-top:2px solid rgba(255,255,255,.18);
  padding:5px 6px;flex-shrink:0;
}
#bench-head{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.bench-lbl{font-size:10px;font-weight:700;color:rgba(255,255,255,.8);text-transform:uppercase;letter-spacing:.07em}
#bench-slots{display:flex;gap:4px;overflow-x:auto;padding:2px}
#bench-slots::-webkit-scrollbar{height:3px}
#bench-slots::-webkit-scrollbar-thumb{background:rgba(255,255,255,.3);border-radius:2px}
.bnslot{
  background:rgba(0,0,0,.15);border:2px dashed rgba(255,255,255,.35);
  border-radius:8px;padding:4px;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  flex:0 0 88px;
}
.bnslot.occ{border-style:solid;border-color:rgba(255,255,255,.72);background:rgba(255,255,255,.12)}
.snum{font-size:9px;color:rgba(255,255,255,.5);font-weight:600}
.bnslot .energy-area,.bnslot .tool-area{min-height:20px;padding:2px}
.bnslot .energy-area .card,.bnslot .tool-area .card{width:24px;height:34px}
.bench-actions{display:flex;gap:2px;width:100%}
.swpbtn{background:rgba(46,125,50,.55);color:#fff;border:1px solid rgba(255,255,255,.25);padding:3px 0;border-radius:5px;cursor:pointer;font-size:9px;font-weight:600;flex:1;text-align:center}
.swpbtn:active{background:rgba(46,125,50,.85)}
.bn-trbtn{background:rgba(150,0,0,.3);border:1px solid rgba(255,120,120,.35);color:rgba(255,200,200,.9);padding:3px 5px;border-radius:5px;cursor:pointer;font-size:9px;font-weight:600}
.bn-trbtn:active{background:rgba(150,0,0,.55)}

/* === CARDS === */
.card{
  width:var(--cw);height:var(--ch);border-radius:7px;border:1.5px solid var(--bd);
  cursor:grab;position:relative;display:flex;flex-direction:column;
  align-items:center;justify-content:center;user-select:none;overflow:hidden;
  background:var(--s2);flex-shrink:0;
  box-shadow:var(--shadow);transition:transform .1s,box-shadow .1s;
}
.card:active{cursor:grabbing;transform:scale(.93)}
.card.dragging{opacity:.4;transform:scale(.93);pointer-events:none}
.drag-ghost{position:fixed;pointer-events:none;z-index:9999;opacity:.88;transform:scale(1.1);box-shadow:0 10px 28px rgba(0,0,0,.3);border-radius:7px;will-change:left,top;transition:box-shadow .15s}
.drop-target{outline:3px dashed rgba(255,255,255,.9);outline-offset:2px;background:rgba(255,255,255,.12)!important}
.cimg{width:100%;height:100%;object-fit:cover;display:block;border-radius:5px}
.cph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:22px}
.card.pokemon{border-color:#ef9a9a}
.card.energy{border-color:#a5d6a7}
.card.trainer{border-color:#ce93d8}

/* === MODAL === */
#mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;align-items:flex-end;justify-content:center}
#mbg.open{display:flex}
#mbox{
  background:#fff;border-radius:20px 20px 0 0;padding:16px;
  width:100%;max-width:480px;max-height:82vh;overflow-y:auto;
  box-shadow:0 -6px 24px rgba(0,0,0,.2);
}
.modal-handle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 14px}
#mbox h3{font-size:15px;color:var(--acc);margin-bottom:8px;font-weight:700}
.mb{
  display:block;width:100%;background:var(--s2);border:1px solid var(--bd);
  color:var(--tx);padding:13px 16px;border-radius:9px;cursor:pointer;
  text-align:left;font-size:14px;margin-bottom:7px;font-weight:500;
}
.mb:active{background:var(--s3)}
.mb.cancel{color:var(--tx3);background:#f5f5f5;border-color:#ddd}
.mb.red{color:#c62828;background:#fff5f5;border-color:#ffcdd2}
.mb.go{background:var(--acc2);color:#fff;font-weight:700;border-color:var(--acc2)}
#deck-grid{display:flex;flex-wrap:wrap;gap:5px;max-height:340px;overflow-y:auto;margin-bottom:10px;padding:5px;background:var(--bg);border-radius:9px}
#deck-input-area{display:flex;flex-direction:column;gap:10px}
#deck-input-area input{background:var(--s2);border:1.5px solid var(--bd2);color:var(--tx);padding:12px;border-radius:9px;font-size:15px;width:100%}
.input-hint{font-size:12px;color:var(--tx3);line-height:1.7;padding:10px;background:var(--s2);border-radius:7px}
.input-hint b{color:var(--tx2)}

/* 移動先選択モーダル */
.dest-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:8px}
.dest-btn{
  background:var(--s2);border:1.5px solid var(--bd);color:var(--tx);
  padding:12px 8px;border-radius:9px;cursor:pointer;text-align:center;
  font-size:13px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:3px;
}
.dest-btn:active{background:var(--s3)}
.dest-btn .dest-icon{font-size:20px}
.dest-btn.battle{background:#fff0f0;border-color:#ef9a9a}
.dest-btn.bench{background:#f0fff0;border-color:#a5d6a7}
.dest-btn.trash{background:#fff5f5;border-color:#ef9a9a;color:#c62828}
.dest-btn.deck{background:#e8f0ff;border-color:#9db8f0}
.dest-btn.hand{background:#fffde7;border-color:#ffe082;color:#e65100}
.dest-btn.free{background:#f3e5f5;border-color:#ce93d8;color:#6a1b9a}
.dest-btn.stad{background:#ede7f6;border-color:#b39ddb;color:#4527a0}

/* card img preview in modal */
.card-preview{display:flex;align-items:center;gap:10px;padding:6px 0 10px;border-bottom:1px solid var(--bd);margin-bottom:10px}
.card-preview-img{width:54px;height:76px;border-radius:7px;object-fit:cover;border:1.5px solid var(--bd);background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.card-preview-info{flex:1}
.card-preview-name{font-size:14px;font-weight:700;color:var(--tx)}
.card-preview-type{font-size:11px;color:var(--tx3);margin-top:2px}


/* カスタムスクロールバー */
.zone-scrollbar-wrap{flex:1;display:flex;align-items:center;padding:0 2px;min-width:40px;}
.zone-scrollbar{
  width:100%;height:18px;
  -webkit-appearance:none;appearance:none;
  background:rgba(0,0,0,0.12);
  border-radius:9px;outline:none;cursor:pointer;
  border:1px solid rgba(255,255,255,0.15);
}
.zone-scrollbar::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:36px;height:18px;border-radius:9px;
  background:var(--bd2);cursor:grab;
  box-shadow:0 1px 4px rgba(0,0,0,0.3);
}
.zone-scrollbar::-webkit-slider-thumb:active{cursor:grabbing;}
#trash-area .zone-scrollbar::-webkit-slider-thumb{background:rgba(255,120,120,0.7);}

/* カード拡大表示 */
#card-zoom-bg{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);
  z-index:2000;align-items:center;justify-content:center;
}
#card-zoom-bg.open{display:flex}
#card-zoom-img{
  max-width:80vw;max-height:80vh;border-radius:12px;
  box-shadow:0 8px 40px rgba(0,0,0,.6);
  object-fit:contain;
}
#card-zoom-ph{
  width:180px;height:252px;border-radius:12px;
  background:var(--s2);display:flex;align-items:center;
  justify-content:center;font-size:64px;
  box-shadow:0 8px 40px rgba(0,0,0,.6);
}
/* TOAST */
#toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:var(--acc);color:#fff;padding:9px 20px;border-radius:22px;
  font-size:13px;opacity:0;pointer-events:none;transition:opacity .25s;
  z-index:2000;white-space:nowrap;max-width:90vw;
  box-shadow:0 4px 14px rgba(0,0,0,.25);font-weight:600;
}
#toast.show{opacity:1}

/* LOADING */
#loading{display:none;position:fixed;inset:0;background:rgba(255,255,255,.92);z-index:3000;flex-direction:column;align-items:center;justify-content:center;gap:18px}
#loading.open{display:flex}
.spin{width:40px;height:40px;border:3px solid var(--bd);border-top-color:var(--acc2);border-radius:50%;animation:sp .75s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#lmsg{font-size:14px;color:var(--tx2);text-align:center;padding:0 20px;font-weight:500}

/* COIN FLIP */
@keyframes flip{0%{transform:rotateY(0)}50%{transform:rotateY(90deg)}100%{transform:rotateY(0)}}
.flipping{animation:flip .3s ease}

/* 進化スタック表示 */
.poke-stack-wrap{position:relative;width:100%;display:flex;justify-content:center}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
</style>
</head>
<body>
<div id="app">
  <!-- HEADER -->
  <div id="hdr">
    <h1>🃏 POKÉCA SOLO</h1>
    <button class="hbtn" onclick="showDeckInput()">📋 デッキ</button>
    <button class="hbtn go" id="btn-start" disabled onclick="startGame()">開始/引直</button>
    <button class="hbtn" onclick="doReset()">↺</button>
    <div id="hdr-spacer"></div>
  </div>

  <!-- PLAYMAT -->
  <div id="playmat">
    <div id="field">

      <!-- 上段: サイド | バトル場 | デッキ -->
      <div id="row-top">

        <!-- サイド -->
        <div id="side-zone">
          <div class="zone-lbl">サイド <span id="cnt-side">0</span></div>
          <div id="cards-side"></div>
          <button class="z-btn" onclick="takePrize()">1枚取る</button>
        </div>

        <!-- バトル場 -->
        <div id="battle-wrap">
          <div class="zone-lbl">バトル場</div>
          <div id="bslot" data-dropzone="battle">
            <div class="poke-stack-wrap" id="bp-wrap" style="min-height:90px"></div>
            <div class="energy-area" id="ba-energy"><div class="area-label">エネルギー</div></div>
            <div class="tool-area" id="ba-tool"><div class="area-label">どうぐ</div></div>
            <div class="status-markers" id="battle-markers">
              <button class="smark off" data-status="やけど" onclick="toggleStatus('やけど')">🔥</button>
              <button class="smark off" data-status="どく" onclick="toggleStatus('どく')">☠</button>
              <button class="smark off" data-status="ねむり" onclick="toggleStatus('ねむり')">💤</button>
              <button class="smark off" data-status="まひ" onclick="toggleStatus('まひ')">⚡</button>
              <button class="smark off" data-status="こんらん" onclick="toggleStatus('こんらん')">😵</button>
            </div>
          </div>
          <button class="z-btn red" onclick="trashZone('battle')">🗑 全トラッシュ</button>
        </div>

        <!-- デッキ -->
        <div id="deck-zone">
          <div class="zone-lbl">デッキ <span id="cnt-deck">0</span></div>
          <div class="dpile" onclick="showDeckMenu()">
            <div class="pcnt" id="pile-cnt">0</div>
            <div class="plbl">枚</div>
          </div>
          <button class="rdb" onclick="drawOne()">1枚ドロー</button>
          <button class="rdb" onclick="shuffleDeck()">シャッフル</button>
          <button class="rdb" onclick="viewDeck()">デッキ確認</button>
        </div>

      </div><!-- /row-top -->

      <!-- 中段: スタジアム | コイン | フリー -->
      <div id="row-mid">

        <!-- スタジアム -->
        <div id="stad-zone">

          <div id="cards-stadium" data-dropzone="stadium"></div>
        </div>

function typeClass(st){if(!st)return'';const s=st.toLowerCase();if(s[0]==='p')return'pokemon';if(s[0]==='e')return'energy';if(s[0]==='t')return'trainer';return'';}

function isEnergy(c){return typeClass(c.supertype)==='energy';}
function isPokemon(c){return typeClass(c.supertype)==='pokemon';}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function flipCoin(){
  const img=document.getElementById('coin-img');
  if(!img)return;
  img.style.transition='transform 0.15s';
  img.style.transform='rotateY(90deg)';
  setTimeout(()=>{
    const h=Math.random()<.5;
    img.src=h?COIN_FRONT:COIN_BACK;
    img.style.transform='rotateY(0deg)';
    coinHist.unshift(h?'⭕':'❌');if(coinHist.length>5)coinHist.pop();
    document.getElementById('coin-hist').textContent=coinHist.join('');
    toast(h?'おもて！':'うら！');
  },150);
}

// STATUS
function toggleStatus(status){
  if(S.battle.statuses.has(status))S.battle.statuses.delete(status);
  else S.battle.statuses.add(status);
  renderStatusMarkers();
  toast(S.battle.statuses.has(status)?`${status}になった`:`${status}が回復した`);
}
function renderStatusMarkers(){
  document.getElementById('battle-markers')?.querySelectorAll('.smark').forEach(btn=>{
    const st=btn.dataset.status;btn.className='smark '+(S.battle.statuses.has(st)?st:'off');
  });
}

// DECK INPUT
function showDeckInput(){
  openModal('デッキを読み込む',`
    <div id="deck-input-area">
      <div class="input-hint"><b>公式デッキコード（XXXX-XXXX-XXXX）を入力</b></div>
      <input id="deck-code-field" type="text" placeholder="例: NHLngn-GoqcNM-n9gNgn" autocomplete="off" inputmode="text">
      <button class="mb go" onclick="loadByDeckCode()">デッキコードで読み込む</button>
      <button class="mb cancel" onclick="closeModal()">閉じる</button>
    </div>
  `);
  setTimeout(()=>document.getElementById('deck-code-field')?.focus(),100);
}
async function loadByDeckCode(){
  const code=document.getElementById('deck-code-field').value.trim();
  if(!code){toast('デッキコードを入力してください');return;}
  if(!/^[a-zA-Z0-9]+-[a-zA-Z0-9]+-[a-zA-Z0-9]+$/.test(code)){toast('形式が違います');return;}
  closeModal();loading('デッキコードを解析中...');
  try{
    document.getElementById('lmsg').textContent='カードデータを取得中...';
    const res=await fetch(`${WORKER}?code=${encodeURIComponent(code)}`);
    const data=await res.json();
    if(data.error){unload();toast('エラー: '+data.error);return;}
    if(!data.cards?.length){unload();toast('カードが取得できませんでした');return;}
    const cards=[];
    data.cards.forEach(c=>{for(let i=0;i<c.count;i++)cards.push({uid:uid(),name:c.name||'不明',supertype:c.supertype||'Pokémon',imageUrl:c.imageUrl||null,_zone:'deck'});});
    fullReset(cards);document.getElementById('btn-start').disabled=false;
    unload();render();toast(`${cards.length}枚のデッキを読み込みました！`);
  }catch(e){unload();toast('通信エラー: '+e.message);}
}
function loadFromURL(){
  const params=new URLSearchParams(location.search);const data=params.get('d');if(!data)return false;
  try{
    const decoded=JSON.parse(decodeURIComponent(atob(data)));
    if(!decoded?.cards?.length)return false;
    loading('デッキデータを読み込み中...');
    setTimeout(()=>{
      const cards=decoded.cards.map(c=>({uid:uid(),name:c.n||c.name||'不明',supertype:c.t==='P'?'Pokémon':c.t==='E'?'Energy':c.t==='T'?'Trainer':(c.supertype||'Pokémon'),imageUrl:c.i||c.imageUrl||null,_zone:'deck'}));
      fullReset(cards);document.getElementById('btn-start').disabled=false;unload();render();toast(`${S.deck.length}枚読み込みました`);
    },300);return true;
  }catch(e){return false;}
}

// GAME
function collectAllCards(){
  const all=[
    ...S.deck,...S.hand,...S.side,...S.trash,...S.stadium,...S.free,
    ...S.battle.pokemons,...S.battle.energy,...S.battle.tools,
    ...S.bench.flatMap(b=>[...b.pokemons,...b.energy,...b.tools])
  ];
  all.forEach(c=>c._zone='deck');return shuffle(all);
}
function resetField(){
  S.hand=[];S.side=[];S.trash=[];S.stadium=[];S.free=[];
  S.battle={pokemons:[],energy:[],tools:[],statuses:new Set()};
  S.bench=Array(5).fill(0).map(()=>({pokemons:[],energy:[],tools:[],statuses:new Set()}));
  S.turn=0;S.gameStarted=false;renderStatusMarkers();
}
function fullReset(newDeck){S.deck=shuffle(newDeck||[]);resetField();}
function startGame(){
  S.deck=collectAllCards();
  if(S.deck.length<13){toast('デッキが不足しています');return;}
  resetField();S.deck=shuffle(S.deck);
  S.hand=S.deck.splice(0,7);S.hand.forEach(c=>c._zone='hand');
  S.side=S.deck.splice(0,6);S.side.forEach(c=>c._zone='side');
  S.gameStarted=true;render();toast('手札7枚・サイド6枚を配りました');
}
function doReset(){
  S.deck=collectAllCards();resetField();
  document.getElementById('btn-start').disabled=S.deck.length===0;
  render();toast('リセットしました');
}
function trashZone(zone,si){
  if(zone==='hand'){
    const cnt=S.hand.length;if(!cnt){toast('手札がありません');return;}
    S.hand.forEach(c=>{c._zone='trash';S.trash.push(c);});S.hand=[];
    render();toast(`手札${cnt}枚をトラッシュ`);
  }else if(zone==='battle'){
    const cards=[...S.battle.pokemons,...S.battle.energy,...S.battle.tools];
    if(!cards.length){toast('バトル場にカードがありません');return;}
    cards.forEach(c=>{c._zone='trash';S.trash.push(c);});
    S.battle={pokemons:[],energy:[],tools:[],statuses:new Set()};
    render();renderStatusMarkers();toast(`バトル場${cards.length}枚をトラッシュ`);
  }else if(zone==='bench-single'){
    const b=S.bench[si];
    const cards=[...b.pokemons,...b.energy,...b.tools];
    if(!cards.length){toast('このベンチにカードがありません');return;}
    cards.forEach(c=>{c._zone='trash';S.trash.push(c);});
    S.bench[si]={pokemons:[],energy:[],tools:[],statuses:new Set()};
    render();toast(`ベンチ${si+1}を${cards.length}枚トラッシュ`);
  }
}
function drawOne(){if(!S.deck.length){toast('デッキが空です');return;}const c=S.deck.shift();c._zone='hand';S.hand.push(c);render();toast('ドロー: '+c.name);}
function shuffleDeck(){S.deck=shuffle(S.deck);render();toast('シャッフルしました');}
function viewDeck(){
  let h='<div id="deck-grid">';
  if(!S.deck.length)h+='<div style="color:var(--tx3);padding:20px;font-size:12px;width:100%;text-align:center">デッキが空です</div>';
  else S.deck.forEach(c=>{
    const imgEl=c.imageUrl?`<img src="${c.imageUrl}" alt="${c.name}" style="width:56px;height:78px;border-radius:6px;object-fit:cover;border:1.5px solid var(--bd)" onerror="this.style.display='none'">`:`<div style="width:56px;height:78px;border-radius:6px;background:var(--s2);border:1.5px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:20px">${typeEmoji(c.supertype)}</div>`;
    h+=`<div style="display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer" onclick="closeModal();moveCard(${c.uid},'deck','free')" title="${c.name}">${imgEl}<div style="font-size:8px;color:var(--tx3);max-width:56px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;text-align:center">${c.name}</div></div>`;
  });
  h+='</div><p style="font-size:12px;color:var(--tx3);margin-bottom:10px">💡 タップで移動先を選べます</p><button class="mb cancel" onclick="closeModal()">閉じる</button>';
  openModal(`デッキ (${S.deck.length}枚)`,h);
}
function viewTrash(){
  let h='<div id="deck-grid">';
  if(!S.trash.length)h+='<div style="color:var(--tx3);padding:20px;font-size:12px;width:100%;text-align:center">トラッシュが空です</div>';
  else S.trash.forEach(c=>{
    const imgEl=c.imageUrl?`<img src="${c.imageUrl}" alt="${c.name}" style="width:56px;height:78px;border-radius:6px;object-fit:cover;border:1.5px solid var(--bd)" onerror="this.style.display='none'">`:`<div style="width:56px;height:78px;border-radius:6px;background:var(--s2);border:1.5px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:20px">${typeEmoji(c.supertype)}</div>`;
    h+=`<div style="display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer" onclick="sendToZoneFromView(${c.uid},'trash')" title="${c.name}">${imgEl}<div style="font-size:8px;color:var(--tx3);max-width:56px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;text-align:center">${c.name}</div></div>`;
  });
  h+='</div><p style="font-size:12px;color:var(--tx3);margin-bottom:10px">💡 タップで移動先を選べます</p><button class="mb cancel" onclick="closeModal()">閉じる</button>';
  openModal(`トラッシュ (${S.trash.length}枚)`,h);
}

// カードタップ→移動先選択モーダル（タップ操作最適化）
window.sendToZoneFromView=function(cardUid,fromZone){
  closeModal();
  const allCards=[...S.deck,...S.hand,...S.side,...S.trash,...S.stadium,...S.free,
    ...S.battle.pokemons,...S.battle.energy,...S.battle.tools,
    ...S.bench.flatMap(b=>[...b.pokemons,...b.energy,...b.tools])];
  const card=allCards.find(c=>c.uid===cardUid);
  if(!card)return;
  showMoveModal(card,fromZone);
};

function showMoveModal(card,from){
  const imgHtml=card.imageUrl
    ?`<img src="${card.imageUrl}" class="card-preview-img" style="width:54px;height:76px" onerror="this.outerHTML='<div class=\\'card-preview-img\\'>${typeEmoji(card.supertype)}</div>'">`
    :`<div class="card-preview-img">${typeEmoji(card.supertype)}</div>`;
  const destinations=[
    {id:'hand',label:'手札',icon:'🤲',cls:'hand'},
    {id:'battle',label:'バトル場',icon:'⚔️',cls:'battle'},
    {id:'bench-0',label:'ベンチ1',icon:'🪑',cls:'bench'},
    {id:'bench-1',label:'ベンチ2',icon:'🪑',cls:'bench'},
    {id:'bench-2',label:'ベンチ3',icon:'🪑',cls:'bench'},
    {id:'bench-3',label:'ベンチ4',icon:'🪑',cls:'bench'},
    {id:'bench-4',label:'ベンチ5',icon:'🪑',cls:'bench'},
    {id:'free',label:'フリー',icon:'📌',cls:'free'},
    {id:'stad',label:'スタジアム',icon:'🏟',cls:'stad'},
    {id:'deck',label:'デッキ',icon:'📦',cls:'deck'},
    {id:'trash',label:'トラッシュ',icon:'🗑',cls:'trash'},
  ].filter(d=>d.id!==from&&!(from.startsWith('bench')&&d.id.startsWith('bench')&&d.id===from));

  let h=`<div class="card-preview">${imgHtml}<div class="card-preview-info"><div class="card-preview-name">${card.name}</div><div class="card-preview-type">${card.supertype||''}</div><div style="font-size:10px;color:var(--tx3);margin-top:3px">現在: ${zoneLabel(from)}</div></div></div>`;
  h+='<div class="dest-grid">';
  destinations.forEach(d=>{
    const to=d.id.startsWith('bench-')?'bench':d.id==='stad'?'stadium':d.id;
    const si=d.id.startsWith('bench-')?parseInt(d.id.split('-')[1]):undefined;
    const siStr=si!==undefined?`,${si}`:'';
    h+=`<button class="dest-btn ${d.cls}" onclick="closeModal();moveCard(${card.uid},'${from}','${to}'${siStr})"><span class="dest-icon">${d.icon}</span>${d.label}</button>`;
  });
  h+='</div>';
  h+=`<button class="mb cancel" onclick="closeModal()">キャンセル</button>`;
  openModal('どこに移動？',h);
}

function zoneLabel(z){
  if(z==='hand')return '手札';if(z==='deck')return 'デッキ';if(z==='trash')return 'トラッシュ';
  if(z==='battle')return 'バトル場';if(z==='side')return 'サイド';if(z==='stadium')return 'スタジアム';
  if(z==='free')return 'フリー';if(z?.startsWith('bench-'))return `ベンチ${parseInt(z.split('-')[1])+1}`;
  return z;
}

function showDeckMenu(){
  openModal('デッキ操作',`
    <button class="mb" onclick="closeModal();drawOne()">1枚ドロー</button>
    <button class="mb" onclick="closeModal();shuffleDeck()">シャッフル</button>
    <button class="mb" onclick="closeModal();viewDeck()">デッキを見る（タップで移動）</button>
    <button class="mb cancel" onclick="closeModal()">閉じる</button>
  `);
}
function takePrize(){if(!S.side.length){toast('サイドが空です');return;}const c=S.side.shift();c._zone='hand';S.hand.push(c);render();toast('サイドを取りました');}
function returnHandToDeck(){S.hand.forEach(c=>c._zone='deck');S.deck.push(...S.hand);S.hand=[];S.deck=shuffle(S.deck);render();toast('手札をデッキに戻してシャッフルしました');}
function sortZone(zone){
  const o=st=>{const c=typeClass(st);return c==='pokemon'?0:c==='trainer'?1:c==='energy'?2:3;};
  const fn=(a,b)=>o(a.supertype)-o(b.supertype)||a.name.localeCompare(b.name,'ja');
  if(zone==='hand')S.hand.sort(fn);else if(zone==='trash')S.trash.sort(fn);
  render();toast('並び替えました');
}
function swapBenchBattle(i){
  const b=S.bench[i],bt=S.battle;
  const tmp={pokemons:[...bt.pokemons],energy:[...bt.energy],tools:[...bt.tools],statuses:new Set(bt.statuses)};
  bt.pokemons=[...b.pokemons];bt.energy=[...b.energy];bt.tools=[...b.tools];bt.statuses=new Set(b.statuses);
  b.pokemons=tmp.pokemons;b.energy=tmp.energy;b.tools=tmp.tools;b.statuses=tmp.statuses;
  const setZone=(slot,z)=>{slot.pokemons.forEach(c=>c._zone=z);slot.energy.forEach(c=>c._zone=z);slot.tools.forEach(c=>c._zone=z);};
  setZone(bt,'battle');setZone(b,`bench-${i}`);
  render();renderStatusMarkers();toast('バトル場とベンチを入れ替えました');
}
function nextTurn(){S.turn++;render();toast(`ターン ${S.turn}`);}

// MOVE CARD
window.moveCard=function(cardUid,from,to,si){
  let card=null;
  function rem(zone){
    const zones={hand:S.hand,deck:S.deck,trash:S.trash,side:S.side,stadium:S.stadium,free:S.free};
    if(zones[zone]){const i=zones[zone].findIndex(c=>c.uid===cardUid);if(i>=0)card=zones[zone].splice(i,1)[0];return;}
    if(zone==='battle'){
      let i=S.battle.pokemons.findIndex(c=>c.uid===cardUid);if(i>=0){card=S.battle.pokemons.splice(i,1)[0];return;}
      i=S.battle.energy.findIndex(c=>c.uid===cardUid);if(i>=0){card=S.battle.energy.splice(i,1)[0];return;}
      i=S.battle.tools.findIndex(c=>c.uid===cardUid);if(i>=0){card=S.battle.tools.splice(i,1)[0];return;}
    }
    if(zone?.startsWith('bench-')){
      const idx=parseInt(zone.split('-')[1]);const b=S.bench[idx];
      let i=b.pokemons.findIndex(c=>c.uid===cardUid);if(i>=0){card=b.pokemons.splice(i,1)[0];return;}
      i=b.energy.findIndex(c=>c.uid===cardUid);if(i>=0){card=b.energy.splice(i,1)[0];return;}
      i=b.tools.findIndex(c=>c.uid===cardUid);if(i>=0){card=b.tools.splice(i,1)[0];return;}
    }
  }
  rem(from);if(!card)return;
  const place=(slot,zone)=>{
    card._zone=zone;
    if(isPokemon(card))slot.pokemons.push(card);
    else if(isEnergy(card))slot.energy.push(card);
    else slot.tools.push(card);
  };
  if(to==='hand'){card._zone='hand';S.hand.push(card);}
  else if(to==='deck'){card._zone='deck';S.deck.push(card);S.deck=shuffle(S.deck);}
  else if(to==='trash'){card._zone='trash';S.trash.push(card);}
  else if(to==='side'){card._zone='side';S.side.push(card);}
  else if(to==='stadium'){card._zone='stadium';S.stadium.push(card);}
  else if(to==='free'){card._zone='free';S.free.push(card);}
  else if(to==='battle'){place(S.battle,'battle');}
  else if(to==='bench'){const idx=si??0;place(S.bench[idx],`bench-${idx}`);}
  render();
};

// CARD ELEMENT（タップで移動モーダル）
function mkCard(card,facedown=false){
  const el=document.createElement('div');
  el.className='card '+typeClass(card.supertype)+(facedown?' fd':'');
  el.dataset.uid=card.uid;
  if(!facedown){
    if(card.imageUrl){
      const img=document.createElement('img');img.className='cimg';img.src=card.imageUrl;img.alt=card.name;
      img.loading='lazy';img.draggable=false;
      img.onerror=()=>{img.remove();el.appendChild(mkPh(card));};
      el.appendChild(img);
    }else el.appendChild(mkPh(card));
  }
  if(!facedown){
    el.addEventListener('mousedown',e=>{
      if(e.button!==0)return;
      pendingDrag={card,el,startX:e.clientX,startY:e.clientY};
    });
    el.addEventListener('touchstart',e=>{startDrag(card,el,e.touches[0]);},{passive:true});
  }
  el.addEventListener('click',()=>{
    if(dragCard||ghostEl)return;
    if(facedown)return;
    showZoom(card);
  });
  return el;
}
function mkPh(card){const ph=document.createElement('div');ph.className='cph';ph.textContent=typeEmoji(card.supertype);return ph;}

// ポケモンスタック表示
function renderPokeStack(pokemons,containerId){
  const wrap=document.getElementById(containerId);if(!wrap)return;
  wrap.innerHTML='';
  if(!pokemons.length){wrap.style.minHeight='90px';return;}
  const OFFSET=16;
  const totalH=86+(pokemons.length-1)*OFFSET;
  wrap.style.minHeight=totalH+'px';
  wrap.style.position='relative';
  pokemons.forEach((card,i)=>{
    const el=mkCard(card);
    el.style.position='absolute';el.style.bottom='0';el.style.left='50%';
    el.style.transform=`translateX(-50%) translateY(-${(pokemons.length-1-i)*OFFSET}px)`;
    el.style.zIndex=i;
    wrap.appendChild(el);
  });
}
function renderSlot(slot,stackId,eId,tId){
  renderPokeStack(slot.pokemons,stackId);
  const ep=document.getElementById(eId),tp=document.getElementById(tId);
  if(ep){ep.innerHTML='<div class="area-label">エネルギー</div>';slot.energy.forEach(c=>{const el=mkCard(c);ep.appendChild(el);});}
  if(tp){tp.innerHTML='<div class="area-label">どうぐ</div>';slot.tools.forEach(c=>{const el=mkCard(c);tp.appendChild(el);});}
}

// トラッシュ
function renderTrash(){
  document.getElementById('cnt-trash').textContent=S.trash.length;
  const ct=document.getElementById('cards-trash');if(!ct)return;
  ct.innerHTML='';
  S.trash.forEach(c=>ct.appendChild(mkCard(c)));
}

function rList(id,cards,fd=false){const el=document.getElementById(id);if(!el)return;el.innerHTML='';cards.forEach(c=>el.appendChild(mkCard(c,fd)));}

function render(){
  document.getElementById('cnt-deck').textContent=S.deck.length;
  document.getElementById('pile-cnt').textContent=S.deck.length;
  document.getElementById('cnt-hand').textContent=S.hand.length;
  document.getElementById('cnt-side').textContent=S.side.length;
  document.getElementById('cnt-stadium').textContent=S.stadium.length;

  rList('cards-hand',S.hand);
  rList('cards-side',S.side,true);
  rList('cards-free',S.free);
  renderTrash();
  // スタジアム
  const stadEl=document.getElementById('cards-stadium');stadEl.innerHTML='';
  if(S.stadium.length>0){
    const c=mkCard(S.stadium[S.stadium.length-1]);c.style.width='44px';c.style.height='60px';stadEl.appendChild(c);
    if(S.stadium.length>1){const b=document.createElement('div');b.style.cssText='font-size:9px;color:rgba(206,147,216,.9);font-weight:700;text-align:center';b.textContent=`+${S.stadium.length-1}`;stadEl.appendChild(b);}
  }
  // バトル場
  renderSlot(S.battle,'bp-wrap','ba-energy','ba-tool');
  document.getElementById('bslot').classList.toggle('occ',S.battle.pokemons.length>0);
  // ベンチ
  S.bench.forEach((b,i)=>{
    renderSlot(b,`bp-wrap-${i}`,`be-${i}`,`bt-${i}`);
    document.querySelector(`.bnslot[data-si="${i}"]`)?.classList.toggle('occ',b.pokemons.length>0);
  });
  renderStatusMarkers();
}

// BENCH
function setupBench(){
  const con=document.getElementById('bench-slots');con.innerHTML='';
  for(let i=0;i<5;i++){
    const s=document.createElement('div');s.className='bnslot';s.dataset.si=i;
    s.dataset.dropzone='bench';
    s.innerHTML=`
      <div class="snum">${i+1}</div>
      <div class="poke-stack-wrap" id="bp-wrap-${i}" style="min-height:90px;width:100%;position:relative"></div>
      <div class="energy-area" id="be-${i}"><div class="area-label">E</div></div>
      <div class="tool-area" id="bt-${i}"><div class="area-label">T</div></div>
      <div class="bench-actions">
        <button class="swpbtn" onclick="swapBenchBattle(${i})">⇄ バトル</button>
        <button class="bn-trbtn" onclick="trashZone('bench-single',${i})">🗑</button>
      </div>`;
    con.appendChild(s);
  }
}


// ===== DRAG & DROP =====
let dragCard=null,dragFrom=null,ghostEl=null;
let pendingDrag=null; // {card,el,startX,startY}
const DRAG_THRESHOLD=8; // px動いたらドラッグ開始

let ghostX=0,ghostY=0,rafId=null;
function lockScroll(){document.documentElement.style.overflow='hidden';document.body.style.overflow='hidden';}
function unlockScroll(){document.documentElement.style.overflow='';document.body.style.overflow='';}

function startDrag(card,el,e){
  dragCard=card;dragFrom=card._zone;
  el.classList.add('dragging');
  ghostEl=el.cloneNode(true);
  ghostEl.className=el.className.replace('dragging','')+' drag-ghost';
  ghostEl.style.width=el.offsetWidth+'px';ghostEl.style.height=el.offsetHeight+'px';
  document.body.appendChild(ghostEl);
  lockScroll();
  updateGhostPos(e);
  animateGhost();
}
function updateGhostPos(e){
  ghostX=(e.clientX||(e.touches&&e.touches[0]?e.touches[0].clientX:0))-30;
  ghostY=(e.clientY||(e.touches&&e.touches[0]?e.touches[0].clientY:0))-42;
}
function animateGhost(){
  if(!ghostEl)return;
  ghostEl.style.left=ghostX+'px';
  ghostEl.style.top=ghostY+'px';
  rafId=requestAnimationFrame(animateGhost);
}
function moveGhost(e){
  if(!ghostEl)return;
  updateGhostPos(e);
}
function endDrag(e){
  pendingDrag=null;
  unlockScroll();
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  if(!dragCard)return;
  document.querySelectorAll('.dragging').forEach(el=>el.classList.remove('dragging'));
  document.querySelectorAll('.drop-target').forEach(el=>el.classList.remove('drop-target'));
  if(ghostEl){ghostEl.remove();ghostEl=null;}
  const x=e.clientX||(e.changedTouches&&e.changedTouches[0]?e.changedTouches[0].clientX:0);
  const y=e.clientY||(e.changedTouches&&e.changedTouches[0]?e.changedTouches[0].clientY:0);
  const target=document.elementFromPoint(x,y);
  if(!target){dragCard=null;dragFrom=null;return;}
  const zone=target.closest('[data-dropzone]');
  if(zone){
    const to=zone.dataset.dropzone;
    const si=zone.dataset.si!=null?parseInt(zone.dataset.si):undefined;
    moveCard(dragCard.uid,dragFrom,to,si);
  }
  dragCard=null;dragFrom=null;
}
document.addEventListener('mousemove',e=>{
  if(pendingDrag){
    const dx=e.clientX-pendingDrag.startX, dy=e.clientY-pendingDrag.startY;
    if(Math.sqrt(dx*dx+dy*dy)>DRAG_THRESHOLD){
      startDrag(pendingDrag.card,pendingDrag.el,e);
      pendingDrag=null;
    }
  }
  if(dragCard){
    moveGhost(e);
    document.querySelectorAll('.drop-target').forEach(el=>el.classList.remove('drop-target'));
    const el=document.elementFromPoint(e.clientX,e.clientY);
    if(el)el.closest('[data-dropzone]')?.classList.add('drop-target');
  }
});
document.addEventListener('mouseup',e=>{if(dragCard)endDrag(e);else pendingDrag=null;});
document.addEventListener('touchmove',e=>{if(dragCard){e.preventDefault();moveGhost(e);}},{passive:false});
document.addEventListener('touchend',e=>{if(dragCard)endDrag(e);});

function syncScroll(containerId, bar){
  const el=document.getElementById(containerId);
  if(!el)return;
  const max=el.scrollWidth-el.clientWidth;
  el.scrollLeft=max*(bar.value/100);
}
function syncBar(containerId, barId){
  const el=document.getElementById(containerId);
  const bar=document.getElementById(barId);
  if(!el||!bar)return;
  const max=el.scrollWidth-el.clientWidth;
  if(max<=0){bar.value=0;return;}
  bar.value=(el.scrollLeft/max)*100;
}


// カード拡大表示
function showZoom(card){
  const bg=document.getElementById('card-zoom-bg');
  const inner=document.getElementById('card-zoom-inner');
  inner.innerHTML='';
  if(card.imageUrl){
    const img=document.createElement('img');
    img.id='card-zoom-img';
    img.src=card.imageUrl;
    img.alt=card.name;
    inner.appendChild(img);
  } else {
    const ph=document.createElement('div');
    ph.id='card-zoom-ph';
    ph.textContent=typeEmoji(card.supertype);
    inner.appendChild(ph);
  }
  bg.classList.add('open');
}
function closeZoom(){
  document.getElementById('card-zoom-bg').classList.remove('open');
}

setupBench();
render();
loadFromURL();
