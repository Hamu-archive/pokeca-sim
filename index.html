<head>

<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ポケカ一人回し</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f0f7f0;--s1:#fff;--s2:#e8f5e9;--s3:#c8e6c9;
  --bd:#a5d6a7;--bd2:#66bb6a;
  --acc:#1b5e20;--acc2:#2e7d32;--acc3:#43a047;
  --tx:#1b2e1b;--tx2:#3d5a3d;--tx3:#6a8f6a;
  --rd:#c62828;--pu:#6a1b9a;
  --cw:62px;--ch:86px;
  --shadow:0 2px 6px rgba(0,0,0,0.15);
  --line:rgba(255,255,255,0.65);
  --mat:#3a7d3a;
}
html,body{height:100%;color:var(--tx);font-family:'Hiragino Kaku Gothic Pro','Noto Sans JP',sans-serif;font-size:14px;overflow-x:hidden;overflow-y:auto;background:#1a1a1a}
#app{display:flex;flex-direction:column;min-height:100vh;min-height:100dvh;max-width:480px;margin:0 auto;background:#1a1a1a}

/* ===== HEADER ===== */
#hdr{
  background:rgba(255,255,255,0.92);color:#1b5e20;backdrop-filter:blur(6px);
  padding:0 10px;
  display:flex;align-items:center;gap:6px;
  height:44px;flex-shrink:0;
  box-shadow:0 2px 8px rgba(0,0,0,0.12);
  position:sticky;top:0;z-index:100;
}
#hdr h1{font-size:13px;font-weight:700;white-space:nowrap;letter-spacing:.03em}
.hbtn{
  background:rgba(27,94,32,0.1);border:1px solid rgba(27,94,32,0.3);
  color:#1b5e20;padding:5px 9px;border-radius:6px;cursor:pointer;font-size:11px;white-space:nowrap;
  font-weight:600;flex-shrink:0;
}
.hbtn:hover,.hbtn:active{background:rgba(27,94,32,0.18)}
.hbtn.go{background:var(--acc2);color:#fff;font-weight:700}
.hbtn:disabled{opacity:.35;cursor:not-allowed}
.badge{
  background:rgba(27,94,32,0.1);border:1px solid rgba(27,94,32,0.2);
  padding:3px 7px;border-radius:5px;font-size:11px;color:#2e7d32;
  white-space:nowrap;flex-shrink:0;
}
.badge b{color:#1b5e20;font-weight:700}
#hdr-spacer{flex:1}

#playmat::before{
  content:'';position:absolute;inset:0;
  background:rgba(0,0,0,0.45);
  pointer-events:none;z-index:0;
}
#field{position:relative;z-index:1;}

/* ===== FIELD GRID ===== */
#field{
  flex:1;display:flex;flex-direction:column;
  padding:6px 6px 4px;gap:4px;
}

/* === 上段: サイド | バトル場 | デッキ === */
#row-top{
  display:grid;grid-template-columns:72px 1fr 72px;
  gap:4px;flex-shrink:0;
}

/* サイドゾーン */
#side-zone{
  background:rgba(0,0,0,0.2);border:1.5px solid var(--line);border-radius:8px;
  padding:4px;display:flex;flex-direction:column;gap:3px;
}
#cards-side{display:grid;grid-template-columns:1fr 1fr;gap:2px;}
#cards-side .card{width:100%;height:52px;}
.zone-lbl{font-size:9px;font-weight:700;color:var(--line);text-transform:uppercase;letter-spacing:.06em;text-align:center;flex-shrink:0}
.z-btn{
  background:rgba(0,0,0,0.22);border:1px solid var(--line);
  color:rgba(255,255,255,.88);padding:3px;border-radius:5px;
  cursor:pointer;font-size:10px;width:100%;font-weight:600;flex-shrink:0;
  margin-top:1px;
}
.z-btn:active{background:rgba(0,0,0,.45)}
.z-btn.red{background:rgba(150,0,0,0.3);border-color:rgba(255,120,120,.4);color:rgba(255,200,200,.95)}
.z-btn.red:active{background:rgba(150,0,0,.55)}

/* バトル場 */
#battle-wrap{display:flex;flex-direction:column;align-items:center;gap:3px}
#bslot{
  width:100%;border:2px solid var(--line);border-radius:10px;
  background:rgba(255,255,255,0.09);padding:6px;
  display:flex;flex-direction:column;align-items:center;gap:3px;
}
#bslot.occ{background:rgba(255,255,255,0.16);border-color:rgba(255,255,255,.9)}
.poke-stack-wrap{position:relative;width:100%;display:flex;justify-content:center}
.energy-area{
  width:100%;background:rgba(0,0,0,0.13);
  border:1px dashed rgba(255,255,255,.35);border-radius:5px;
  padding:3px;min-height:28px;display:flex;flex-wrap:wrap;gap:2px;
}
.tool-area{
  width:100%;background:rgba(0,0,0,0.09);
  border:1px dashed rgba(180,220,255,.35);border-radius:5px;
  padding:3px;min-height:22px;display:flex;flex-wrap:wrap;gap:2px;
}
.area-label{font-size:7px;color:rgba(255,255,255,.55);width:100%;font-weight:600}
.energy-area .card,.tool-area .card{width:30px;height:42px}
.status-markers{display:flex;flex-wrap:wrap;gap:2px;justify-content:center;width:100%}
.smark{padding:3px 5px;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;border:none;min-width:28px}
.smark.off{background:rgba(255,255,255,.12);color:rgba(255,255,255,.4)}
.smark.やけど{background:#c62828;color:#fff}
.smark.どく{background:#6a1b9a;color:#fff}
.smark.ねむり{background:#1565c0;color:#fff}
.smark.まひ{background:#e65100;color:#fff}
.smark.こんらん{background:#880e4f;color:#fff}

/* デッキゾーン */
#deck-zone{display:flex;flex-direction:column;gap:3px;align-items:center}

  border:2px solid #e8c840;
  cursor:pointer;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:1px;
  box-shadow:3px 3px 0 rgba(0,0,0,.3);flex-shrink:0;
}
.dpile:active{transform:translateY(1px)}
.dpile .pcnt{font-size:18px;font-weight:700;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.8)}
.dpile .plbl{font-size:8px;color:rgba(255,255,255,.7)}
.rdb{
  background:rgba(0,0,0,.22);border:1px solid var(--line);
  color:rgba(255,255,255,.88);padding:4px 3px;border-radius:5px;
  cursor:pointer;font-size:9px;font-weight:500;text-align:center;width:100%;
}
.rdb:active{background:rgba(0,0,0,.45)}

/* === 中段: スタジアム | コイン | フリー === */
#row-mid{
  display:grid;grid-template-columns:1fr 70px 1fr;
  gap:4px;flex-shrink:0;
}
#stad-zone{
  background:rgba(106,27,154,.18);border:1.5px dashed rgba(206,147,216,.55);
  border-radius:8px;padding:4px;display:flex;flex-direction:column;align-items:center;gap:2px;
}
#stad-zone .zone-lbl{color:rgba(206,147,216,.9)}
#cards-stadium{display:flex;align-items:center;justify-content:center;min-height:80px;width:100%}
#cards-stadium .card{width:44px;height:60px}
#coin-zone{
  background:rgba(0,0,0,.2);border:1.5px solid var(--line);border-radius:8px;
  padding:4px;display:flex;flex-direction:column;align-items:center;gap:2px;
}
.coin-result{min-height:56px;text-align:center;display:flex;align-items:center;justify-content:center}
.coin-btn{
  background:rgba(0,0,0,.22);border:1px solid var(--line);
  color:rgba(255,255,255,.9);padding:4px;border-radius:5px;
  cursor:pointer;font-size:10px;font-weight:700;width:100%;
}
.coin-btn:active{background:rgba(0,0,0,.45)}
.coin-hist{font-size:9px;color:rgba(255,255,255,.5);text-align:center;min-height:12px;word-break:break-all}
#free-zone{
  background:rgba(255,255,255,0.07);border:1.5px dashed rgba(255,255,255,.4);
  border-radius:8px;padding:4px;display:flex;flex-direction:column;gap:2px;
}
#cards-free{display:flex;flex-wrap:wrap;gap:2px;align-content:start;min-height:80px;overflow-y:auto;justify-content:flex-start}
#cards-free .card{width:36px;height:50px}

/* === トラッシュ === */
#trash-area{
  background:rgba(255,255,255,.75);border-top:2px solid rgba(200,100,100,.25);backdrop-filter:blur(6px);
  padding:5px 8px;flex-shrink:0;position:relative;z-index:10;
}
#trash-head{display:flex;align-items:center;gap:5px;margin-bottom:4px;flex-wrap:wrap}
.th{font-size:11px;color:#c62828;text-transform:uppercase;letter-spacing:.07em;font-weight:700}
.tc{color:#c62828;font-weight:700;font-size:12px;background:rgba(198,40,40,.12);padding:1px 7px;border-radius:10px}
.tb{background:rgba(198,40,40,.08);border:1px solid rgba(198,40,40,.25);color:#c62828;padding:4px 8px;border-radius:5px;cursor:pointer;font-size:11px}
.tb:active{background:rgba(255,255,255,.2)}
#cards-trash{display:flex;flex-wrap:nowrap;gap:4px;overflow-x:auto;min-height:90px;align-items:flex-start;padding:2px}
#cards-trash::-webkit-scrollbar{display:none}

/* === 手札 === */
#hand-area{
  background:rgba(255,255,255,.82);border-top:2px solid rgba(0,0,0,.1);backdrop-filter:blur(6px);
  padding:5px 8px;flex-shrink:0;position:relative;z-index:10;
}
#hand-head{display:flex;align-items:center;gap:5px;margin-bottom:4px;flex-wrap:wrap}
.ht{font-size:11px;color:var(--acc2);text-transform:uppercase;letter-spacing:.07em;font-weight:700}
.hc{color:var(--acc3);font-weight:700;font-size:12px;background:var(--s2);padding:1px 7px;border-radius:10px}
.hb{background:var(--s2);border:1px solid var(--bd);color:var(--tx2);padding:4px 8px;border-radius:5px;cursor:pointer;font-size:11px}
.hb:active{background:var(--s3)}
.hb.red{background:#fff0f0;border-color:#ffcdd2;color:#c62828}
#cards-hand{display:flex;flex-wrap:nowrap;gap:4px;overflow-x:auto;min-height:90px;align-items:flex-start;padding:2px}
#cards-hand::-webkit-scrollbar{display:none}

/* === ベンチ === */
#bench-area{
  background:rgba(255,255,255,.75);border-top:2px solid rgba(0,0,0,.1);backdrop-filter:blur(6px);
  padding:5px 6px;flex-shrink:0;position:relative;z-index:10;
}
#bench-head{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.bench-lbl{font-size:10px;font-weight:700;color:var(--acc2);text-transform:uppercase;letter-spacing:.07em}
#bench-slots{display:flex;gap:4px;overflow-x:auto;padding:2px}
#bench-slots::-webkit-scrollbar{height:3px}
#bench-slots::-webkit-scrollbar-thumb{background:rgba(255,255,255,.3);border-radius:2px}
.bnslot{
  background:rgba(0,0,0,.15);border:2px dashed rgba(255,255,255,.35);
  border-radius:8px;padding:4px;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  flex:0 0 88px;
}
.bnslot.occ{border-style:solid;border-color:rgba(255,255,255,.72);background:rgba(255,255,255,.12)}
.snum{font-size:9px;color:rgba(255,255,255,.5);font-weight:600}
.bnslot .energy-area,.bnslot .tool-area{min-height:20px;padding:2px}
.bnslot .energy-area .card,.bnslot .tool-area .card{width:24px;height:34px}
.bench-actions{display:flex;gap:2px;width:100%}
.swpbtn{background:rgba(46,125,50,.55);color:#fff;border:1px solid rgba(255,255,255,.25);padding:3px 0;border-radius:5px;cursor:pointer;font-size:9px;font-weight:600;flex:1;text-align:center}
.swpbtn:active{background:rgba(46,125,50,.85)}
.bn-trbtn{background:rgba(150,0,0,.3);border:1px solid rgba(255,120,120,.35);color:rgba(255,200,200,.9);padding:3px 5px;border-radius:5px;cursor:pointer;font-size:9px;font-weight:600}
.bn-trbtn:active{background:rgba(150,0,0,.55)}

/* === CARDS === */
.card{
  width:var(--cw);height:var(--ch);border-radius:7px;border:1.5px solid var(--bd);
  cursor:grab;position:relative;display:flex;flex-direction:column;
  align-items:center;justify-content:center;user-select:none;overflow:hidden;
  background:var(--s2);flex-shrink:0;
  box-shadow:var(--shadow);transition:transform .1s,box-shadow .1s;
}
.card:active{cursor:grabbing;transform:scale(.93)}
.card.dragging{opacity:.4;transform:scale(.93);pointer-events:none}

.cph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:22px}

/* === MODAL === */
#mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;align-items:flex-end;justify-content:center}
#mbg.open{display:flex}
#mbox{
  background:#fff;border-radius:20px 20px 0 0;padding:16px;
  width:100%;max-width:480px;max-height:82vh;overflow-y:auto;
  box-shadow:0 -6px 24px rgba(0,0,0,.2);
}
.modal-handle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 14px}
#mbox h3{font-size:15px;color:var(--acc);margin-bottom:8px;font-weight:700}
.mb{
  display:block;width:100%;background:var(--s2);border:1px solid var(--bd);
  color:var(--tx);padding:13px 16px;border-radius:9px;cursor:pointer;
  text-align:left;font-size:14px;margin-bottom:7px;font-weight:500;
}
.mb:active{background:var(--s3)}
.mb.cancel{color:var(--tx3);background:#f5f5f5;border-color:#ddd}
.mb.red{color:#c62828;background:#fff5f5;border-color:#ffcdd2}
.mb.go{background:var(--acc2);color:#fff;font-weight:700;border-color:var(--acc2)}
#deck-grid{display:flex;flex-wrap:wrap;gap:5px;max-height:340px;overflow-y:auto;margin-bottom:10px;padding:5px;background:var(--bg);border-radius:9px}
#deck-input-area{display:flex;flex-direction:column;gap:10px}
#deck-input-area input{background:var(--s2);border:1.5px solid var(--bd2);color:var(--tx);padding:12px;border-radius:9px;font-size:15px;width:100%}
.input-hint{font-size:12px;color:var(--tx3);line-height:1.7;padding:10px;background:var(--s2);border-radius:7px}
.input-hint b{color:var(--tx2)}

/* 移動先選択モーダル */
.dest-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:8px}
.dest-btn{
  background:var(--s2);border:1.5px solid var(--bd);color:var(--tx);
  padding:12px 8px;border-radius:9px;cursor:pointer;text-align:center;
  font-size:13px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:3px;
}
.dest-btn:active{background:var(--s3)}
.dest-btn .dest-icon{font-size:20px}
.dest-btn.battle{background:#fff0f0;border-color:#ef9a9a}
.dest-btn.bench{background:#f0fff0;border-color:#a5d6a7}
.dest-btn.trash{background:#fff5f5;border-color:#ef9a9a;color:#c62828}
.dest-btn.deck{background:#e8f0ff;border-color:#9db8f0}
.dest-btn.hand{background:#fffde7;border-color:#ffe082;color:#e65100}
.dest-btn.free{background:#f3e5f5;border-color:#ce93d8;color:#6a1b9a}
.dest-btn.stad{background:#ede7f6;border-color:#b39ddb;color:#4527a0}

/* card img preview in modal */
.card-preview{display:flex;align-items:center;gap:10px;padding:6px 0 10px;border-bottom:1px solid var(--bd);margin-bottom:10px}
.card-preview-img{width:54px;height:76px;border-radius:7px;object-fit:cover;border:1.5px solid var(--bd);background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.card-preview-info{flex:1}
.card-preview-name{font-size:14px;font-weight:700;color:var(--tx)}
.card-preview-type{font-size:11px;color:var(--tx3);margin-top:2px}


/* カスタムスクロールバー */
.zone-scrollbar-wrap{flex:1;display:flex;align-items:center;padding:0 2px;min-width:40px;}
.zone-scrollbar{
  width:100%;height:18px;
  -webkit-appearance:none;appearance:none;
  background:rgba(0,0,0,0.12);
  border-radius:9px;outline:none;cursor:pointer;
  border:1px solid rgba(255,255,255,0.15);
}
.zone-scrollbar::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:36px;height:18px;border-radius:9px;
  background:var(--bd2);cursor:grab;
  box-shadow:0 1px 4px rgba(0,0,0,0.3);
}
.zone-scrollbar::-webkit-slider-thumb:active{cursor:grabbing;}
#trash-area .zone-scrollbar::-webkit-slider-thumb{background:rgba(255,120,120,0.7);}

/* カード拡大表示 */
#card-zoom-bg{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);
  z-index:2000;align-items:center;justify-content:center;
}
#card-zoom-bg.open{display:flex}
#card-zoom-img{
  max-width:80vw;max-height:80vh;border-radius:12px;
  box-shadow:0 8px 40px rgba(0,0,0,.6);
  object-fit:contain;
}
#card-zoom-ph{
  width:180px;height:252px;border-radius:12px;
  background:var(--s2);display:flex;align-items:center;
  justify-content:center;font-size:64px;
  box-shadow:0 8px 40px rgba(0,0,0,.6);
}
/* TOAST */
#toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:var(--acc);color:#fff;padding:9px 20px;border-radius:22px;
  font-size:13px;opacity:0;pointer-events:none;transition:opacity .25s;
  z-index:2000;white-space:nowrap;max-width:90vw;
  box-shadow:0 4px 14px rgba(0,0,0,.25);font-weight:600;
}
#toast.show{opacity:1}
.mp-stat{
  font-size:10px;color:var(--tx3);
  max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

/* LOADING */
#loading{display:none;position:fixed;inset:0;background:rgba(255,255,255,.92);z-index:3000;flex-direction:column;align-items:center;justify-content:center;gap:18px}
#loading.open{display:flex}
.spin{width:40px;height:40px;border:3px solid var(--bd);border-top-color:var(--acc2);border-radius:50%;animation:sp .75s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#lmsg{font-size:14px;color:var(--tx2);text-align:center;padding:0 20px;font-weight:500}

/* COIN FLIP */
@keyframes flip{0%{transform:rotateY(0)}50%{transform:rotateY(90deg)}100%{transform:rotateY(0)}}
.flipping{animation:flip .3s ease}

/* 進化スタック表示 */
.poke-stack-wrap{position:relative;width:100%;display:flex;justify-content:center}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
/* ===== ダメカン ===== */
#damage-palette{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  background:rgba(0,0,0,0.2);border:1.5px solid var(--line);border-radius:8px;
  padding:4px 3px;width:72px;
}
.dmg-counters{display:flex;flex-direction:column;gap:4px;align-items:center;width:100%}
.dmg-chip{
  width:26px;height:26px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:900;cursor:grab;user-select:none;flex-shrink:0;
  font-family:'Arial Black',sans-serif;letter-spacing:-.5px;
}
.dmg-chip:active{cursor:grabbing;transform:scale(.92);}
.dmg-10{
  background:radial-gradient(ellipse at 40% 28%, rgba(255,255,255,0.85) 0%, rgba(255,255,255,0) 55%), radial-gradient(circle at 50% 50%, #ff8800 0%, #cc5500 100%);
  color:#000;
  box-shadow:0 0 0 2.5px #aa4400, inset 0 1px 3px rgba(255,255,255,0.4), 0 3px 8px rgba(0,0,0,0.6);
}
.dmg-50{
  background:radial-gradient(ellipse at 40% 28%, rgba(255,255,255,0.85) 0%, rgba(255,255,255,0) 55%), radial-gradient(circle at 50% 50%, #ff2200 0%, #aa0000 100%);
  color:#000;
  box-shadow:0 0 0 2.5px #880000, inset 0 1px 3px rgba(255,255,255,0.4), 0 3px 8px rgba(0,0,0,0.6);
}
.dmg-100{
  background:radial-gradient(ellipse at 40% 28%, rgba(255,255,255,0.85) 0%, rgba(255,255,255,0) 55%), radial-gradient(circle at 50% 50%, #ffe600 0%, #cc9900 100%);
  color:#000;
  box-shadow:0 0 0 2.5px #997700, inset 0 1px 3px rgba(255,255,255,0.4), 0 3px 8px rgba(0,0,0,0.6);
}
/* フィールド上のダメカン（position:fixed で自由移動） */
.dmg-floating{
  position:fixed;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:900;cursor:grab;user-select:none;
  font-family:'Arial Black',sans-serif;letter-spacing:-.5px;
  z-index:500;touch-action:none;
}
.dmg-floating:active{cursor:grabbing;}
.dmg-floating.dmg-10{
  width:26px;height:26px;color:#000;
  background:radial-gradient(ellipse at 40% 28%, rgba(255,255,255,0.85) 0%, rgba(255,255,255,0) 55%), radial-gradient(circle at 50% 50%, #ff8800 0%, #cc5500 100%);
  box-shadow:0 0 0 2.5px #aa4400, inset 0 1px 3px rgba(255,255,255,0.4), 0 3px 8px rgba(0,0,0,0.6);
}
.dmg-floating.dmg-50{
  width:26px;height:26px;color:#000;
  background:radial-gradient(ellipse at 40% 28%, rgba(255,255,255,0.85) 0%, rgba(255,255,255,0) 55%), radial-gradient(circle at 50% 50%, #ff2200 0%, #aa0000 100%);
  box-shadow:0 0 0 2.5px #880000, inset 0 1px 3px rgba(255,255,255,0.4), 0 3px 8px rgba(0,0,0,0.6);
}
.dmg-floating.dmg-100{
  width:26px;height:26px;color:#000;
  background:radial-gradient(ellipse at 40% 28%, rgba(255,255,255,0.85) 0%, rgba(255,255,255,0) 55%), radial-gradient(circle at 50% 50%, #ffe600 0%, #cc9900 100%);
  box-shadow:0 0 0 2.5px #997700, inset 0 1px 3px rgba(255,255,255,0.4), 0 3px 8px rgba(0,0,0,0.6);
}
</style>
</head>
<body>
<div id="app">
  <!-- HEADER -->
  <div id="hdr">
    <button class="hbtn" onclick="showDeckInput()">📋 デッキ</button>
    <button class="hbtn go" id="btn-start" disabled onclick="startGame()">開始/引直</button>
    <button class="hbtn" onclick="doReset()">↺</button>
    <button class="hbtn" onclick="showBattleMenu()">🌐 対戦</button>
    <button class="hbtn" style="padding:5px 8px;font-size:11px" onclick="endTurnMultiplayer()">⏭ ターン終了</button>
    <span id="mp-status" class="mp-stat">対戦: 未接続</span>
    <div id="hdr-spacer"></div>
  </div>

  <!-- PLAYMAT -->
  <div id="playmat">
    <div id="field">

      <!-- 上段: サイド | バトル場 | デッキ -->
      <div id="row-top">

        <!-- サイド -->
        <div id="side-zone">
          <div class="zone-lbl">サイド <span id="cnt-side">0</span></div>
          <div id="cards-side"></div>
          <button class="z-btn" onclick="takePrize()">1枚取る</button>
        </div>

        <!-- バトル場 -->
        <div id="battle-wrap">
          <div class="zone-lbl">バトル場</div>
          <div id="bslot" data-dropzone="battle">
            <div class="poke-stack-wrap" id="bp-wrap" style="min-height:90px"></div>
            <div class="energy-area" id="ba-energy"><div class="area-label">エネルギー</div></div>
            <div class="tool-area" id="ba-tool"><div class="area-label">どうぐ</div></div>
            <div class="tool-area" id="ba-dmg"><div class="area-label">ダメカン</div></div>
            <div class="status-markers" id="battle-markers">
              <button class="smark off" data-status="やけど" onclick="toggleStatus('やけど')">🔥</button>
              <button class="smark off" data-status="どく" onclick="toggleStatus('どく')">☠</button>
              <button class="smark off" data-status="ねむり" onclick="toggleStatus('ねむり')">💤</button>
              <button class="smark off" data-status="まひ" onclick="toggleStatus('まひ')">⚡</button>
              <button class="smark off" data-status="こんらん" onclick="toggleStatus('こんらん')">😵</button>
            </div>
          </div>
          <button class="z-btn red" onclick="trashZone('battle')">🗑 全トラッシュ</button>
        </div>

        <!-- デッキ -->
        <div id="deck-zone">
          <div class="zone-lbl">デッキ <span id="cnt-deck">0</span></div>
          <div class="dpile" onclick="showDeckMenu()">
            <div class="pcnt" id="pile-cnt">0</div>
            <div class="plbl">枚</div>
          </div>
          <button class="rdb" onclick="drawOne()">1枚ドロー</button>
          <button class="rdb" onclick="shuffleDeck()">シャッフル</button>
          <button class="rdb" onclick="viewDeck()">デッキ確認</button>
          <button class="rdb" style="margin-top:6px" onclick="startBattleMultiplayer()">⚔️ 対戦開始（準備OK）</button>
          <button class="rdb" onclick="toggleView()">👁 視点切替</button>
        </div>

        <!-- ダメカンパレット -->
        <div id="damage-palette">
          <div class="zone-lbl" style="color:rgba(255,255,255,.7);margin-bottom:3px">ダメカン</div>
          <div class="dmg-counters">
            <div class="dmg-chip dmg-10" data-value="10" onmousedown="startDmgDrag(event,10)" ontouchstart="startDmgDrag(event,10)">10</div>
            <div class="dmg-chip dmg-50" data-value="50" onmousedown="startDmgDrag(event,50)" ontouchstart="startDmgDrag(event,50)">50</div>
            <div class="dmg-chip dmg-100" data-value="100" onmousedown="startDmgDrag(event,100)" ontouchstart="startDmgDrag(event,100)">100</div>
          </div>
        </div>

      <!-- 中段: スタジアム | コイン | フリー -->
      <div id="row-mid">

        <!-- スタジアム -->
        <div id="stad-zone">
          <div class="zone-lbl" style="color:rgba(206,147,216,.9)">スタジアム <span id="cnt-stadium">0</span></div>
          <div id="cards-stadium" data-dropzone="stadium"></div>
        </div>

<script>
// =====================================================
// ポケカ一人回しシミュレーター
// 【構成概要】
//   1. 定数・状態管理 (S)
//   2. ユーティリティ (toast/loading/modal など)
//   3. コイン投げ (flipCoin)
//   4. 状態異常トグル (toggleStatus)
//   5. デッキ入力・デッキコード読み込み (loadByDeckCode)
//   6. ゲーム操作 (startGame / doReset / drawOne など)
//   7. カード移動 (moveCard) ─ 全ゾーン対応
//   8. カード描画 (mkCard / render / renderTrash など)
//   9. ベンチ初期化 (setupBench)
//  10. ドラッグ&ドロップ (startDrag / endDrag など)
//  11. カードメニュー / 移動先選択モーダル
//  12. 初期化実行
// =====================================================

// ─── 外部API (Cloudflare Worker) ───────────────────
// デッキコードをカードデータに変換するWorkerのURL
const WORKER='https://shiny-mud-d562.84shingen.workers.dev';

// ─── カードUID生成 ──────────────────────────────────
// 各カードに一意のIDを振る（移動追跡に使用）
let _uid=0;const uid=()=>++_uid;

// ─── ゲーム状態 (S) ─────────────────────────────────
// シミュレーター全体の状態を1オブジェクトで管理する。
// ゾーン一覧: deck / hand / side / trash / stadium / free /
//             battle (バトル場) / bench[0..4] (ベンチ5枠)
// battle・bench は {pokemons, energy, tools, statuses} の構造。
// statuses は Set で状態異常を保持（やけど/どく/ねむり/まひ/こんらん）。
const S={
  deck:[],hand:[],side:[],trash:[],stadium:[],free:[],
  battle:{pokemons:[],energy:[],tools:[],damages:[],statuses:new Set()},
  bench:Array(5).fill(0).map(()=>({pokemons:[],energy:[],tools:[],damages:[],statuses:new Set()})),
  turn:0,gameStarted:false
};

// ─── マルチプレイ状態 ─────────────────────────────────
const MP={
  db:null,enabled:false,roomCode:null,role:null,activePlayer:null,
  started:false,ready:{host:false,guest:false},handReveal:{host:false,guest:false},
  presenceRef:null,listener:null,view:'self',otherState:null,
  playerId:Math.random().toString(36).slice(2,9),
  actionHistory:[], // アクション履歴を記録
  lastSyncTime:0,
  applyingRemote:false,
  purgeAt:0,
  coinFlipped:false, // コイン投げ済みフラグ
  coinFlip:null // コインフリップ結果
};
// Firebase 設定（Firebaseコンソールの Web 設定からコピー）
// ※Realtime Database を使うため databaseURL が必須です。
const FIREBASE_CONFIG={
  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
  apiKey: "AIzaSyCnuwdEGyliQU46qm7XwYbke9yzaND35OQ",
  authDomain: "pokeca-745a5.firebaseapp.com",
  databaseURL: "https://pokeca-745a5-default-rtdb.asia-southeast1.firebasedatabase.app/",
  projectId: "pokeca-745a5",
  storageBucket: "pokeca-745a5.firebasestorage.app",
  messagingSenderId: "117445966113",
  appId: "1:117445966113:web:64c3bbec732983b78ae660"
};
function ensureMultiplayerReady(){
  if(MP.enabled)return true;
  const missing=[];
  if(!window.firebase?.initializeApp)missing.push('firebaseライブラリ未読込');
  if(!FIREBASE_CONFIG.apiKey)missing.push('apiKey');
  if(!FIREBASE_CONFIG.databaseURL)missing.push('databaseURL');
  const ok=missing.length===0;
  if(!ok){
    toast(`Firebase設定エラー: ${missing.join(', ')}`);
    return false;
  }
  if(!/^https?:\/\//.test(String(FIREBASE_CONFIG.databaseURL||''))){
    toast('Firebase設定エラー: databaseURL の形式が不正です');
    return false;
  }
  
  try {
    // すでにFirebaseアプリが存在するかチェック
    if(!firebase.apps.length){
      MP.app=firebase.initializeApp(FIREBASE_CONFIG);
    } else {
      MP.app=firebase.apps[0];
    }
    MP.db=firebase.database();
    MP.enabled=true;
    console.log('Firebase初期化成功');
    return true;
  } catch(error){
    console.error('Firebase初期化エラー:', error);
    toast(`Firebase初期化エラー: ${error.message}`);
    return false;
  }
}
function safeRoomCode(raw){return (raw||'').trim().toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,8);}
function updateMultiplayerStatus(){
  const el=document.getElementById('mp-status');if(!el)return;
  if(!MP.roomCode){el.textContent='対戦: 未接続';return;}
  const mine=MP.role==='host'?'作成者':'参加者';
  const turn=MP.activePlayer===MP.role?'自分のターン':'相手のターン';
  const view=MP.view==='self'?'自分視点':'相手視点';
  const st=MP.started?'対戦中':'準備中';
  const rd=(MP.ready.host?1:0)+(MP.ready.guest?1:0);
  el.textContent=`対戦: ${MP.roomCode} / ${mine} / ${st}(${rd}/2) / ${turn} / ${view}`;
}
function isMyTurn(){return !MP.roomCode||MP.activePlayer===MP.role;}
function isInteractiveView(){return !MP.roomCode||MP.view==='self';}
function assertCanAct(){
  // 対戦開始前は自由操作（自分視点のみ）
  if(MP.roomCode&&!MP.started){
    if(!isInteractiveView()){toast('相手視点では操作できません');return false;}
  }
  
  // 対戦中は自分のターンのみ
  if(MP.roomCode&&MP.started){
    if(!isMyTurn()){toast('相手のターンです');return false;}
    if(!isInteractiveView()){toast('相手視点では操作できません');return false;}
  }
  return true;
}
function encodeState(){
  const clone=JSON.parse(JSON.stringify(S));
  clone.battle.statuses=[...S.battle.statuses];
  clone.bench=S.bench.map(b=>({
    pokemons:b.pokemons,energy:b.energy,tools:b.tools,damages:b.damages||[],statuses:[...b.statuses]
  }));
  clone._uid=_uid;
  return clone;
}
function applyEncodedState(data){
  if(!data)return;
  MP.applyingRemote=true;
  S.deck=data.deck||[];S.hand=data.hand||[];S.side=data.side||[];
  S.trash=data.trash||[];S.stadium=data.stadium||[];S.free=data.free||[];
  S.battle={
    pokemons:data.battle?.pokemons||[],
    energy:data.battle?.energy||[],
    tools:data.battle?.tools||[],
    damages:data.battle?.damages||[],
    statuses:new Set(data.battle?.statuses||[])
  };
  S.bench=(data.bench||[]).slice(0,5).map(()=>({pokemons:[],energy:[],tools:[],damages:[],statuses:new Set()}));
  while(S.bench.length<5)S.bench.push({pokemons:[],energy:[],tools:[],damages:[],statuses:new Set()});
  (data.bench||[]).slice(0,5).forEach((b,i)=>{
    S.bench[i].pokemons=b?.pokemons||[];
    S.bench[i].energy=b?.energy||[];
    S.bench[i].tools=b?.tools||[];
    S.bench[i].damages=b?.damages||[];
    S.bench[i].statuses=new Set(b?.statuses||[]);
  });
  S.turn=data.turn||0;S.gameStarted=!!data.gameStarted;
  if(Number.isFinite(data._uid))_uid=Math.max(_uid,data._uid);
  MP.applyingRemote=false;
}
function recordAction(action, data){
  if(!MP.roomCode || MP.applyingRemote) return;
  
  // actionHistoryが配列であることを確認
  if(!Array.isArray(MP.actionHistory)){
    MP.actionHistory = [];
    console.log('actionHistoryが配列ではなかったため、初期化しました');
  }
  
  const actionEntry={
    timestamp:Date.now(),
    player:MP.role,
    action,
    data,
    id:Math.random().toString(36).slice(2,9)
  };
  
  MP.actionHistory.push(actionEntry);
  
  // Firebaseにも記録
  if(MP.roomRef){
    MP.roomRef.child('actionHistory').push(actionEntry);
  }
}
function syncNow(){
  if(!MP.roomRef||MP.applyingRemote)return;
  const key=MP.role==='host'?'hostState':'guestState';
  MP.roomRef.update({
    [key]:encodeState(),
    lastBy:MP.playerId,
    lastRole:MP.role,
    updatedAt:Date.now(),
    [`lastSyncTime/${MP.role}`]:Date.now()
  });
}
function toggleHandReveal(){
  if(!MP.roomCode){toast('対戦部屋に接続していません');return;}
  if(!isInteractiveView()){toast('自分視点に戻してください');return;}
  MP.handReveal[MP.role]=!MP.handReveal[MP.role];
  syncNow();
  toast(MP.handReveal[MP.role]?'手札を公開しました':'手札の公開をやめました');
}
function isOtherHandRevealed(){
  if(!MP.roomCode)return true;
  const other=MP.role==='host'?'guest':'host';
  return !!MP.handReveal?.[other];
}
function roomExpired(room){
  const t=Date.now();
  const purgeAt=room?.purgeAt||0;
  return purgeAt>0&&t>=purgeAt;
}
function schedulePurgeIfBothDisconnected(ref,room){
  const d=room?.disconnectedAt||{};
  const both=!!(d.host && d.guest);
  if(!both){
    // 片方でも切断されている場合、5分後に削除チェック
    const oneDisconnected=!!(d.host || d.guest);
    if(oneDisconnected && !room.purgeAt){
      ref.update({purgeAt:Date.now()+5*60*1000});
    }
    return;
  }
  if(room?.purgeAt)return;
  // 両方切断されたら5分後に完全削除
  ref.update({purgeAt:Date.now()+5*60*1000});
}
function withMultiplayerSync(fnName){
  const src=window[fnName];
  if(typeof src!=='function')return;
  window[fnName]=function(...args){
    if(MP.roomCode&&!assertCanAct())return;
    
    // アクションを記録
    recordAction(fnName, args);
    
    const out=src.apply(this,args);
    if(MP.roomCode)syncNow();
    return out;
  };
}

async function flipCoin(){
  if(!MP.roomCode){toast('対戦部屋に接続していません');return;}
  if(!ensureMultiplayerReady())return;
  
  // 両者接続済みかチェック
  if(!MP.ready.host || !MP.ready.guest){

  }
  
  // すでにコイン投げ済みかチェック
  if(MP.coinFlipped){

  }
  
  // 部屋作成者が必ず先行になる
  const result = 'heads'; // 常に表（先行）
  
  // 結果をFirebaseに保存
  await MP.roomRef.update({
    coinFlip: {
      result: result,
      flippedBy: MP.role,
      timestamp: Date.now()
    }
  });
  
  const resultText = '表（先行）';
  toast(`コインは${resultText}でした！`);
  
  // 結果に基づいて先行後攻を決定（ホストが必ず先行）
  const firstPlayer = 'host';
  await MP.roomRef.update({
    activePlayer: firstPlayer,
    coinFlipped: true,
    updatedAt: Date.now()
  });
  
  showNotification('コインフリップ', `作成者（ホスト）が先行です！`, 4000);
}

async function createRoom(){
  console.log('createRoom開始');
  if(!ensureMultiplayerReady()){
    console.log('ensureMultiplayerReady失敗');
    return;
  }
  console.log('Firebase初期化完了');
  const code=getCodeFromInput();if(!code)return;
  const ref=MP.db.ref(`rooms/${code}`);
  const snap=await ref.get();
  if(snap.exists()){
    const room=snap.val();
    // 人のいない部屋は即時再利用可能
    if(!room.host && !room.guest){
      // 空の部屋なのでリセットして再利用
      await ref.update({
        host:MP.playerId,guest:null,activePlayer:'host',
        lastBy:MP.playerId,lastRole:'host',updatedAt:Date.now(),
        disconnectedAt:{host:null,guest:null},
        purgeAt:null,
        started:false,
        ready:{host:false,guest:false},
        handReveal:{host:false,guest:false},
        hostState:encodeState(),
        guestState:null
      });
      await attachRoom(code,'host');
      closeModal();toast(`部屋 ${code} を再利用しました`);
      return;
    }
    if(roomExpired(room)){await ref.remove();}
    else{toast('その部屋コードは使用中です');return;}
  }
  await ref.set({
    host:MP.playerId,guest:null,activePlayer:'host',
    lastBy:MP.playerId,lastRole:'host',updatedAt:Date.now(),
    disconnectedAt:{host:null,guest:null},
    purgeAt:null,
    started:false,
    ready:{host:false,guest:false},
    handReveal:{host:false,guest:false},
    hostState:encodeState(),
    guestState:null
  });
  await attachRoom(code,'host');
  closeModal();toast(`部屋 ${code} を作成しました`);
}
async function joinRoom(){
  console.log('joinRoom開始');
  if(!ensureMultiplayerReady()){
    console.log('ensureMultiplayerReady失敗');
    return;
  }
  console.log('Firebase初期化完了');
  const code=getCodeFromInput();if(!code)return;
  const ref=MP.db.ref(`rooms/${code}`);
  const snap=await ref.get();
  if(!snap.exists()){toast('部屋が見つかりません');return;}
  const room=snap.val();
  if(roomExpired(room)){
    // 部屋の有効期限切れの場合はリセットして再利用
    await ref.update({
      host:null,guest:null,
      hostState:null,guestState:null,
      activePlayer:'host',
      started:false,
      ready:{host:false,guest:false},
      handReveal:{host:false,guest:false},
      disconnectedAt:{host:null,guest:null},
      purgeAt:null,
      lastBy:null,lastRole:null,
      updatedAt:Date.now()
    });
    toast('部屋をリセットしました。再度参加してください。');
    return;
  }
  // 復帰（5分以内）
  if(room.host===MP.playerId){
    await ref.update({disconnectedAt:{...(room.disconnectedAt||{}),host:null},purgeAt:null,updatedAt:Date.now()});
    await attachRoom(code,'host');
    closeModal();toast(`部屋 ${code} に復帰しました`);
    return;
  }
  if(room.guest===MP.playerId){
    await ref.update({disconnectedAt:{...(room.disconnectedAt||{}),guest:null},purgeAt:null,updatedAt:Date.now()});
    await attachRoom(code,'guest');
    closeModal();toast(`部屋 ${code} に復帰しました`);
    return;
  }
  if(room.guest&&room.guest!==MP.playerId){toast('この部屋は満員です');return;}
  await ref.update({
    guest:MP.playerId,
    guestState:room.guestState||encodeState(),
    disconnectedAt:{...(room.disconnectedAt||{}),guest:null},
    purgeAt:null,
    updatedAt:Date.now()
  });
  await attachRoom(code,'guest');
  closeModal();toast(`部屋 ${code} に参加しました`);
}
function leaveRoom(){
  console.log('leaveRoom開始');
  if(!MP.roomRef){toast('接続していません');return;}
  if(MP.presenceRef)MP.presenceRef.set(null);
  MP.roomRef.get().then(snap=>{
    const room=snap.val()||{};
    const d={...(room.disconnectedAt||{}),[MP.role]:Date.now()};
    MP.roomRef.update({disconnectedAt:d,updatedAt:Date.now()}).then(()=>schedulePurgeIfBothDisconnected(MP.roomRef,{...room,disconnectedAt:d}));
  });
  if(MP.listener)MP.roomRef.off('value',MP.listener);
  MP.roomRef=null;MP.roomCode=null;MP.role=null;MP.activePlayer=null;
  MP.listener=null;
  MP.view='self';MP.otherState=null;
  MP.started=false;MP.ready={host:false,guest:false};MP.handReveal={host:false,guest:false};
  MP.presenceRef=null;
  MP.actionHistory=[]; // アクション履歴もリセット
  // Firebase接続もリセット（重要！）
  MP.enabled=false;
  MP.app=null;
  MP.db=null;
  console.log('Firebase接続をリセットしました');
  updateMultiplayerStatus();
  toast('部屋から退出しました');
}
async function attachRoom(code,role){
  console.log('attachRoom開始:', code, role, 'MP.enabled:', MP.enabled);
  
  if(!MP.enabled){
    console.log('Firebase未初期化、初期化を試行');
    if(!ensureMultiplayerReady()){
      toast('Firebaseの初期化に失敗しました');
      return;
    }
  }
  
  if(MP.roomRef&&MP.listener)MP.roomRef.off('value',MP.listener);
  MP.roomCode=code;MP.role=role;MP.roomRef=MP.db.ref(`rooms/${code}`);
  console.log('Firebase参照設定完了:', MP.roomRef.toString());
  // presence (切断時に自動で空室化させる)
  MP.presenceRef=MP.db.ref(`rooms/${code}/presence/${role}`);
  MP.presenceRef.set(MP.playerId);
  MP.presenceRef.onDisconnect().set(null);
  MP.roomRef.child(`disconnectedAt/${role}`).set(null);
  MP.roomRef.child('purgeAt').set(null);
  MP.listener=snap=>{
    const room=snap.val();if(!room)return;
    if(roomExpired(room)){
      MP.roomRef.remove();
      if(MP.listener)MP.roomRef.off('value',MP.listener);
      MP.roomRef=null;MP.roomCode=null;MP.role=null;MP.activePlayer=null;
      MP.listener=null;MP.view='self';MP.otherState=null;
      MP.started=false;MP.ready={host:false,guest:false};MP.handReveal={host:false,guest:false};
      MP.presenceRef=null;
      updateMultiplayerStatus();
      toast('部屋の有効期限切れで閉じられました');
      return;
    }
    schedulePurgeIfBothDisconnected(MP.roomRef,room);
    MP.purgeAt=room.purgeAt||0;
    MP.activePlayer=room.activePlayer||'host';
    MP.started=!!room.started;
    MP.ready=room.ready||{host:false,guest:false};
    MP.handReveal=room.handReveal||{host:false,guest:false};
    
    // コインフリップ状態を同期
    MP.coinFlipped=!!room.coinFlipped;
    MP.coinFlip=room.coinFlip||null;
    
    // 相手の準備OKを検知
    const otherRole = MP.role === 'host' ? 'guest' : 'host';
    const wasReady = MP.ready[otherRole];
    const isReady = room.ready && room.ready[otherRole];
    
    if(!wasReady && isReady && !MP.started){
      showNotification('対戦準備', '相手が準備OKしました！', 4000);
    }
    
    // 両者接続時の自動先行決定
    const wasBothReady = MP.ready.host && MP.ready.guest;
    const isBothReady = room.ready && room.ready.host && room.ready.guest;
    
    if(!wasBothReady && isBothReady && !room.started && MP.role === 'host'){
      // ホストが自動で先行になる
      MP.roomRef.update({
        activePlayer: 'host',
        started: true,
        updatedAt: Date.now()
      });
      showNotification('対戦開始', '作成者（ホスト）が先行です！', 5000);
    }
    
    // コインフリップボタンは非表示
    const coinBtn = document.getElementById('coin-flip-btn');
    if(coinBtn){
      coinBtn.style.display = 'none';
    }
    
    // ターン変更を検知
    const wasMyTurn = MP.activePlayer === MP.role;
    const isMyTurn = room.activePlayer === MP.role;
    
    if(!wasMyTurn && isMyTurn && MP.started){
      showNotification('ターン変更', 'あなたのターンです！', 4000);
    }
    
    // legacy room support (state) + new (hostState/guestState)
    const myKey=MP.role==='host'?'hostState':'guestState';
    const otherKey=MP.role==='host'?'guestState':'hostState';
    const myState=room[myKey]||room.state||null;
    const otherState=room[otherKey]||null;
    MP.otherState=otherState;
    if(myState&&!(room.lastBy===MP.playerId&&room.lastRole===MP.role)){
      applyEncodedState(myState);
    }
    
    // アクション履歴を復元
    if(room.actionHistory){
      MP.actionHistory=Array.isArray(room.actionHistory) ? room.actionHistory : [];
    } else {
      MP.actionHistory = [];
    }
    
    render();
    updateMultiplayerStatus();
  };
  MP.roomRef.on('value',MP.listener);
  updateMultiplayerStatus();
  
  // 通知権限をリクエスト
  requestNotificationPermission();
}

// ─── ユーティリティ ─────────────────────────────────
// toast    : 画面下部に一時メッセージを表示
// loading  : ローディングオーバーレイを表示
// unload   : ローディングを非表示
// openModal: 下からスライドするモーダルを開く
// closeModal: モーダルを閉じる
// typeClass: supertype文字列 → CSS クラス名 (pokemon/energy/trainer)
// typeEmoji: カード種別に対応する絵文字
// isEnergy / isPokemon: カード種別判定
// shuffle  : 配列をフィッシャー・イェーツでランダム化
function toast(msg,d=2200){const e=document.getElementById('toast');e.textContent=msg;e.classList.add('show');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('show'),d);}
function loading(msg){document.getElementById('lmsg').textContent=msg||'読み込み中...';document.getElementById('loading').classList.add('open');}
function unload(){document.getElementById('loading').classList.remove('open');}
function openModal(title,body){document.getElementById('mtitle').textContent=title;document.getElementById('mbody').innerHTML=body;document.getElementById('mbg').classList.add('open');}
function closeModal(){document.getElementById('mbg').classList.remove('open');}
function typeClass(st){if(!st)return'';const s=st.toLowerCase();if(s[0]==='p')return'pokemon';if(s[0]==='e')return'energy';if(s[0]==='t')return'trainer';return'';}
function typeEmoji(st){const c=typeClass(st);return c==='pokemon'?'⚡':c==='energy'?'⬡':c==='trainer'?'♟':'🃏';}
function isEnergy(c){return typeClass(c.supertype)==='energy';}
function isPokemon(c){return typeClass(c.supertype)==='pokemon';}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

// ─── コイン投げ ─────────────────────────────────────
// flipCoin: コイン画像を rotateY でフリップアニメーション。
//   表(おもて) → COIN_FRONT (イーブイ画像 base64)
//   裏(うら)   → COIN_BACK  (Pokémonロゴ画像 base64)
// coinHist: 直近5回の結果を ⭕❌ で保持して表示。

function flipCoin(){
  const img=document.getElementById('coin-img');
  if(!img)return;
  img.style.transition='transform 0.15s';
  img.style.transform='rotateY(90deg)';
  setTimeout(()=>{
    const h=Math.random()<.5;
    img.src=h?COIN_FRONT:COIN_BACK;
    img.style.transform='rotateY(0deg)';
    coinHist.unshift(h?'⭕':'❌');if(coinHist.length>5)coinHist.pop();
    document.getElementById('coin-hist').textContent=coinHist.join('');
    toast(h?'おもて！':'うら！');
  },150);
}

// ─── 状態異常トグル ──────────────────────────────────
// toggleStatus: バトル場の状態異常をトグル（Set に追加/削除）。
// renderStatusMarkers: ボタンのクラスを更新して色を変える。
//   やけど=赤, どく=紫, ねむり=青, まひ=オレンジ, こんらん=ピンク。
function toggleStatus(status){
  if(S.battle.statuses.has(status))S.battle.statuses.delete(status);
  else S.battle.statuses.add(status);
  renderStatusMarkers();
  toast(S.battle.statuses.has(status)?`${status}になった`:`${status}が回復した`);
}
function renderStatusMarkers(){
  document.getElementById('battle-markers')?.querySelectorAll('.smark').forEach(btn=>{
    const st=btn.dataset.status;btn.className='smark '+(S.battle.statuses.has(st)?st:'off');
  });
}

// ─── デッキ入力・読み込み ────────────────────────────
// showDeckInput: デッキコード入力モーダルを開く。
// loadByDeckCode: Cloudflare Worker API にデッキコードを送信し、
//   返ってきたカードデータ (name/supertype/imageUrl/count) を
//   S.deck に展開してゲームを初期化する。
// loadFromURL: URL クエリパラメータ ?d= からデッキを復元（共有用）。
function showDeckInput(){
  openModal('デッキを読み込む',`
    <div id="deck-input-area">
      <div class="input-hint"><b>公式デッキコード（XXXX-XXXX-XXXX）を入力</b></div>
      <input id="deck-code-field" type="text" placeholder="例: NHLngn-GoqcNM-n9gNgn" autocomplete="off" inputmode="text">
      <button class="mb go" onclick="loadByDeckCode()">デッキコードで読み込む</button>
      <button class="mb cancel" onclick="closeModal()">閉じる</button>
    </div>
  `);
  setTimeout(()=>document.getElementById('deck-code-field')?.focus(),100);
}
async function loadByDeckCode(){
  const code=document.getElementById('deck-code-field').value.trim();
  if(!code){toast('デッキコードを入力してください');return;}
  if(!/^[a-zA-Z0-9]+-[a-zA-Z0-9]+-[a-zA-Z0-9]+$/.test(code)){toast('形式が違います');return;}
  closeModal();loading('デッキコードを解析中...');
  try{
    document.getElementById('lmsg').textContent='カードデータを取得中...';
    const res=await fetch(`${WORKER}?code=${encodeURIComponent(code)}`);
    const data=await res.json();
    if(data.error){unload();toast('エラー: '+data.error);return;}
    if(!data.cards?.length){unload();toast('カードが取得できませんでした');return;}
    const cards=[];
    data.cards.forEach(c=>{for(let i=0;i<c.count;i++)cards.push({uid:uid(),name:c.name||'不明',supertype:c.supertype||'Pokémon',imageUrl:c.imageUrl||null,_zone:'deck'});});
    fullReset(cards);document.getElementById('btn-start').disabled=false;
    unload();render();toast(`${cards.length}枚のデッキを読み込みました！`);
  }catch(e){unload();toast('通信エラー: '+e.message);}
}
function loadFromURL(){
  const params=new URLSearchParams(location.search);const data=params.get('d');if(!data)return false;
  try{
    const decoded=JSON.parse(decodeURIComponent(atob(data)));
    if(!decoded?.cards?.length)return false;
    loading('デッキデータを読み込み中...');
    setTimeout(()=>{
      const cards=decoded.cards.map(c=>({uid:uid(),name:c.n||c.name||'不明',supertype:c.t==='P'?'Pokémon':c.t==='E'?'Energy':c.t==='T'?'Trainer':(c.supertype||'Pokémon'),imageUrl:c.i||c.imageUrl||null,_zone:'deck'}));
      fullReset(cards);document.getElementById('btn-start').disabled=false;unload();render();toast(`${S.deck.length}枚読み込みました`);
    },300);return true;
  }catch(e){return false;}
}

// ─── ゲーム操作 ─────────────────────────────────────
// collectAllCards : 全ゾーンのカードを集めてデッキに戻す。
// resetField      : フィールド (手札/サイド/トラッシュ/バトル/ベンチ等) をリセット。
// fullReset       : デッキを差し替えてフィールドもリセット。
// startGame       : デッキをシャッフルし手札7枚・サイド6枚を配る。
// doReset         : 全カードを集めてデッキに戻し、フィールドをリセット。
// trashZone       : 指定ゾーン全体をトラッシュへ送る (hand/battle/bench-single)。
// drawOne         : デッキ先頭1枚をドロー。
// shuffleDeck     : デッキをシャッフル。
// viewDeck        : デッキ確認モーダル（タップでフリーゾーンへ移動、モーダルは閉じない）。
// viewTrash       : トラッシュ確認モーダル。
// takePrize       : サイドを1枚手札に加える。
// returnHandToDeck: 手札を全てデッキに戻してシャッフル。
// sortZone        : 手札/トラッシュを種別→名前順に並び替え。
// swapBenchBattle : ベンチiとバトル場を入れ替え（ポケモン/エネ/どうぐ/状態異常ごと）。
function collectAllCards(){
  const all=[
    ...S.deck,...S.hand,...S.side,...S.trash,...S.stadium,...S.free,
    ...S.battle.pokemons,...S.battle.energy,...S.battle.tools,
    ...S.bench.flatMap(b=>[...b.pokemons,...b.energy,...b.tools])
  ];
  all.forEach(c=>c._zone='deck');return shuffle(all);
}
function resetField(){
  S.hand=[];S.side=[];S.trash=[];S.stadium=[];S.free=[];
  S.battle={pokemons:[],energy:[],tools:[],damages:[],statuses:new Set()};
  S.bench=Array(5).fill(0).map(()=>({pokemons:[],energy:[],tools:[],damages:[],statuses:new Set()}));
  S.turn=0;S.gameStarted=false;renderStatusMarkers();
}
function fullReset(newDeck){S.deck=shuffle(newDeck||[]);resetField();}
function startGame(){
  S.deck=collectAllCards();
  if(S.deck.length<13){toast('デッキが不足しています');return;}
  resetField();S.deck=shuffle(S.deck);
  S.hand=S.deck.splice(0,7);S.hand.forEach(c=>c._zone='hand');
  S.side=S.deck.splice(0,6);S.side.forEach(c=>c._zone='side');
  S.gameStarted=true;render();toast('手札7枚・サイド6枚を配りました');
}
function doReset(){
  S.deck=collectAllCards();resetField();
  document.getElementById('btn-start').disabled=S.deck.length===0;
  render();toast('リセットしました');
}
function trashZone(zone,si){
  if(zone==='hand'){
    const cnt=S.hand.length;if(!cnt){toast('手札がありません');return;}
    S.hand.forEach(c=>{c._zone='trash';S.trash.push(c);});S.hand=[];
    render();toast(`手札${cnt}枚をトラッシュ`);
  }else if(zone==='battle'){
    const cards=[...S.battle.pokemons,...S.battle.energy,...S.battle.tools];
    if(!cards.length){toast('バトル場にカードがありません');return;}
    cards.forEach(c=>{c._zone='trash';S.trash.push(c);});
    S.battle={pokemons:[],energy:[],tools:[],damages:[],statuses:new Set()};
    render();renderStatusMarkers();toast(`バトル場${cards.length}枚をトラッシュ`);
  }else if(zone==='bench-single'){
    const b=S.bench[si];
    const cards=[...b.pokemons,...b.energy,...b.tools];
    if(!cards.length){toast('このベンチにカードがありません');return;}
    cards.forEach(c=>{c._zone='trash';S.trash.push(c);});
    S.bench[si]={pokemons:[],energy:[],tools:[],damages:[],statuses:new Set()};
    render();toast(`ベンチ${si+1}を${cards.length}枚トラッシュ`);
  }
}
function drawOne(){if(!S.deck.length){toast('デッキが空です');return;}const c=S.deck.shift();c._zone='hand';S.hand.push(c);render();toast('ドロー: '+c.name);}
function drawToFree(){if(!S.deck.length){toast('デッキが空です');return;}const c=S.deck.shift();c._zone='free';S.free.push(c);render();toast('ドロー: '+c.name);}
function shuffleDeck(){S.deck=shuffle(S.deck);render();toast('シャッフルしました');}
function viewDeck(){
  let h='<div id="deck-grid">';
  if(!S.deck.length)h+='<div style="color:var(--tx3);padding:20px;font-size:12px;width:100%;text-align:center">デッキが空です</div>';
  else S.deck.forEach(c=>{
    const imgEl=c.imageUrl?`<img src="${c.imageUrl}" alt="${c.name}" style="width:56px;height:78px;border-radius:6px;object-fit:cover;border:1.5px solid var(--bd)" onerror="this.style.display='none'">`:`<div style="width:56px;height:78px;border-radius:6px;background:var(--s2);border:1.5px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:20px">${typeEmoji(c.supertype)}</div>`;
    h+=`<div style="display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer" onclick="moveCard(${c.uid},'deck','free');viewDeck()" title="${c.name}">${imgEl}<div style="font-size:8px;color:var(--tx3);max-width:56px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;text-align:center">${c.name}</div></div>`;
  });
  h+='</div><button class="mb cancel" onclick="closeModal()">閉じる</button>';
  openModal(`デッキ (${S.deck.length}枚)`,h);
}
function viewTrash(){
  let h='<div id="deck-grid">';
  if(!S.trash.length)h+='<div style="color:var(--tx3);padding:20px;font-size:12px;width:100%;text-align:center">トラッシュが空です</div>';
  else S.trash.forEach(c=>{
    const imgEl=c.imageUrl?`<img src="${c.imageUrl}" alt="${c.name}" style="width:56px;height:78px;border-radius:6px;object-fit:cover;border:1.5px solid var(--bd)" onerror="this.style.display='none'">`:`<div style="width:56px;height:78px;border-radius:6px;background:var(--s2);border:1.5px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:20px">${typeEmoji(c.supertype)}</div>`;
    h+=`<div style="display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer" onclick="sendToZoneFromView(${c.uid},'trash')" title="${c.name}">${imgEl}<div style="font-size:8px;color:var(--tx3);max-width:56px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;text-align:center">${c.name}</div></div>`;
  });
  h+='</div><button class="mb cancel" onclick="closeModal()">閉じる</button>';
  openModal(`トラッシュ (${S.trash.length}枚)`,h);
}

// カードタップ→移動先選択モーダル（タップ操作最適化）
window.sendToZoneFromView=function(cardUid,fromZone){
  closeModal();
  const allCards=[...S.deck,...S.hand,...S.side,...S.trash,...S.stadium,...S.free,
    ...S.battle.pokemons,...S.battle.energy,...S.battle.tools,
    ...S.bench.flatMap(b=>[...b.pokemons,...b.energy,...b.tools])];
  const card=allCards.find(c=>c.uid===cardUid);
  if(!card)return;
  showMoveModal(card,fromZone);
};

function showMoveModal(card,from){
  const imgHtml=card.imageUrl
    ?`<img src="${card.imageUrl}" class="card-preview-img" style="width:54px;height:76px" onerror="this.outerHTML='<div class=\\'card-preview-img\\'>${typeEmoji(card.supertype)}</div>'">`
    :`<div class="card-preview-img">${typeEmoji(card.supertype)}</div>`;
  const destinations=[
    {id:'hand',label:'手札',icon:'🤲',cls:'hand'},
    {id:'battle',label:'バトル場',icon:'⚔️',cls:'battle'},
    {id:'bench-0',label:'ベンチ1',icon:'🪑',cls:'bench'},
    {id:'bench-1',label:'ベンチ2',icon:'🪑',cls:'bench'},
    {id:'bench-2',label:'ベンチ3',icon:'🪑',cls:'bench'},
    {id:'bench-3',label:'ベンチ4',icon:'🪑',cls:'bench'},
    {id:'bench-4',label:'ベンチ5',icon:'🪑',cls:'bench'},
    {id:'free',label:'フリー',icon:'📌',cls:'free'},
    {id:'stad',label:'スタジアム',icon:'🏟',cls:'stad'},
    {id:'deck',label:'デッキ',icon:'📦',cls:'deck'},
    {id:'trash',label:'トラッシュ',icon:'🗑',cls:'trash'},
  ].filter(d=>d.id!==from&&!(from.startsWith('bench')&&d.id.startsWith('bench')&&d.id===from));

  let h=`<div class="card-preview">${imgHtml}<div class="card-preview-info"><div class="card-preview-name">${card.name}</div><div class="card-preview-type">${card.supertype||''}</div><div style="font-size:10px;color:var(--tx3);margin-top:3px">現在: ${zoneLabel(from)}</div></div></div>`;
  h+='<div class="dest-grid">';
  destinations.forEach(d=>{
    const to=d.id.startsWith('bench-')?'bench':d.id==='stad'?'stadium':d.id;
    const si=d.id.startsWith('bench-')?parseInt(d.id.split('-')[1]):undefined;
    const siStr=si!==undefined?`,${si}`:'';
    h+=`<button class="dest-btn ${d.cls}" onclick="closeModal();moveCard(${card.uid},'${from}','${to}'${siStr})"><span class="dest-icon">${d.icon}</span>${d.label}</button>`;
  });
  h+='</div>';
  h+=`<button class="mb cancel" onclick="closeModal()">キャンセル</button>`;
  openModal('どこに移動？',h);
}

function zoneLabel(z){
  if(z==='hand')return '手札';if(z==='deck')return 'デッキ';if(z==='trash')return 'トラッシュ';
  if(z==='battle')return 'バトル場';if(z==='side')return 'サイド';if(z==='stadium')return 'スタジアム';
  if(z==='free')return 'フリー';if(z?.startsWith('bench-'))return `ベンチ${parseInt(z.split('-')[1])+1}`;
  return z;
}

function showDeckMenu(){
  openModal('デッキ操作',`
    <button class="mb" onclick="closeModal();drawOne()">1枚ドロー</button>
    <button class="mb" onclick="closeModal();shuffleDeck()">シャッフル</button>
    <button class="mb" onclick="closeModal();viewDeck()">デッキを見る（タップで移動）</button>
    <button class="mb cancel" onclick="closeModal()">閉じる</button>
  `);
}
function takePrize(){if(!S.side.length){toast('サイドが空です');return;}const c=S.side.shift();c._zone='hand';S.hand.push(c);render();toast('サイドを取りました');}
function returnHandToDeck(){S.hand.forEach(c=>c._zone='deck');S.deck.push(...S.hand);S.hand=[];S.deck=shuffle(S.deck);render();toast('手札をデッキに戻してシャッフルしました');}
function sortZone(zone){
  const o=st=>{const c=typeClass(st);return c==='pokemon'?0:c==='trainer'?1:c==='energy'?2:3;};
  const fn=(a,b)=>o(a.supertype)-o(b.supertype)||a.name.localeCompare(b.name,'ja');
  if(zone==='hand')S.hand.sort(fn);else if(zone==='trash')S.trash.sort(fn);
  render();toast('並び替えました');
}
function swapBenchBattle(i){
  const b=S.bench[i],bt=S.battle;
  const tmp={pokemons:[...bt.pokemons],energy:[...bt.energy],tools:[...bt.tools],damages:[...(bt.damages||[])],statuses:new Set(bt.statuses)};
  bt.pokemons=[...b.pokemons];bt.energy=[...b.energy];bt.tools=[...b.tools];bt.damages=[...(b.damages||[])];bt.statuses=new Set(b.statuses);
  b.pokemons=tmp.pokemons;b.energy=tmp.energy;b.tools=tmp.tools;b.damages=tmp.damages;b.statuses=tmp.statuses;
  const setZone=(slot,z)=>{slot.pokemons.forEach(c=>c._zone=z);slot.energy.forEach(c=>c._zone=z);slot.tools.forEach(c=>c._zone=z);};
  setZone(bt,'battle');setZone(b,`bench-${i}`);
  render();renderStatusMarkers();toast('バトル場とベンチを入れ替えました');
}
function nextTurn(){S.turn++;render();toast(`ターン ${S.turn}`);}

// ─── カード移動 (moveCard) ──────────────────────────
// 任意のゾーンから任意のゾーンへカードを移動する中心関数。
// 引数: cardUid (カードUID), from (移動元), to (移動先), si (ベンチ番号 0-4)
// ─ from/to に指定できるゾーン ─
//   hand / deck / trash / side / stadium / free
//   battle (バトル場)
//   bench  (ベンチ ─ si で何番目かを指定)
// カード種別 (pokemon/energy/trainer) により
//   battle.pokemons / battle.energy / battle.tools に振り分ける。
// deck への移動時は自動でシャッフルする。
window.moveCard=function(cardUid,from,to,si){
  let card=null;
  function rem(zone){
    const zones={hand:S.hand,deck:S.deck,trash:S.trash,side:S.side,stadium:S.stadium,free:S.free};
    if(zones[zone]){const i=zones[zone].findIndex(c=>c.uid===cardUid);if(i>=0)card=zones[zone].splice(i,1)[0];return;}
    if(zone==='battle'){
      let i=S.battle.pokemons.findIndex(c=>c.uid===cardUid);if(i>=0){card=S.battle.pokemons.splice(i,1)[0];return;}
      i=S.battle.energy.findIndex(c=>c.uid===cardUid);if(i>=0){card=S.battle.energy.splice(i,1)[0];return;}
      i=S.battle.tools.findIndex(c=>c.uid===cardUid);if(i>=0){card=S.battle.tools.splice(i,1)[0];return;}
    }
    if(zone?.startsWith('bench-')){
      const idx=parseInt(zone.split('-')[1]);const b=S.bench[idx];
      let i=b.pokemons.findIndex(c=>c.uid===cardUid);if(i>=0){card=b.pokemons.splice(i,1)[0];return;}
      i=b.energy.findIndex(c=>c.uid===cardUid);if(i>=0){card=b.energy.splice(i,1)[0];return;}
      i=b.tools.findIndex(c=>c.uid===cardUid);if(i>=0){card=b.tools.splice(i,1)[0];return;}
    }
  }
  rem(from);if(!card)return;
  const place=(slot,zone)=>{
    card._zone=zone;
    if(isPokemon(card))slot.pokemons.push(card);
    else if(isEnergy(card))slot.energy.push(card);
    else slot.tools.push(card);
  };
  if(to==='hand'){card._zone='hand';S.hand.push(card);}
  else if(to==='deck'){card._zone='deck';S.deck.push(card);S.deck=shuffle(S.deck);}
  else if(to==='trash'){card._zone='trash';S.trash.push(card);}
  else if(to==='side'){card._zone='side';S.side.push(card);}
  else if(to==='stadium'){card._zone='stadium';S.stadium.push(card);}
  else if(to==='free'){card._zone='free';S.free.push(card);}
  else if(to==='battle'){place(S.battle,'battle');}
  else if(to==='bench'){const idx=si??0;place(S.bench[idx],`bench-${idx}`);}
  render();
};

// ─── カード描画 ─────────────────────────────────────
// mkCard         : カードDOM要素を生成。
//   - 画像あり → <img class="cimg">
//   - 画像なし → 絵文字プレースホルダー
//   - facedown=true → 裏面(.fd)表示（サイドカード用）
//   - 長押し(450ms) → showZoom でカード拡大表示
//   - 単クリック    → showCardMenu (デッキ戻しメニュー)
//   - mousedown/touchstart → ドラッグ開始処理 (pendingDrag 経由)
// mkPh           : 絵文字プレースホルダーを生成。
// renderPokeStack: 進化スタック表示。pokemons 配列を重ねて表示
//                  (オフセット16px で下から積み上げ)。
// renderSlot     : バトル場/ベンチ1スロットの全エリアを再描画。
// renderTrash    : トラッシュエリアを再描画。
// rList          : 指定IDのコンテナにカードを一覧描画するヘルパー。
// render         : 全ゾーンのカウンタ・カード表示を一括更新。
function mkCard(card,facedown=false){
  const el=document.createElement('div');
  el.className='card '+typeClass(card.supertype)+(facedown?' fd':'');
  el.dataset.uid=card.uid;
  if(!facedown){
    if(card.imageUrl){
      const img=document.createElement('img');img.className='cimg';img.src=card.imageUrl;img.alt=card.name;
      img.loading='lazy';img.draggable=false;
      img.onerror=()=>{img.remove();el.appendChild(mkPh(card));};
      el.appendChild(img);
    }else el.appendChild(mkPh(card));
  }
  if(!facedown){
    el.addEventListener('mousedown',e=>{
      if(e.button!==0)return;
      if(!isInteractiveView())return;
      pendingDrag={card,el,startX:e.clientX,startY:e.clientY};
    });
    el.addEventListener('touchstart',e=>{
      if(!isInteractiveView())return;
      e.stopPropagation();
      pendingDrag={card,el,startX:e.touches[0].clientX,startY:e.touches[0].clientY};
    },{passive:false});
  }
  // 長押し判定
  el.addEventListener('click',(e)=>{
    if(dragCard||ghostEl)return;
    if(facedown)return;
    if(!isInteractiveView())return;
    showCardMenu(card);
  });
  return el;
}
function mkPh(card){const ph=document.createElement('div');ph.className='cph';ph.textContent=typeEmoji(card.supertype);return ph;}

// ポケモンスタック表示
function renderPokeStack(pokemons,containerId){
  const wrap=document.getElementById(containerId);if(!wrap)return;
  wrap.innerHTML='';
  if(!pokemons.length){wrap.style.minHeight='90px';return;}
  const OFFSET=16;
  const totalH=86+(pokemons.length-1)*OFFSET;
  wrap.style.minHeight=totalH+'px';
  wrap.style.position='relative';
  const facedown=!!(MP.roomCode&&!MP.started);
  pokemons.forEach((card,i)=>{
    const el=mkCard(card,facedown);
    el.style.position='absolute';el.style.bottom='0';el.style.left='50%';
    el.style.transform=`translateX(-50%) translateY(-${(pokemons.length-1-i)*OFFSET}px)`;
    el.style.zIndex=i;
    wrap.appendChild(el);
  });
}
let dmgTarget='battle';
function setDmgTarget(zoneId){
  if(!assertCanAct())return;
  dmgTarget=zoneId;
  const s=getSlotById(dmgTarget);
  if(!s){toast('無効な対象です');return;}
  
  // バトル場・ベンチともにポケモン必須
  if(s.pokemons.length === 0){
    toast(`${zoneId.startsWith('bench') ? 'ベンチ' : 'バトル場'}にポケモンがいません`);return;
  }
  
  toast(`${zoneId.startsWith('bench')?'ベンチ':'バトル場'}をダメカン対象に設定`);
}
function getSlotById(z){
  if(z==='battle')return S.battle;
  if(z && z.startsWith('bench-')){
    const i = parseInt(z.split('-')[1], 10);
    if(!isNaN(i) && i >= 0 && i < S.bench.length){
      return S.bench[i];
    }
  }
  return null;
}
function addDamageToTarget(v){
  const s=getSlotById(dmgTarget);
  if(!s){toast('無効な対象です');return;}
  
  // バトル場・ベンチともにポケモン必須
  if(s.pokemons.length === 0){
    toast(`${dmgTarget === 'battle' ? 'バトル場' : 'ベンチ'}にポケモンがいません`);return;
  }
  
  if(!s.damages)s.damages=[];
  s.damages.push(v);
  render();
  if(MP.roomCode)syncNow();
}
function removeDamageAt(zone,idx){
  if(!assertCanAct())return;
  const s=getSlotById(zone);if(!s?.damages)return;
  s.damages.splice(idx,1);render();if(MP.roomCode)syncNow();
}
function renderSlot(slot,stackId,eId,tId,dId,zoneId){
  console.log('renderSlot called with IDs:', {stackId, eId, tId, dId, zoneId});
  console.log('Elements found:', {
    stack: !!document.getElementById(stackId),
    energy: !!document.getElementById(eId),
    tool: !!document.getElementById(tId),
    damage: !!document.getElementById(dId)
  });
  
  // ポケモンがいない場合はダメカンを削除
  if(!slot.pokemons.length){
    slot.damages=[];
  }
  renderPokeStack(slot.pokemons,stackId);
  const ep=document.getElementById(eId),tp=document.getElementById(tId),dp=document.getElementById(dId);
  if(ep){ep.innerHTML='<div class="area-label">エネルギー</div>';slot.energy.forEach(c=>{const el=mkCard(c);ep.appendChild(el);});}
  if(tp){tp.innerHTML='<div class="area-label">どうぐ</div>';slot.tools.forEach(c=>{const el=mkCard(c);tp.appendChild(el);});}
  if(dp){
    dp.innerHTML='<div class="area-label">ダメカン</div>';
    (slot.damages||[]).forEach((v,i)=>{
      const c=document.createElement('div');
      c.className=`dmg-chip dmg-${v===100?100:(v===50?50:10)}`;
      c.textContent=String(v);
      c.style.width='18px';c.style.height='18px';c.style.fontSize='8px';
      c.onclick=()=>removeDamageAt(zoneId,i);
      dp.appendChild(c);
    });
    dp.onclick=(e)=>{if(e.target===dp||e.target.classList.contains('area-label'))setDmgTarget(zoneId);};
  }
}

// トラッシュ
function renderTrash(){
  document.getElementById('cnt-trash').textContent=S.trash.length;
  const ct=document.getElementById('cards-trash');if(!ct)return;
  ct.innerHTML='';
  S.trash.forEach(c=>ct.appendChild(mkCard(c)));
}

function rList(id,cards,fd=false){const el=document.getElementById(id);if(!el)return;el.innerHTML='';cards.forEach(c=>el.appendChild(mkCard(c,fd)));}

function render(){
  // 視点切替（相手視点のときは相手の状態を表示）
  if(MP.roomCode&&MP.view==='other'&&MP.otherState){
    const keep={...S, battle:S.battle, bench:S.bench};
    applyEncodedState(MP.otherState);
    // 相手視点は操作不可（クリック等は assertCanAct で弾く）
    document.getElementById('cnt-deck').textContent=S.deck.length;
    document.getElementById('pile-cnt').textContent=S.deck.length;
    document.getElementById('cnt-hand').textContent=S.hand.length;
    document.getElementById('cnt-side').textContent=S.side.length;
    document.getElementById('cnt-stadium').textContent=S.stadium.length;

    // 相手の許可がない限り、相手の手札は裏向き表示
    rList('cards-hand',S.hand,isOtherHandRevealed()?false:true);
    rList('cards-side',S.side,true);
    rList('cards-free',S.free);
    renderTrash();
    const stadEl=document.getElementById('cards-stadium');stadEl.innerHTML='';
    if(S.stadium.length>0){

// ─── ドラッグ&ドロップ ───────────────────────────────
// pendingDrag : mousedown/touchstart で記録し、DRAG_THRESHOLD(8px)
//               超過後に実際のドラッグを開始する。
//               これにより単タップとドラッグを区別する。
// startDrag   : ゴーストクローン要素を body に追加し、スクロールをロック。
// moveGhost   : requestAnimationFrame で ghostEl の位置を更新（滑らか移動）。
// endDrag     : ドロップ位置の要素から [data-dropzone] を探し moveCard を呼ぶ。
// lockScroll / unlockScroll : ドラッグ中のページスクロールを防止。
// syncScroll  : スライダー → スクロール位置 を同期。
// syncBar     : スクロール位置 → スライダー を同期。
let dragCard=null,dragFrom=null,ghostEl=null;
let pendingDrag=null; // {card,el,startX,startY}
const DRAG_THRESHOLD=8; // px動いたらドラッグ開始

let ghostX=0,ghostY=0,rafId=null;
function lockScroll(){document.documentElement.style.overflow='hidden';document.body.style.overflow='hidden';}
function unlockScroll(){document.documentElement.style.overflow='';document.body.style.overflow='';}

function startDrag(card,el,e){
  // 長押しタイマーキャンセル用イベント
  el.dispatchEvent(new Event('dragstarted'));
  dragCard=card;dragFrom=card._zone;
  el.classList.add('dragging');
  ghostEl=el.cloneNode(true);
  ghostEl.className=el.className.replace('dragging','')+' drag-ghost';
  ghostEl.style.width=el.offsetWidth+'px';ghostEl.style.height=el.offsetHeight+'px';
  // ゴーストを確実に最前面に配置
  ghostEl.style.zIndex='999999';
  ghostEl.style.position='fixed';
  document.body.appendChild(ghostEl);
  lockScroll();
  updateGhostPos(e);
  animateGhost();
}
function updateGhostPos(e){
  ghostX=(e.clientX||(e.touches&&e.touches[0]?e.touches[0].clientX:0))-30;
  ghostY=(e.clientY||(e.touches&&e.touches[0]?e.touches[0].clientY:0))-42;
}
function animateGhost(){
  if(!ghostEl)return;
  ghostEl.style.left=ghostX+'px';
  ghostEl.style.top=ghostY+'px';
  rafId=requestAnimationFrame(animateGhost);
}
function moveGhost(e){
  if(!ghostEl)return;
  updateGhostPos(e);
}
function endDrag(e){
  pendingDrag=null;
  unlockScroll();
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  if(!dragCard)return;
  document.querySelectorAll('.dragging').forEach(el=>el.classList.remove('dragging'));
  document.querySelectorAll('.drop-target').forEach(el=>el.classList.remove('drop-target'));
  if(ghostEl){ghostEl.remove();ghostEl=null;}
  const x=e.clientX||(e.changedTouches&&e.changedTouches[0]?e.changedTouches[0].clientX:0);
  const y=e.clientY||(e.changedTouches&&e.changedTouches[0]?e.changedTouches[0].clientY:0);
  const target=document.elementFromPoint(x,y);
  if(!target){dragCard=null;dragFrom=null;return;}
  const zone=target.closest('[data-dropzone]');
  if(zone){
    const to=zone.dataset.dropzone;
    const si=zone.dataset.si!=null?parseInt(zone.dataset.si):undefined;
    moveCard(dragCard.uid,dragFrom,to,si);
  }
  dragCard=null;dragFrom=null;
}
document.addEventListener('mousemove',e=>{
  if(pendingDrag){
    const dx=e.clientX-pendingDrag.startX, dy=e.clientY-pendingDrag.startY;
    if(Math.sqrt(dx*dx+dy*dy)>DRAG_THRESHOLD){
      startDrag(pendingDrag.card,pendingDrag.el,e);
      pendingDrag=null;
    }
  }
  if(dragCard){
    moveGhost(e);
    document.querySelectorAll('.drop-target').forEach(el=>el.classList.remove('drop-target'));
    const el=document.elementFromPoint(e.clientX,e.clientY);
    if(el)el.closest('[data-dropzone]')?.classList.add('drop-target');
  }
});
document.addEventListener('mouseup',e=>{if(dragCard)endDrag(e);else pendingDrag=null;});
document.addEventListener('touchmove',e=>{
  if(pendingDrag){
    const dx=e.touches[0].clientX-pendingDrag.startX,dy=e.touches[0].clientY-pendingDrag.startY;
    if(Math.sqrt(dx*dx+dy*dy)>DRAG_THRESHOLD){
      startDrag(pendingDrag.card,pendingDrag.el,e.touches[0]);
      pendingDrag=null;
    }
  }
  if(dragCard){e.preventDefault();moveGhost(e);}
},{passive:false});
document.addEventListener('touchend',e=>{
  if(dragCard)endDrag(e);
  pendingDrag=null;
});

function syncScroll(containerId, bar){
  const el=document.getElementById(containerId);
  if(!el)return;
  const max=el.scrollWidth-el.clientWidth;
  el.scrollLeft=max*(bar.value/100);
}
function syncBar(containerId, barId){
  const el=document.getElementById(containerId);
  const bar=document.getElementById(barId);
  if(!el||!bar)return;
  const max=el.scrollWidth-el.clientWidth;
  if(max<=0){bar.value=0;return;}
  bar.value=(el.scrollLeft/max)*100;
}

// ─── 通知システム ────────────────────────────────────────
function showNotification(title, message, duration = 3000){
  // ブラウザ通知API
  if('Notification' in window && Notification.permission === 'granted'){
    new Notification(title, {
      body: message,
      icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">⚡</text></svg>'
    });
  }
  
  // アプリ内通知
  toast(message, duration);
}

function requestNotificationPermission(){
  if('Notification' in window && Notification.permission === 'default'){
    Notification.requestPermission().then(permission => {
      if(permission === 'granted'){
        toast('通知を有効にしました');
      }
    });
  }
}

// setupBench() → render() → loadFromURL() の順に実行して画面を初期化。

  }

  h+=`<button class="mb" onclick="closeModal();deckReturnBottom(${card.uid},'${from}')">⬇️ デッキの下に戻す</button>`;
  h+=`<button class="mb cancel" onclick="closeModal()">キャンセル</button>`;
  openModal(card.name, h);
}
// 「使う」表示対象カード。名前が確定したらこの配列に追加してください。
const USE_ACTION_CARD_NAMES = new Set([
  'リーリエの決心',
  'ドロンチ',
  'キチキギスex',
  'アンフェアスタンプ',
  'ジャッジマン',
  'ノココッチ'
]);
function canUseCard(card){
  return !!card?.name&&USE_ACTION_CARD_NAMES.has(card.name);
}
function normalizeCardName(name){
  return (name||'').replace(/\u3000/g,' ').trim();
}
function findCardByUid(cardUid){
  const allCards=[
    ...S.deck,...S.hand,...S.side,...S.trash,...S.stadium,...S.free,
    ...S.battle.pokemons,...S.battle.energy,...S.battle.tools,
    ...S.bench.flatMap(b=>[...b.pokemons,...b.energy,...b.tools])
  ];
  return allCards.find(c=>c.uid===cardUid)||null;
}
function drawCardsToHand(count){
  let drawn=0;
  while(drawn<count&&S.deck.length){
    const c=S.deck.shift();
    c._zone='hand';
    S.hand.push(c);
    drawn++;
  }
  return drawn;
}
function returnHandToDeckAndShuffle(){
  if(S.hand.length){
    S.hand.forEach(c=>c._zone='deck');
    S.deck.push(...S.hand);
    S.hand=[];
  }
  S.deck=shuffle(S.deck);
}
function getSlotByZone(zone){
  if(zone==='battle')return S.battle;
  if(zone?.startsWith('bench-')){
    const idx=parseInt(zone.split('-')[1],10);
    return Number.isInteger(idx)&&S.bench[idx]?S.bench[idx]:null;
  }
  return null;
}
function returnNokocchiAndAttachedToDeck(card){
  const slot=getSlotByZone(card?._zone);
  if(!slot){
    // 場以外にある場合は自身のみ戻す
    const cardIdx=S.hand.findIndex(c=>c.uid===card.uid);
    if(cardIdx>=0){
      const self=S.hand.splice(cardIdx,1)[0];
      self._zone='deck';
      S.deck.push(self);
      return 1;
    }
    return 0;
  }
  const cards=[...slot.pokemons,...slot.energy,...slot.tools];
  cards.forEach(c=>{c._zone='deck';S.deck.push(c);});
  slot.pokemons=[];slot.energy=[];slot.tools=[];
  return cards.length;
}
function useDoronnchi(){
  const topTwo=S.deck.splice(0,Math.min(2,S.deck.length));
  if(!topTwo.length){toast('デッキが空です');render();return;}
  if(topTwo.length===1){
    const only=topTwo[0];
    only._zone='hand';
    S.hand.push(only);
    render();
    toast('デッキが1枚だったため、その1枚を手札に加えました');
    return;
  }
  const [a,b]=topTwo;
  const cardTile=(c,idx)=>{
    const imgEl=c.imageUrl
      ?`<img src="${c.imageUrl}" alt="${c.name}" style="width:72px;height:100px;border-radius:8px;object-fit:cover;border:1.5px solid var(--bd)" onerror="this.outerHTML='<div style=\\'width:72px;height:100px;border-radius:8px;background:var(--s2);border:1.5px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:24px\\'>${typeEmoji(c.supertype)}</div>'">`
      :`<div style="width:72px;height:100px;border-radius:8px;background:var(--s2);border:1.5px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:24px">${typeEmoji(c.supertype)}</div>`;
    return `
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        ${imgEl}
        <div style="font-size:10px;color:var(--tx3);max-width:92px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;text-align:center">${c.name}</div>
        <button class="mb go" style="margin:0;padding:6px 8px;font-size:11px" onclick="chooseDoronnchiCard(${idx})">このカードを手札に</button>
      </div>
    `;
  };
  window.chooseDoronnchiCard=function(idx){
    const chosen=idx===0?a:b;
    const bottom=idx===0?b:a;
    chosen._zone='hand';
    S.hand.push(chosen);
    bottom._zone='deck';
    S.deck.push(bottom); // 山札の下
    closeModal();
    render();
    if(MP.roomCode)syncNow();
    toast('1枚を手札に、残りを山札の下に戻しました');
  };
  window.cancelDoronnchiChoice=function(){
    S.deck=[a,b,...S.deck]; // 元の順序で山札の上に戻す
    closeModal();
    render();
    if(MP.roomCode)syncNow();
    toast('ドロンチの効果をキャンセルしました');
  };
  openModal('ドロンチ：1枚選ぶ',`
    <div style="font-size:11px;color:var(--tx3);margin-bottom:10px">山札の上から2枚を見ました。手札に加える1枚を選んでください。</div>
    <div style="display:flex;justify-content:center;gap:10px;flex-wrap:wrap">
      ${cardTile(a,0)}
      ${cardTile(b,1)}
    </div>
    <button class="mb cancel" onclick="cancelDoronnchiChoice()">キャンセル</button>
  `);
}
function useCard(cardUid){
  const card=findCardByUid(cardUid);
  if(!card)return;
  const name=normalizeCardName(card.name);
  if(name==='リーリエの決心'){
    returnHandToDeckAndShuffle();
    const drawCount=S.side.length===6?8:6;
    const drawn=drawCardsToHand(drawCount);
    render();
    toast(`リーリエの決心: ${drawn}枚ドローしました`);
    return;
  }
  if(name==='ドロンチ'){
    useDoronnchi();
    return;
  }
  if(name==='キチキギスex'){
    const drawn=drawCardsToHand(3);
    render();
    toast(`キチキギスex: ${drawn}枚ドローしました`);
    return;
  }
  if(name==='アンフェアスタンプ'){
    returnHandToDeckAndShuffle();
    const drawn=drawCardsToHand(5);
    render();
    toast(`アンフェアスタンプ: ${drawn}枚ドローしました`);
    return;
  }
  if(name==='ジャッジマン'){
    returnHandToDeckAndShuffle();
    const drawn=drawCardsToHand(4);
    render();
    toast(`ジャッジマン: ${drawn}枚ドローしました`);
    return;
  }
  if(name==='ノココッチ'){
    const drawn=drawCardsToHand(3);
    const returned=returnNokocchiAndAttachedToDeck(card);
    S.deck=shuffle(S.deck);
    render();
    toast(`ノココッチ: ${drawn}枚ドロー / ${returned}枚を山札に戻してシャッフル`);
    return;
  }
  toast(`「${card.name}」の効果は未設定です`);
}
function deckReturnShuffle(cardUid, from){
  moveCard(cardUid, from, 'deck');
  // moveCard内でシャッフル済み
}
function deckReturnBottom(cardUid, from){
  // デッキの一番下（末尾）に追加
  let card=null;
  const zones={hand:S.hand,deck:S.deck,trash:S.trash,side:S.side,stadium:S.stadium,free:S.free};
  for(const z of Object.keys(zones)){
    if(z===from){const i=zones[z].findIndex(c=>c.uid===cardUid);if(i>=0){card=zones[z].splice(i,1)[0];break;}}
  }
  if(!card){
    // field zones
    const fieldSlots=[S.battle,...S.bench];
    for(const slot of fieldSlots){
      for(const arr of[slot.pokemons,slot.energy,slot.tools]){
        const i=arr.findIndex(c=>c.uid===cardUid);
        if(i>=0){card=arr.splice(i,1)[0];break;}
      }
      if(card)break;
    }
  }
  if(!card)return;
  card._zone='deck';
  S.deck.push(card); // 末尾=デッキの下
  render();
  toast('デッキの下に戻しました');
}

// ─── ダメカン ────────────────────────────────────────
// スワイプでダメカンを配置
window.startDmgDrag=function(e,value){
  if(e){
    e.stopPropagation();
    if(e.cancelable)e.preventDefault();
  }
  if(!assertCanAct())return;
  
  // ドラッグするダメカン要素を作成
  const dmgEl=document.createElement('div');
  dmgEl.className=`dmg-chip dmg-${value===100?100:(value===50?50:10)} dmg-floating`;
  dmgEl.textContent=value;
  dmgEl.style.left=e.clientX+'px';
  dmgEl.style.top=e.clientY+'px';
  dmgEl.dataset.value=value;
  document.body.appendChild(dmgEl);
  
  // マウス/タッチ移動イベント
  const moveHandler=(e)=>{
    const clientX=e.touches?e.touches[0].clientX:e.clientX;
    const clientY=e.touches?e.touches[0].clientY:e.clientY;
    dmgEl.style.left=clientX+'px';
    dmgEl.style.top=clientY+'px';
  };
  
  // ドロップ時の処理
  const upHandler=(e)=>{
    document.removeEventListener('mousemove',moveHandler);
    document.removeEventListener('mouseup',upHandler);
    document.removeEventListener('touchmove',moveHandler);
    document.removeEventListener('touchend',upHandler);
    
    // ダメカン配置エリアを検出
    const clientX=e.changedTouches?e.changedTouches[0].clientX:e.clientX;
    const clientY=e.changedTouches?e.changedTouches[0].clientY:e.clientY;
    const targetEl=document.elementFromPoint(clientX,clientY);
    
    let targetSlot=null;
    if(targetEl){
      // ベンチやバトル場の範囲を検出
      let el=targetEl;
      while(el && el!==document.body){
        // ダメカン配置エリア直接
        if(el.id && (el.id === 'ba-dmg' || (el.id.startsWith('bd-') && el.id.length <= 5)) && !el.classList.contains('area-label')){
          const slotId=el.id.replace('-dmg','');
          targetSlot=slotId==='ba'?'battle':`bench-${slotId.replace('bd-','')}`;
          break;
        }
        // バトル場全体
        if(el.id === 'bslot'){
          targetSlot='battle';
          break;
        }
        // ベンチ全体 - どのベンチスロットでもダメカン配置可能
        if(el.classList.contains('bnslot') && el.dataset.si !== undefined){
          targetSlot=`bench-${el.dataset.si}`;
          break;
        }
        el=el.parentElement;
      }
    }
    
    if(targetSlot){
      dmgTarget=targetSlot;
      const s=getSlotById(dmgTarget);
      
      if(s && s.pokemons.length > 0){
        addDamageToTarget(value);
        render();
        toast(`${targetSlot==='battle'?'バトル場':`ベンチ${parseInt(targetSlot.split('-')[1],10)+1}`}にダメカン${value}を配置`);
      }else{
        toast('ポケモンがいる場所にしかダメカンを置けません');
      }
    }else{
      // 無効な場所では何もしない（ダメカンは消える）
      toast('無効な場所です。ダメカンはバトル場またはベンチのポケモンにのみ配置できます。');
    }
    
    // ドラッグ要素を削除
    document.body.removeChild(dmgEl);
  };
  
  document.addEventListener('mousemove',moveHandler);
  document.addEventListener('mouseup',upHandler);
  document.addEventListener('touchmove',moveHandler);
  document.addEventListener('touchend',upHandler);
};

[
  'startGame','doReset','trashZone','drawOne','drawToFree','shuffleDeck',
  'takePrize','returnHandToDeck','sortZone','swapBenchBattle','nextTurn',
  'moveCard','toggleStatus','deckReturnBottom','deckReturnShuffle','useCard'
].forEach(withMultiplayerSync);

setupBench();
render();
updateMultiplayerStatus();
loadFromURL();
</script>
</body>
</html>
